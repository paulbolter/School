<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul's Classroom Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --paper: #fdf8f0;
    --cream: #f5ede0;
    --gold: #d4a017;
    --gold-light: #f5e6b8;
    --muted: #7a6a5a;
    --border: #d9cfc4;
    --card: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 36px 48px 32px;
    border-bottom: 4px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 40%;
    background: repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(212,160,23,0.04) 12px, rgba(212,160,23,0.04) 24px);
  }
  .header-inner {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 40px);
    color: white;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  header p.sub {
    color: #9999bb;
    font-size: 14px;
    line-height: 1.6;
    max-width: 500px;
  }
  .stats-bar {
    margin-top: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stat { font-size: 13px; color: #9999bb; }
  .stat strong { color: var(--gold); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 40px;
  }

  /* ── SEARCH ROW ── */
  .search-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px 10px 40px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-light);
  }
  #search::placeholder { color: var(--muted); }

  .sort-select {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
  }
  .sort-select:focus { border-color: var(--gold); }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 900px)  { #grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px)  {
    #grid { grid-template-columns: repeat(2, 1fr); }
    header, main { padding-left: 20px; padding-right: 20px; }
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 18px;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    animation: fadeUp 0.35s ease both;
  }
  .card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), #f0c040);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    transform: translateY(-3px);
    border-color: var(--gold);
  }
  .card:hover::after { opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-icon   { font-size: 24px; line-height: 1; }
  .card-name   { font-size: 14px; font-weight: 600; line-height: 1.35; word-break: break-word; }
  .card-filename { font-size: 11px; color: var(--muted); word-break: break-all; font-family: monospace; }
  .card-tag {
    display: inline-block;
    background: var(--gold-light);
    color: #7a5a00;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    align-self: flex-start;
    margin-top: auto;
    text-transform: uppercase;
  }

  /* ── STATES ── */
  .state-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .big { font-size: 40px; margin-bottom: 14px; }
  .state-msg p    { font-size: 14px; line-height: 1.8; }
  .state-msg code {
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 4px;
    color: var(--ink); font-size: 12px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 28px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="eyebrow">paulbolter.github.io / School</p>
    <h1>Classroom Tools</h1>
    <p class="sub">Interactive HTML resources for Grade 6 · Grade 8 IGCSE · Speaking &amp; Vocabulary activities</p>
    <div class="stats-bar">
      <div class="stat"><span id="file-count">Loading…</span></div>
      <div class="stat">Updated: <strong id="last-updated">—</strong></div>
    </div>
  </div>
</header>

<main>
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Filter tools…" autocomplete="off">
    </div>
    <select class="sort-select" id="sort">
      <option value="alpha">A → Z</option>
      <option value="recent">Newest</option>
    </select>
  </div>

  <div id="grid">
    <div class="state-msg">
      <div class="big">⏳</div>
      <p>Fetching your tools from GitHub…</p>
    </div>
  </div>
</main>

<footer>Presidential School · Jizzakh · Uzbekistan</footer>

<script>
const GITHUB_USER   = 'paulbolter';
const GITHUB_REPO   = 'School';
const GITHUB_BRANCH = 'main';

const PRETTY_NAMES = {};

function iconFor(name) {
  const n = name.toLowerCase();
  if (n.includes('igcse') || n.includes('reading') || n.includes('listen')) return '📄';
  if (n.includes('vocab') || n.includes('word'))    return '📝';
  if (n.includes('speak') || n.includes('scenario')) return '🗣️';
  if (n.includes('grammar') || n.includes('passive') || n.includes('perfect')) return '✏️';
  if (n.includes('name') || n.includes('picker') || n.includes('slot')) return '🎰';
  if (n.includes('game') || n.includes('quiz') || n.includes('would')) return '🎮';
  if (n.includes('schedule') || n.includes('timetable')) return '📅';
  if (n.includes('portfolio') || n.includes('dashboard')) return '📊';
  if (n.includes('frog'))    return '🐸';
  if (n.includes('horror'))  return '💀';
  if (n.includes('mech') || n.includes('cyber') || n.includes('proto')) return '🤖';
  if (n.includes('unicorn')) return '🦄';
  return '🔧';
}

function tagFor(name) {
  const n = name.toLowerCase();
  if (n.includes('igcse') || n.includes('reading') || n.includes('listen')) return 'IGCSE';
  if (n.includes('grade6') || n.includes('grade-6') || n.includes('g6'))    return 'Grade 6';
  if (n.includes('grade8') || n.includes('grade-8') || n.includes('g8'))    return 'Grade 8';
  if (n.includes('speak'))  return 'Speaking';
  if (n.includes('vocab') || n.includes('word'))   return 'Vocab';
  if (n.includes('grammar') || n.includes('passive') || n.includes('perfect')) return 'Grammar';
  if (n.includes('name') || n.includes('picker'))  return 'Name Picker';
  if (n.includes('game') || n.includes('quiz'))    return 'Game';
  if (n.includes('schedule') || n.includes('timetable')) return 'Admin';
  return 'Tool';
}

function prettyName(filename) {
  if (PRETTY_NAMES[filename]) return PRETTY_NAMES[filename];
  return filename
    .replace(/\.html$/i, '')
    .replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

let allFiles = [];

async function loadFiles() {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/?ref=${GITHUB_BRANCH}`;
  try {
    const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const data = await res.json();

    allFiles = data
      .filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.html') && f.name.toLowerCase() !== 'index.html')
      .map(f => ({ name: f.name, url: `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${f.name}` }));

    document.getElementById('file-count').innerHTML =
      `<strong>${allFiles.length}</strong> tool${allFiles.length !== 1 ? 's' : ''} available`;
    document.getElementById('last-updated').textContent =
      new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

    renderGrid(allFiles);
  } catch (err) {
    document.getElementById('grid').innerHTML = `
      <div class="state-msg">
        <div class="big">⚠️</div>
        <p>Couldn't load files from GitHub.<br>
        Check the repo is public and the branch is <code>${GITHUB_BRANCH}</code>.<br><br>
        Error: ${err.message}</p>
      </div>`;
    document.getElementById('file-count').textContent = 'Could not load';
  }
}

function renderGrid(files) {
  const grid = document.getElementById('grid');
  if (!files.length) {
    grid.innerHTML = `<div class="state-msg"><div class="big">🔍</div><p>No tools match your search.</p></div>`;
    return;
  }
  grid.innerHTML = files.map((f, i) => `
    <a class="card" href="${f.url}" target="_blank" rel="noopener" style="animation-delay:${i * 35}ms">
      <div class="card-icon">${iconFor(f.name)}</div>
      <div class="card-name">${prettyName(f.name)}</div>
      <div class="card-filename">${f.name}</div>
      <span class="card-tag">${tagFor(f.name)}</span>
    </a>`).join('');
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let files = allFiles.filter(f =>
    !q || f.name.toLowerCase().includes(q) || prettyName(f.name).toLowerCase().includes(q)
  );
  if (document.getElementById('sort').value === 'alpha') {
    files.sort((a, b) => a.name.localeCompare(b.name));
  }
  return files;
}

document.getElementById('search').addEventListener('input', () => renderGrid(filtered()));
document.getElementById('sort').addEventListener('change', () => renderGrid(filtered()));

loadFiles();
</script>
</body>
</html>
