<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6 · Unit 12 Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf5e9;
    --card: #fff9ec;
    --card-border: #d9c8a8;
    --blue: #e8773c;            /* repurposed as the warm orange accent */
    --blue-lt: #f0975e;
    --blue-glow: rgba(232,119,60,0.3);
    --blue-dk: #a44a18;
    --text: #4a3520;
    --text-muted: #9a7f5c;
    --white: #4a3520;           /* headings now dark brown on cream */
    --green: #5a8a6f;
    --green-bg: rgba(90,138,111,0.15);
    --red: #c95d20;
    --red-bg: rgba(201,93,32,0.12);
    --yellow: #e8b840;
    --yellow-bg: rgba(232,184,64,0.18);
    --orange: #e8773c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Floating background shapes ── */
  .bg-orb {
    position: fixed; border-radius: 50%; pointer-events: none; opacity: 0.18;
    animation: orbFloat var(--dur) ease-in-out infinite;
  }
  .orb1 { width: 350px; height: 350px; background: #f0975e; top: -100px; left: -120px; --dur: 12s; }
  .orb2 { width: 280px; height: 280px; background: #e8b840; bottom: -80px; right: -100px; --dur: 15s; animation-delay: -5s; }
  .orb3 { width: 200px; height: 200px; background: #b8d4a8; top: 50%; left: 65%; --dur: 9s; animation-delay: -3s; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    40% { transform: translate(20px,-25px) scale(1.06); }
    70% { transform: translate(-15px,18px) scale(0.95); }
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 20px; position: relative; z-index: 2; }
  .unit-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--orange), var(--blue-dk));
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 22px;
    border-radius: 50px;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px var(--blue-glow);
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(22px, 4.5vw, 42px);
    color: var(--white);
    line-height: 1.15;
    text-shadow: 0 3px 8px rgba(180,140,90,0.25);
  }
  h1 span { color: var(--orange); }

  /* ── Phase indicator ── */
  .phase-bar {
    display: flex; justify-content: center; gap: 10px;
    margin-bottom: 20px; position: relative; z-index: 2;
  }
  .phase-pip {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    padding: 8px 22px;
    border-radius: 10px;
    border: 2px solid var(--card-border);
    background: var(--card);
    color: var(--text-muted);
    letter-spacing: 0.5px;
    transition: all 0.3s;
  }
  .phase-pip.active {
    background: var(--orange);
    color: var(--white);
    color: #fff;
    border-color: var(--blue-lt);
    box-shadow: 0 0 14px var(--blue-glow);
  }
  .phase-pip.done {
    background: rgba(90,138,111,0.18);
    color: #3a5a48;
    border-color: rgba(90,138,111,0.45);
  }

  /* ── Progress bar ── */
  .progress-wrap { width: 100%; max-width: 720px; margin: 0 auto 14px; position: relative; z-index: 2; }
  .progress-info { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .progress-track { height: 8px; background: #ecdebf; border-radius: 10px; overflow: hidden; border: 1px solid var(--card-border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-dk), var(--blue), var(--blue-lt)); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 12px var(--blue-glow); }

  /* ── Quiz card ── */
  .quiz-card {
    background: rgba(255,249,236,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 2px solid var(--card-border);
    border-radius: 28px;
    padding: clamp(24px,5vw,48px) clamp(20px,5vw,52px);
    width: 100%; max-width: 720px;
    position: relative; z-index: 2;
    box-shadow: 0 20px 60px rgba(180,140,90,0.15), 0 4px 16px rgba(180,140,90,0.1);
  }
  .quiz-card::before {
    content: ''; position: absolute; top: -2px; left: 60px; right: 60px; height: 4px;
    background: linear-gradient(90deg, transparent, var(--blue-dk), var(--blue), var(--blue-lt), transparent);
    border-radius: 0 0 4px 4px;
  }

  /* ── Quiz phase ── */
  .word-label { font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .word-display {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 6vw, 56px);
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .pos-badge {
    display: inline-block;
    font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,119,60,0.12);
    border: 1px solid rgba(232,119,60,0.3);
    padding: 4px 14px; border-radius: 50px; margin-bottom: 26px;
  }
  .review-badge {
    display: none; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--orange), #c95d20);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-weight: 800; font-size: 14px; letter-spacing: 0.06em;
    padding: 7px 20px; border-radius: 50px; margin-bottom: 16px;
    box-shadow: 0 4px 18px rgba(232,119,60,0.4);
    animation: pulseOrange 1.8s ease-in-out infinite;
  }
  .review-badge.visible { display: inline-flex; }
  @keyframes pulseOrange { 0%,100%{box-shadow:0 4px 18px rgba(232,119,60,0.4);}50%{box-shadow:0 6px 28px rgba(232,119,60,0.7);} }

  .options { display: flex; flex-direction: column; gap: 11px; }
  .option {
    background: #fff4dd;
    border: 2px solid #e8c98a;
    border-radius: 16px;
    padding: 15px 20px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 14px;
    transition: all 0.2s; text-align: left;
    box-shadow: 0 2px 8px rgba(180,140,90,0.1);
  }
  .option:hover { background: #ffeac4; border-color: #d9a868; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(180,140,90,0.18); }
  .option-letter {
    width: 34px; height: 34px; min-width: 34px; border-radius: 10px;
    background: rgba(232,119,60,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--orange);
    transition: all 0.2s; border: 1px solid rgba(232,119,60,0.3);
  }
  .option-text { font-size: clamp(14px,2vw,16px); font-weight: 700; color: var(--text); line-height: 1.45; transition: all 0.2s; padding-top: 4px; }

  .option.selected { border-color: var(--orange); background: rgba(232,119,60,0.12); }
  .option.selected .option-letter { background: var(--orange); color: white; }
  .option.correct { border-color: var(--green) !important; background: var(--green-bg) !important; }
  .option.correct .option-letter { background: var(--green) !important; color: white !important; }
  .option.correct .option-text { color: #3a5a48 !important; font-weight: 800; }
  .option.wrong { border-color: var(--red) !important; background: var(--red-bg) !important; opacity: 0.55; }
  .option.wrong .option-letter { background: var(--red) !important; color: white !important; }
  .option.wrong .option-text { color: rgba(164,74,24,0.7) !important; }
  .option.faded { opacity: 0.35; transform: none !important; }
  .option.faded:hover { transform: none; border-color: #e8c98a; background: #fff4dd; }
  .option.disabled { cursor: default; pointer-events: none; }

  .btn-row { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'Fredoka One', cursive; font-weight: 800;
    font-size: clamp(15px,2.2vw,18px);
    border: none; border-radius: 14px; padding: 13px 32px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-reveal { background: linear-gradient(135deg, #e8b840, #d4a020); color: #5a3a00; box-shadow: 0 5px 0 #a48010, 0 8px 24px rgba(232,184,64,0.3); display: none; }
  .btn-reveal:hover { transform: translateY(-3px); box-shadow: 0 5px 0 #a48010, 0 14px 32px rgba(232,184,64,0.45); }
  .btn-reveal.visible { display: block; }
  .btn-next { background: linear-gradient(135deg, var(--orange), var(--blue-dk)); color: white; box-shadow: 0 5px 0 #7a3510, 0 8px 24px var(--blue-glow); display: none; }
  .btn-next:hover { transform: translateY(-3px); box-shadow: 0 5px 0 #7a3510, 0 14px 32px var(--blue-glow); }
  .btn-next.visible { display: block; }
  .btn-review { background: linear-gradient(135deg, var(--orange), #c95d20); color: white; box-shadow: 0 5px 0 #7a3510, 0 8px 24px rgba(232,119,60,0.3); display: none; }
  .btn-review:hover { transform: translateY(-3px); box-shadow: 0 5px 0 #7a3510, 0 14px 32px rgba(232,119,60,0.45); }
  .btn-review.visible { display: inline-block; }

  .score-area { display: flex; gap: 20px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .score-pill { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-muted); background: rgba(232,119,60,0.1); border: 1px solid rgba(232,119,60,0.25); padding: 7px 16px; border-radius: 50px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-correct { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot-wrong { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* ── Transition screen ── */
  .transition-screen, .end-screen { text-align: center; display: none; }
  .transition-screen.visible, .end-screen.visible { display: block; }
  .transition-screen .big-emoji, .end-screen .big-emoji { font-size: 72px; margin-bottom: 14px; animation: popIn 0.5s ease; }
  .transition-screen h2, .end-screen h2 { font-family: 'Fredoka One', cursive; font-size: clamp(26px,5vw,46px); color: var(--white); margin-bottom: 10px; text-shadow: 0 3px 8px rgba(180,140,90,0.2); }
  .transition-screen p, .end-screen p { font-size: 17px; color: var(--text-muted); margin-bottom: 24px; font-weight: 700; }
  .end-score { font-family: 'Fredoka One', cursive; font-size: clamp(36px,7vw,64px); color: var(--white); margin-bottom: 20px; }
  .end-score span { color: #3a5a48; }
  .confetti-row { font-size: 26px; margin-bottom: 14px; animation: popIn 0.6s ease; }

  .pop { animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { 0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;} }
  .slide-up { animation: slideUp 0.35s ease; }
  @keyframes slideUp { 0%{transform:translateY(16px);opacity:0;}100%{transform:translateY(0);opacity:1;} }

  .quiz-content.hidden { display: none; }

  /* ── Match phase ── */
  .vm-round-label { text-align: center; font-size: 0.92rem; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.5px; }
  .vm-progress-wrap { max-width: 460px; margin: 0 auto 24px; height: 11px; background: #ecdebf; border-radius: 10px; overflow: hidden; border: 2px solid var(--card-border); }
  .vm-progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--blue-lt)); border-radius: 10px; transition: width 0.4s cubic-bezier(.34,1.56,.64,1); }
  .vm-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .vm-col-label { font-family: 'Fredoka One', cursive; font-size: 1.18rem; text-align: center; margin-bottom: 12px; letter-spacing: 0.5px; }
  .vm-col-label.word { color: var(--orange); }
  .vm-col-label.def { color: #5a8a6f; }
  .vm-btn {
    display: block; width: 100%; padding: 17px 16px; margin-bottom: 11px;
    font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 900;
    border-radius: 13px; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
    border: 3px solid transparent; text-align: center; line-height: 1.32;
  }
  .vm-btn.word-btn { background: #fff4dd; color: #6b4e2a; border-color: #e8c98a; box-shadow: 0 4px 0 #c9a868; }
  .vm-btn.def-btn { background: #f0f5e8; color: #3a4a3e; border-color: #b8d4a8; box-shadow: 0 4px 0 #98b888; font-size: 0.95rem; font-weight: 700; }
  .vm-btn.word-btn:hover { background: #ffeac4; transform: translateY(-3px); box-shadow: 0 7px 0 #c9a868; }
  .vm-btn.def-btn:hover { background: #e6efd8; transform: translateY(-3px); box-shadow: 0 7px 0 #98b888; }
  .vm-btn.selected { background: var(--orange) !important; color: #fff !important; border-color: var(--blue-dk) !important; box-shadow: 0 4px 0 var(--blue-dk), 0 0 18px var(--blue-glow) !important; transform: translateY(-3px) scale(1.03); }
  .vm-btn.wrong { background: #f5d8c8 !important; color: #a44a18 !important; border-color: #e8a888 !important; box-shadow: 0 4px 0 #c98868 !important; animation: wobble 0.35s ease; }
  .vm-btn.matched { visibility: hidden; pointer-events: none; }
  .vm-btn.pop2 { animation: popaway 0.35s ease forwards; }
  @keyframes wobble { 0%{transform:translateX(0);}25%{transform:translateX(-7px);}50%{transform:translateX(7px);}75%{transform:translateX(-4px);}100%{transform:translateX(0);} }
  @keyframes popaway { 0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.5;}100%{transform:scale(0);opacity:0;} }

  .vm-done { text-align: center; padding: 40px 16px; }
  .vm-star { font-size: 3.2rem; display: inline-block; animation: starspin 0.6s ease; }
  @keyframes starspin { 0%{transform:rotate(-20deg) scale(0);}60%{transform:rotate(10deg) scale(1.4);}100%{transform:rotate(0deg) scale(1);} }
  .vm-done-title { font-family: 'Fredoka One', cursive; font-size: 2.6rem; color: var(--white); text-shadow: 3px 3px 0 rgba(180,140,90,0.25); margin: 12px 0 10px; }
  .vm-done-msg { font-size: 1.05rem; color: var(--text-muted); font-weight: 700; margin-bottom: 28px; }
  .vm-again-btn {
    font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    background: var(--orange); color: #fff; border: 3px solid var(--blue-dk); border-radius: 15px;
    padding: 16px 44px; cursor: pointer;
    box-shadow: 0 6px 0 var(--blue-dk);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .vm-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--blue-dk); }
  .vm-again-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 var(--blue-dk); }

  #match-section { display: none; }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="header">
  <div class="unit-badge">📖 Vocabulary</div>
  <h1>Grade 6 · <span>Unit 12</span></h1>
</div>

<div class="phase-bar">
  <div class="phase-pip active" id="pip-quiz">Quiz</div>
  <div class="phase-pip" id="pip-match">Match Up</div>
</div>

<div class="progress-wrap" id="quiz-progress">
  <div class="progress-info">
    <span id="progress-label">Question 1 of 9</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-card">
  <!-- ── QUIZ SECTION ── -->
  <div id="quiz-section">
    <div class="quiz-content" id="quiz-content">
      <div class="word-label">What does this word / phrase mean?</div>
      <div class="word-display pop" id="word-display">—</div>
      <div class="pos-badge" id="pos-display">noun</div>
      <div class="review-badge" id="review-badge">⚠️ REVIEW — you missed this one!</div>
      <div class="options" id="options-container"></div>
      <div class="btn-row">
        <button class="btn btn-reveal" id="btn-reveal" onclick="reveal()">🔍 Reveal Answer</button>
        <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Next Word ➜</button>
      </div>
      <div class="score-area">
        <div class="score-pill"><div class="dot dot-correct"></div><span id="correct-count">0 correct</span></div>
        <div class="score-pill"><div class="dot dot-wrong"></div><span id="wrong-count">0 wrong</span></div>
      </div>
    </div>

    <!-- Quiz end / transition -->
    <div class="transition-screen" id="quiz-end-screen">
      <div class="big-emoji" id="end-emoji">🎉</div>
      <h2 id="end-title">Quiz Complete!</h2>
      <div class="confetti-row">⭐ 🌟 ⭐ 🌟 ⭐</div>
      <p id="end-message">Great work on Unit 12 vocabulary!</p>
      <div class="end-score">You scored <span id="final-score">—</span></div>
      <div id="end-review-note" style="font-size:15px;color:var(--orange);margin-bottom:20px;display:none;font-weight:700;"></div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-review" id="btn-start-review" onclick="startReview()" style="display:none">⚠️ Review Missed Words</button>
        <button class="btn btn-next visible" id="btn-go-match" onclick="startMatchPhase()">Match Up! ➜</button>
      </div>
    </div>
  </div>

  <!-- ── MATCH SECTION ── -->
  <div id="match-section">
    <div id="vm-game"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  VOCABULARY DATA
// ══════════════════════════════════════════════════════
const vocab = [
  { word: "scold", pos: "verb",
    correct: "To speak angrily to someone because they did something wrong",
    wrong: ["To give someone a prize for doing something good",
            "To ask someone a question in a friendly way"] },
  { word: "illegal", pos: "adjective",
    correct: "Not allowed by the law",
    wrong: ["Very popular and liked by many people",
            "Difficult to understand"] },
  { word: "crime", pos: "noun",
    correct: "Something someone does that is against the law",
    wrong: ["A special reward given by the government",
            "A type of job that helps people"] },
  { word: "encourage", pos: "verb",
    correct: "To give someone confidence or support to do something",
    wrong: ["To stop someone from doing what they want",
            "To explain the rules of a game"] },
  { word: "behave well", pos: "expression",
    correct: "To act in a good, polite way",
    wrong: ["To finish your homework very quickly",
            "To talk loudly so everyone can hear you"] },
  { word: "expected to", pos: "expression",
    correct: "Something people think you should do",
    wrong: ["Something you are afraid of",
            "Something that is very surprising"] },
  { word: "warn", pos: "verb",
    correct: "To tell someone about a danger or problem so they can be careful",
    wrong: ["To make someone laugh with a funny story",
            "To teach someone how to play a sport"] },
  { word: "a rebel", pos: "noun",
    correct: "A person who refuses to follow the rules or does things differently",
    wrong: ["A person who helps the teacher in class",
            "A person who is very quiet and shy"] },
  { word: "nasty", pos: "adjective",
    correct: "Very unkind or unpleasant",
    wrong: ["Very tired and sleepy",
            "Very excited about something"] }
];

// Match data (word → short definition for matching)
const matchWords = vocab.map(function(v) { return [v.word, v.correct]; });

// ══════════════════════════════════════════════════════
//  QUIZ ENGINE
// ══════════════════════════════════════════════════════
let questions = [], current = 0, score = 0, correct = 0, wrong = 0;
let answered = false, missedWords = [], isReviewMode = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildQuestions() {
  const shuffled = shuffle(vocab);
  const positions = [];
  const perSlot = Math.floor(shuffled.length / 3);
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < perSlot; j++) positions.push(i);
  }
  while (positions.length < shuffled.length) positions.push(Math.floor(Math.random() * 3));
  const shuffledPos = shuffle(positions);

  questions = shuffled.map(function(v, idx) {
    const correctPos = shuffledPos[idx];
    const wrongOpts = shuffle([
      { text: v.wrong[0], isCorrect: false },
      { text: v.wrong[1], isCorrect: false }
    ]);
    const opts = wrongOpts.slice();
    opts.splice(correctPos, 0, { text: v.correct, isCorrect: true });
    return { word: v.word, pos: v.pos, opts: opts };
  });
}

function render() {
  answered = false;
  const q = questions[current];
  const wordEl = document.getElementById('word-display');
  wordEl.textContent = q.word;
  wordEl.className = 'word-display pop';
  document.getElementById('pos-display').textContent = q.pos;

  const total = questions.length;
  const label = isReviewMode ? 'Review ' : 'Question ';
  document.getElementById('progress-label').textContent = label + (current + 1) + ' of ' + total;
  document.getElementById('score-label').textContent = isReviewMode ? '⚠️ Review Mode' : 'Score: ' + score;
  document.getElementById('progress-fill').style.width = ((current / total) * 100) + '%';

  const badge = document.getElementById('review-badge');
  if (isReviewMode) badge.classList.add('visible'); else badge.classList.remove('visible');

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  container.className = 'options slide-up';
  const letters = ['A', 'B', 'C'];
  q.opts.forEach(function(opt, i) {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.correct = opt.isCorrect;
    div.innerHTML = '<div class="option-letter">' + letters[i] + '</div><div class="option-text">' + opt.text + '</div>';
    div.addEventListener('click', function() { selectOption(div, opt.isCorrect); });
    container.appendChild(div);
  });
  document.getElementById('btn-reveal').classList.remove('visible');
  document.getElementById('btn-next').classList.remove('visible');
}

function selectOption(el, isCorrect) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option').forEach(function(o) { o.classList.add('disabled'); });
  el.classList.add('selected');
  if (isCorrect) {
    el.classList.add('correct');
    score++; correct++;
    document.querySelectorAll('.option').forEach(function(o) { if (o !== el) o.classList.add('faded'); });
    document.getElementById('btn-next').classList.add('visible');
  } else {
    el.classList.add('wrong');
    wrong++;
    document.getElementById('btn-reveal').classList.add('visible');
  }
  document.getElementById('correct-count').textContent = correct + ' correct';
  document.getElementById('wrong-count').textContent = wrong + ' wrong';
  document.getElementById('score-label').textContent = isReviewMode ? '⚠️ Review Mode' : 'Score: ' + score;
}

function reveal() {
  if (!isReviewMode) {
    const q = questions[current];
    const vocabEntry = vocab.find(function(v) { return v.word === q.word; });
    if (vocabEntry && !missedWords.find(function(m) { return m.word === vocabEntry.word; })) {
      missedWords.push(vocabEntry);
    }
  }
  document.querySelectorAll('.option').forEach(function(o) {
    if (o.dataset.correct === 'true') { o.classList.add('correct'); o.classList.remove('faded'); }
    else if (!o.classList.contains('wrong')) { o.classList.add('faded'); }
  });
  document.getElementById('btn-reveal').classList.remove('visible');
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) { showQuizEnd(); return; }
  render();
}

function showQuizEnd() {
  document.getElementById('quiz-content').classList.add('hidden');
  document.getElementById('quiz-end-screen').classList.add('visible');

  if (isReviewMode) {
    document.getElementById('end-emoji').textContent = '✅';
    document.getElementById('end-title').textContent = 'Review Complete!';
    document.getElementById('end-message').textContent = 'Well done for going back over the tricky ones!';
    document.getElementById('final-score').textContent = 'All ' + questions.length + ' reviewed';
    document.getElementById('btn-start-review').style.display = 'none';
    document.getElementById('end-review-note').style.display = 'none';
    document.getElementById('btn-go-match').style.display = 'inline-block';
  } else {
    const pct = Math.round((correct / questions.length) * 100);
    document.getElementById('final-score').textContent = correct + ' / ' + questions.length;
    let emoji = '🎉', title = 'Quiz Complete!', msg = 'Great work on Unit 12 vocabulary!';
    if (pct >= 80) { emoji = '🏆'; title = 'Fantastic!'; msg = 'You really know your Unit 12 words — amazing work!'; }
    else if (pct >= 60) { emoji = '🌟'; title = 'Great job!'; msg = 'Really good effort — keep practising!'; }
    else if (pct >= 40) { emoji = '💪'; title = 'Good try!'; msg = 'Have another go — you can do it!'; }
    else { emoji = '📚'; title = 'Keep going!'; msg = 'Read through the words and try again!'; }
    document.getElementById('end-emoji').textContent = emoji;
    document.getElementById('end-title').textContent = title;
    document.getElementById('end-message').textContent = msg;

    if (missedWords.length > 0) {
      document.getElementById('btn-start-review').style.display = 'inline-block';
      const note = document.getElementById('end-review-note');
      note.style.display = 'block';
      note.textContent = '⚠️ You revealed the answer for ' + missedWords.length + ' word' + (missedWords.length > 1 ? 's' : '') + ' — want to practise them again?';
    }
  }
  document.getElementById('progress-fill').style.width = '100%';
}

function startReview() {
  isReviewMode = true;
  current = 0;
  const shuffledMissed = shuffle(missedWords);
  const positions = [];
  const perSlot = Math.floor(shuffledMissed.length / 3);
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < perSlot; j++) positions.push(i);
  }
  while (positions.length < shuffledMissed.length) positions.push(Math.floor(Math.random() * 3));
  const shuffledPositions = shuffle(positions);

  questions = shuffledMissed.map(function(v, idx) {
    const correctPos = shuffledPositions[idx];
    const wrongOpts = shuffle([
      { text: v.wrong[0], isCorrect: false },
      { text: v.wrong[1], isCorrect: false }
    ]);
    const opts = wrongOpts.slice();
    opts.splice(correctPos, 0, { text: v.correct, isCorrect: true });
    return { word: v.word, pos: v.pos, opts: opts };
  });

  document.getElementById('quiz-end-screen').classList.remove('visible');
  document.getElementById('quiz-content').classList.remove('hidden');
  render();
}

// ══════════════════════════════════════════════════════
//  MATCH ENGINE
// ══════════════════════════════════════════════════════
let mAllWords = [], mChunks = [], mRoundIdx = 0, mMatched = 0, mSelectedWord = null, mWordOrder = [], mDefOrder = [];

function startMatchPhase() {
  // Switch UI
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('match-section').style.display = 'block';
  document.getElementById('quiz-progress').style.display = 'none';
  document.getElementById('pip-quiz').classList.remove('active');
  document.getElementById('pip-quiz').classList.add('done');
  document.getElementById('pip-match').classList.add('active');
  initMatch();
}

function initMatch() {
  mAllWords = shuffle(matchWords);
  mChunks = [];
  for (let i = 0; i < mAllWords.length; i += 5) {
    mChunks.push(mAllWords.slice(i, i + 5));
  }
  mRoundIdx = 0;
  startMatchRound();
}

function startMatchRound() {
  mSelectedWord = null;
  mMatched = 0;
  const pair = mChunks[mRoundIdx];
  mWordOrder = shuffle(pair.map(function(_, i) { return i; }));
  mDefOrder = shuffle(pair.map(function(_, i) { return i; }));
  renderMatch();
}

function renderMatch() {
  const pair = mChunks[mRoundIdx];
  const total = mChunks.reduce(function(s, c) { return s + c.length; }, 0);
  const done = mChunks.slice(0, mRoundIdx).reduce(function(s, c) { return s + c.length; }, 0) + mMatched;
  const pct = Math.round(done / total * 100);
  let h = '<div class="vm-round-label">Round ' + (mRoundIdx + 1) + ' of ' + mChunks.length + ' · ' + mMatched + ' / ' + pair.length + ' matched</div>';
  h += '<div class="vm-progress-wrap"><div class="vm-progress-fill" id="vpbar" style="width:' + pct + '%"></div></div>';
  h += '<div class="vm-cols"><div><div class="vm-col-label word">Word</div>';
  mWordOrder.forEach(function(i) {
    h += '<button class="vm-btn word-btn" id="mword' + i + '" onclick="mPickWord(' + i + ')">' + pair[i][0] + '</button>';
  });
  h += '</div><div><div class="vm-col-label def">Definition</div>';
  mDefOrder.forEach(function(i) {
    h += '<button class="vm-btn def-btn" id="mdef' + i + '" onclick="mPickDef(' + i + ')">' + pair[i][1] + '</button>';
  });
  h += '</div></div>';
  document.getElementById('vm-game').innerHTML = h;
}

function mPickWord(i) {
  var btn = document.getElementById('mword' + i);
  if (btn.classList.contains('matched') || btn.classList.contains('pop2')) return;
  if (mSelectedWord !== null) {
    var prev = document.getElementById('mword' + mSelectedWord);
    if (prev) prev.classList.remove('selected');
  }
  mSelectedWord = i;
  btn.classList.add('selected');
}

function mPickDef(i) {
  if (mSelectedWord === null) return;
  var defBtn = document.getElementById('mdef' + i);
  if (defBtn.classList.contains('matched') || defBtn.classList.contains('pop2')) return;
  if (mSelectedWord === i) {
    var wordBtn = document.getElementById('mword' + mSelectedWord);
    wordBtn.classList.remove('selected');
    wordBtn.classList.add('pop2');
    defBtn.classList.add('pop2');
    setTimeout(function() {
      wordBtn.classList.add('matched');
      defBtn.classList.add('matched');
    }, 340);
    mSelectedWord = null;
    mMatched++;
    setTimeout(function() {
      var pair = mChunks[mRoundIdx];
      var total = mChunks.reduce(function(s, c) { return s + c.length; }, 0);
      var done2 = mChunks.slice(0, mRoundIdx).reduce(function(s, c) { return s + c.length; }, 0) + mMatched;
      var pb = document.getElementById('vpbar');
      var rl = document.querySelector('.vm-round-label');
      if (pb) pb.style.width = Math.round(done2 / total * 100) + '%';
      if (rl) rl.textContent = 'Round ' + (mRoundIdx + 1) + ' of ' + mChunks.length + ' · ' + mMatched + ' / ' + pair.length + ' matched';
      if (mMatched === pair.length) {
        setTimeout(function() {
          mRoundIdx++;
          if (mRoundIdx < mChunks.length) startMatchRound();
          else showMatchDone();
        }, 500);
      }
    }, 360);
  } else {
    defBtn.classList.add('wrong');
    setTimeout(function() { defBtn.classList.remove('wrong'); }, 380);
  }
}

function showMatchDone() {
  document.getElementById('vm-game').innerHTML =
    '<div class="vm-done">' +
      '<div class="vm-star">⭐</div>' +
      '<div class="vm-done-title">All done!</div>' +
      '<div class="vm-done-msg">You matched all ' + matchWords.length + ' words. Excellent work!</div>' +
      '<button class="vm-again-btn" onclick="restartAll()">🔄 Start Over</button>' +
    '</div>';
}

function restartAll() {
  // Reset everything
  current = 0; score = 0; correct = 0; wrong = 0;
  missedWords = []; isReviewMode = false;
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('match-section').style.display = 'none';
  document.getElementById('quiz-progress').style.display = 'block';
  document.getElementById('quiz-end-screen').classList.remove('visible');
  document.getElementById('quiz-content').classList.remove('hidden');
  document.getElementById('pip-quiz').classList.add('active');
  document.getElementById('pip-quiz').classList.remove('done');
  document.getElementById('pip-match').classList.remove('active');
  document.getElementById('correct-count').textContent = '0 correct';
  document.getElementById('wrong-count').textContent = '0 wrong';
  buildQuestions();
  render();
}

// ── KEYBOARD SHORTCUT ──
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    var nextBtn = document.getElementById('btn-next');
    var revBtn = document.getElementById('btn-reveal');
    if (nextBtn && nextBtn.classList.contains('visible')) nextQuestion();
    else if (revBtn && revBtn.classList.contains('visible')) reveal();
  }
});

// ── INIT ──
buildQuestions();
render();
</script>
</body>
