<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questions for Thinking – Grade 7</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE033;
    --green: #3EE88A;
    --red: #FF5E7A;
    --blue: #5BC8FF;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --pink: #FF6EB4;
    --teal: #3EFFD8;
    --white: #FFFFFF;
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #0a4a7a 0%, #0d6eaa 40%, #0a5a8a 70%, #1a7ab0 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; position: relative; overflow-x: hidden;
  }

  /* BLOBS */
  .blob { position:fixed;border-radius:50%;filter:blur(80px);opacity:0.22;pointer-events:none;animation:blobFloat 12s ease-in-out infinite; }
  .blob1 { width:500px;height:500px;background:#0099CC;top:-100px;left:-150px; }
  .blob2 { width:400px;height:400px;background:#00AADD;bottom:-100px;right:-100px;animation-delay:-4s; }
  .blob3 { width:300px;height:300px;background:#66CCFF;top:40%;left:60%;animation-delay:-8s; }
  @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(20px,-30px) scale(1.05);}66%{transform:translate(-15px,20px) scale(0.97);} }

  /* STARS */
  .stars { position:fixed;inset:0;pointer-events:none;overflow:hidden; }
  .star { position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1);}50%{opacity:0.8;transform:scale(1.4);} }

  /* FLOATING QUESTION MARKS */
  .floaters { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1; }
  .floater {
    position:absolute;
    font-family:'Fredoka One',cursive;
    animation: floatUp var(--fdur) ease-in-out infinite;
    animation-delay: var(--fdelay);
    opacity:0;
    user-select:none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(var(--frot)) scale(0.8); opacity:0; }
    15% { opacity: var(--fopacity); }
    85% { opacity: var(--fopacity); }
    100% { transform: translateY(-120px) rotate(calc(var(--frot) + 20deg)) scale(1.1); opacity:0; }
  }

  /* HEADER */
  .header { text-align:center;margin-bottom:18px;position:relative;z-index:2; }
  .unit-badge { display:inline-block;background:var(--yellow);color:#1a1060;font-family:'Fredoka One',cursive;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;padding:6px 20px;border-radius:50px;margin-bottom:12px;box-shadow:0 4px 20px rgba(255,224,51,0.4); }
  h1 { font-family:'Fredoka One',cursive;font-size:clamp(26px,5vw,50px);color:var(--white);line-height:1.1;text-shadow:0 0 40px rgba(255,224,51,0.3); }
  h1 span { color:var(--yellow); }

  /* PROGRESS */
  .progress-bar-wrap { width:100%;max-width:820px;margin:0 auto 14px;position:relative;z-index:2; }
  .progress-info { display:flex;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:700;margin-bottom:8px; }
  .progress-track { height:8px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden; }
  .progress-fill { height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:10px;transition:width 0.5s ease;box-shadow:0 0 12px rgba(91,200,255,0.5); }

  /* MAIN CARD */
  .question-card {
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:32px;
    padding:clamp(28px,5vw,52px) clamp(24px,6vw,60px);
    width:100%;max-width:820px;
    position:relative;z-index:2;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .question-card::before {
    content:'';position:absolute;top:-1px;left:60px;right:60px;height:3px;
    background:linear-gradient(90deg,transparent,var(--yellow),var(--green),var(--blue),transparent);
    border-radius:0 0 4px 4px;
  }

  /* TOPIC BADGE */
  .topic-badge {
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;
    padding:6px 16px;border-radius:50px;margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.2);
    transition: all 0.4s ease;
    width: fit-content;
  }

  /* THINKING FACE */
  .thinking-face {
    position:absolute;
    top: 20px;
    right: 24px;
    font-size: 52px;
    animation: thinkBob 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,224,51,0.4));
    line-height:1;
  }
  @keyframes thinkBob {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  /* THOUGHT BUBBLE */
  .thought-bubble {
    position:absolute;
    top: 14px;
    right: 86px;
    display:flex;gap:4px;align-items:flex-end;
  }
  .thought-dot {
    background:rgba(255,255,255,0.25);
    border-radius:50%;
    animation: thoughtPulse 2s ease-in-out infinite;
  }
  .thought-dot:nth-child(1) { width:6px;height:6px;animation-delay:0s; }
  .thought-dot:nth-child(2) { width:9px;height:9px;animation-delay:0.2s; }
  .thought-dot:nth-child(3) { width:13px;height:13px;animation-delay:0.4s; }
  @keyframes thoughtPulse {
    0%,100% { opacity:0.3;transform:scale(1); }
    50% { opacity:0.8;transform:scale(1.15); }
  }

  /* QUESTION TEXT */
  .question-label { font-size:11px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:10px; }
  .question-text {
    font-family:'Fredoka One',cursive;
    font-size:clamp(22px,4vw,36px);
    color:var(--white);
    line-height:1.35;
    margin-bottom:32px;
    padding-right:70px;
    text-shadow:0 0 40px rgba(255,255,255,0.1);
  }

  /* PAIR PROMPT */
  .pair-prompt {
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:12px 18px;
    margin-bottom:24px;
    font-size:14px;font-weight:700;color:rgba(255,255,255,0.6);
  }
  .pair-prompt span { font-size:22px; }

  /* BUTTONS */
  .btn-row { display:flex;gap:12px;flex-wrap:wrap;justify-content:center; }
  .btn { font-family:'Fredoka One',cursive;font-size:clamp(15px,2.2vw,19px);border:none;border-radius:14px;padding:13px 34px;cursor:pointer;transition:all 0.2s; }
  .btn-next { background:linear-gradient(135deg,var(--blue),var(--purple));color:white;box-shadow:0 8px 24px rgba(91,200,255,0.3); }
  .btn-next:hover { transform:translateY(-3px);box-shadow:0 14px 32px rgba(91,200,255,0.5); }
  .btn-restart { background:linear-gradient(135deg,var(--yellow),var(--orange));color:#1a1060;box-shadow:0 8px 24px rgba(255,224,51,0.3); }
  .btn-restart:hover { transform:translateY(-3px); }

  /* ANIMATIONS */
  .pop { animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { 0%{transform:scale(0.85);opacity:0;}100%{transform:scale(1);opacity:1;} }
  .slide-up { animation:slideUp 0.4s ease; }
  @keyframes slideUp { 0%{transform:translateY(20px);opacity:0;}100%{transform:translateY(0);opacity:1;} }

  /* END SCREEN */
  .end-screen { text-align:center;display:none; }
  .end-screen.visible { display:block; }
  .end-screen .big-emoji { font-size:90px;margin-bottom:16px;animation:popIn 0.5s ease; }
  .end-screen h2 { font-family:'Fredoka One',cursive;font-size:clamp(30px,5vw,54px);color:var(--yellow);margin-bottom:12px; }
  .end-screen p { font-size:18px;color:rgba(255,255,255,0.7);margin-bottom:28px;line-height:1.5; }
  .question-content.hidden { display:none; }

  /* COUNTER PILL */
  .counter-pill {
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
    border-radius:50px;padding:6px 16px;
    font-size:13px;font-weight:800;color:var(--muted);
    margin-bottom:14px;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="floaters" id="floaters"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="header">
  <h1>Questions for <span>Thinking</span></h1>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progress-label">Question 1</span>
    <span id="counter-label">0 discussed</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="question-card" id="question-card">

  <div class="question-content" id="question-content">
    <div>
      <div class="topic-badge" id="topic-badge">🐾 Animals</div>
      <div class="thinking-face" id="thinking-face">🤔</div>
      <div class="thought-bubble">
        <div class="thought-dot"></div>
        <div class="thought-dot"></div>
        <div class="thought-dot"></div>
      </div>
      <div class="question-label">Discuss with your partner →</div>
      <div class="question-text pop" id="question-text">Loading...</div>
      <div class="pair-prompt">
        <span>👥</span> Talk to your partner for 2–3 minutes, then share your ideas with the class.
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-next" onclick="nextQuestion()">Next Question ›</button>
    </div>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="big-emoji">🎉</div>
    <h2>Great Thinking!</h2>
    <p>You've discussed all the questions.<br>Amazing thinking today — well done everyone!</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-restart" onclick="restartTool()">Reset All Questions 🔄</button>
    </div>
  </div>

</div>

<div style="margin-top:16px;z-index:2;position:relative;">
  <button class="btn btn-restart" onclick="restartTool()" style="opacity:0.75;font-size:14px;padding:9px 24px;">Reset All Questions 🔄</button>
</div>

<script>
// ── QUESTIONS DATA ─────────────────────────────────────────────
const topics = {
  animals: {
    label: "🐾 Animals",
    color: "#3EE88A",
    bg: "rgba(62,232,138,0.12)",
    face: "🐾",
    questions: [
      "If your pet (or a pet you'd like) could talk for one day, what do you think it would say?",
      "Would you rather be able to talk to animals or understand what plants feel?",
      "If you could keep any wild animal safely as a pet, what would it be and why?",
      "Which animal do you think is the most intelligent, and why?",
      "If you found an injured wild animal, what would you do?",
      "Would you rather be a dolphin, an eagle, or a lion for a week? What would you do?"
    ]
  },
  books: {
    label: "📚 Books & Stories",
    color: "#FF9A3C",
    bg: "rgba(255,154,60,0.12)",
    face: "📖",
    questions: [
      "If you could jump inside any book and live there for a week, which would you choose?",
      "What makes a book impossible to put down? What ruins a good story?",
      "Would you rather be the hero or the villain in a story? Why?",
      "If you could meet any fictional character, who would it be and what would you ask them?",
      "Should a story always have a happy ending, or are sad endings sometimes better?"
    ]
  },
  football: {
    label: "⚽ Football & Sports",
    color: "#5BC8FF",
    bg: "rgba(91,200,255,0.12)",
    face: "⚽",
    questions: [
      "If you could change one rule in football to make it more fun, what would it be?",
      "Would you rather be the best player on a losing team or a substitute on a winning team?",
      "Is winning everything, or is how you play more important?",
      "If a brand new sport was invented tomorrow, what would make it fun to play and watch?",
      "Is being good at sport more about talent or hard work?",
      "Should boys and girls always play sport in separate teams?"
    ]
  },
  gaming: {
    label: "🎮 Gaming & Anime",
    color: "#C77DFF",
    bg: "rgba(199,125,255,0.12)",
    face: "🕹️",
    questions: [
      "Can video games teach you real skills, or are they mostly just fun?",
      "If you could live inside any video game or anime world, which would you pick?",
      "Which anime character would you most want as a best friend, and why?",
      "Should there be a daily time limit on video games? Who decides — you, your parents, or the government?",
      "Is watching anime or playing games a waste of time, or is it a good way to relax?"
    ]
  },
  movies: {
    label: "🎬 Movies & TV",
    color: "#FF6EB4",
    bg: "rgba(255,110,180,0.12)",
    face: "🍿",
    questions: [
      "If you could be a character in any movie, who would you be and why?",
      "What makes a movie really scary? Do you enjoy being scared?",
      "Is it okay to watch a movie that has already been spoiled for you?",
      "Would you rather star in a movie or direct one?",
      "What type of movie always makes you feel good after watching it?"
    ]
  },
  outdoor: {
    label: "🌿 Outdoor Adventures",
    color: "#3EFFD8",
    bg: "rgba(62,255,216,0.10)",
    face: "🌲",
    questions: [
      "Would you rather spend a free weekend in a city or out in nature?",
      "If you could go on any outdoor adventure, what would it be?",
      "Do you think spending time outside makes people happier? Why or why not?",
      "Would you rather explore a jungle, a snowy mountain, or a coral reef?",
      "Is it important to protect nature even if it means people can't use the land?"
    ]
  },
  family: {
    label: "🏠 Home & Family",
    color: "#FFE033",
    bg: "rgba(255,224,51,0.10)",
    face: "🏡",
    questions: [
      "What is one rule at home that you think is fair, and one you think is unfair?",
      "If your family could go anywhere in the world for a holiday, where would you go and why?",
      "What is something your parents do that you think you'll do differently when you're grown up?",
      "What's the best thing about where you live?",
      "If you could redesign your bedroom to be anything, what would it look like?",
      "Is it important to have family meals together, or does it not matter?"
    ]
  },
  wildcard: {
    label: "🃏 Wild Card",
    color: "#FF5E7A",
    bg: "rgba(255,94,122,0.12)",
    face: "🤯",
    questions: [
      "If animals could talk, which species do you think would have the most interesting things to say?",
      "Would you rather be the smartest person in the room or the most popular? Why?",
      "If you could have any superpower for just one day, what would you use it for?",
      "If you had to eat only one meal for the rest of your life, what would it be?",
      "What's one thing you're really good at that most people don't know about?",
      "If you could swap lives with anyone for a week, who would it be?"
    ]
  }
};

// ── SMART SHUFFLE ───────────────────────────────────────────────
function fisherYates(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const topicKeys = fisherYates(Object.keys(topics));
  const pools = {};
  topicKeys.forEach(k => { pools[k] = fisherYates(topics[k].questions); });

  const result = [];
  let lastTopic = null;
  let remaining = topicKeys.slice();

  while (remaining.some(k => pools[k].length > 0)) {
    let candidates = remaining.filter(k => pools[k].length > 0 && k !== lastTopic);
    if (candidates.length === 0) candidates = remaining.filter(k => pools[k].length > 0);
    const chosen = candidates[Math.floor(Math.random() * candidates.length)];
    result.push({ topic: chosen, question: pools[chosen].shift() });
    lastTopic = chosen;
  }
  return result;
}

// ── STORAGE ─────────────────────────────────────────────────────
const STORAGE_KEY = 'thinking_prompts_grade7_used';

function getUsedQuestions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveUsedQuestions(used) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(used)); } catch(e) {}
}
function clearUsedQuestions() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ── STATE ────────────────────────────────────────────────────────
let questions = [];
let current = 0;
let discussed = 0;

function init(isReset) {
  const used = isReset ? [] : getUsedQuestions();
  if (isReset) clearUsedQuestions();

  const all = buildQuestions();
  questions = all.filter(q => !used.includes(q.question));

  if (questions.length === 0 && !isReset) {
    showAllUsed();
    return;
  }

  current = 0;
  discussed = 0;
  render();
}

function showAllUsed() {
  document.getElementById('question-content').classList.add('hidden');
  const end = document.getElementById('end-screen');
  end.classList.add('visible');
  end.querySelector('h2').textContent = 'All Questions Used!';
  end.querySelector('p').textContent = 'Every question has been discussed across your sessions. Press Reset to start fresh!';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = 'All done!';
}

function render() {
  const q = questions[current];
  const t = topics[q.topic];

  const badge = document.getElementById('topic-badge');
  badge.textContent = t.label;
  badge.style.background = t.bg;
  badge.style.color = t.color;
  badge.style.borderColor = t.color.replace(')', ', 0.3)').replace('rgb', 'rgba');

  document.getElementById('thinking-face').textContent = t.face;

  const qEl = document.getElementById('question-text');
  qEl.textContent = q.question;
  qEl.className = 'question-text pop';

  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = 'Question ' + (current + 1) + ' of ' + questions.length;
  document.getElementById('counter-label').textContent = discussed + ' discussed';

  const card = document.getElementById('question-card');
  card.style.setProperty('--accent', t.color);
}

function nextQuestion() {
  const used = getUsedQuestions();
  used.push(questions[current].question);
  saveUsedQuestions(used);

  discussed++;
  current++;
  if (current >= questions.length) {
    showEnd();
    return;
  }
  render();
}

function showEnd() {
  document.getElementById('question-content').classList.add('hidden');
  document.getElementById('end-screen').classList.add('visible');
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = 'Session complete!';
  document.getElementById('counter-label').textContent = discussed + ' discussed today';
}

function restartTool() {
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('question-content').classList.remove('hidden');
  document.getElementById('end-screen').querySelector('h2').textContent = 'Great Thinking!';
  document.getElementById('end-screen').querySelector('p').innerHTML = "You've discussed all the questions.<br>Amazing thinking today — well done everyone!";
  init(true);
}

// ── STARS ────────────────────────────────────────────────────────
(function() {
  const s = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 1;
    star.style.cssText = 'width:'+size+'px;height:'+size+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--dur:'+(Math.random()*3+2)+'s;animation-delay:'+(Math.random()*4)+'s;';
    s.appendChild(star);
  }
})();

// ── FLOATING SYMBOLS ─────────────────────────────────────────────
(function() {
  const container = document.getElementById('floaters');
  const symbols = ['?', '?', '?', '💭', '?', '❓', '?', '💡', '?', '🤔', '?'];
  const colors = ['rgba(255,224,51,VAL)', 'rgba(91,200,255,VAL)', 'rgba(199,125,255,VAL)', 'rgba(62,232,138,VAL)', 'rgba(255,110,180,VAL)'];

  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'floater';
    const sym = symbols[Math.floor(Math.random() * symbols.length)];
    const col = colors[Math.floor(Math.random() * colors.length)];
    const opacity = (Math.random() * 0.18 + 0.06).toFixed(2);
    const size = Math.floor(Math.random() * 28 + 14);
    const left = Math.random() * 100;
    const top = Math.random() * 100;
    const dur = (Math.random() * 8 + 6).toFixed(1);
    const delay = (Math.random() * 10).toFixed(1);
    const rot = (Math.random() * 40 - 20).toFixed(0) + 'deg';
    el.textContent = sym;
    el.style.cssText = [
      'left:' + left + '%',
      'top:' + top + '%',
      'font-size:' + size + 'px',
      'color:' + col.replace('VAL', opacity),
      '--fdur:' + dur + 's',
      '--fdelay:-' + delay + 's',
      '--frot:' + rot,
      '--fopacity:' + opacity
    ].join(';');
    container.appendChild(el);
  }
})();

// ── KEYBOARD SHORTCUT ────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowRight') {
    e.preventDefault();
    if (!document.getElementById('end-screen').classList.contains('visible')) {
      nextQuestion();
    }
  }
});

// ── START ────────────────────────────────────────────────────────
init(false);
</script>
</body>
</html>
