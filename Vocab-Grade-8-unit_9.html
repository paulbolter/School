<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 9 – Be Your Own Life Coach | Vocabulary Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #C8960C;
    --gold-lt: #F0C429;
    --gold-dk: #7A5A00;
    --cream:   #FFF8E7;
    --amber:   #E8A800;
    --brown:   #3D2400;
    --red:     #D94F3D;
    --green:   #3A9E6E;
    --white:   #FFFDF5;
    --muted:   rgba(61,36,0,0.45);
    --border:  rgba(200,150,12,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1A0F00;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
    position: relative; overflow-x: hidden;
  }

  /* ── Background texture & gradients ── */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,150,12,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 85% 80%, rgba(184,120,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(120,80,0,0.12) 0%, transparent 70%),
      linear-gradient(160deg, #2A1600 0%, #1A0E00 40%, #0F0800 100%);
  }

  /* Floating orbs */
  .orb { position:fixed;border-radius:50%;filter:blur(90px);opacity:0.18;pointer-events:none;animation:orbFloat 14s ease-in-out infinite; }
  .orb1 { width:550px;height:550px;background:#C8960C;top:-120px;left:-180px; }
  .orb2 { width:420px;height:420px;background:#A07000;bottom:-100px;right:-120px;animation-delay:-5s; }
  .orb3 { width:280px;height:280px;background:#F0C429;top:45%;left:65%;animation-delay:-9s; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(22px,-28px) scale(1.04);}66%{transform:translate(-14px,18px) scale(0.97);} }

  /* Gold dust particles */
  .dust-wrap { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0; }
  .dust { position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold-lt);animation:dustFloat var(--dur) ease-in-out infinite; }
  @keyframes dustFloat { 0%{opacity:0;transform:translateY(0) scale(0);}20%{opacity:0.7;}80%{opacity:0.4;}100%{opacity:0;transform:translateY(-80px) scale(1.5);} }

  /* ── Header ── */
  .header { text-align:center;margin-bottom:18px;position:relative;z-index:2; }
  .unit-badge {
    display:inline-block;
    background: linear-gradient(135deg, var(--gold), var(--amber));
    color: var(--brown);
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:12px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    padding:6px 22px;
    border-radius:50px;
    margin-bottom:14px;
    box-shadow:0 4px 24px rgba(200,150,12,0.45);
  }
  h1 {
    font-family:'Playfair Display', serif;
    font-size: clamp(22px, 4.5vw, 46px);
    color: var(--cream);
    line-height:1.15;
    text-shadow: 0 0 50px rgba(240,196,41,0.3);
  }
  h1 span { color: var(--gold-lt); }

  /* ── Progress ── */
  .progress-bar-wrap { width:100%;max-width:820px;margin:0 auto 14px;position:relative;z-index:2; }
  .progress-info { display:flex;justify-content:space-between;color:rgba(200,150,12,0.7);font-size:13px;font-weight:700;margin-bottom:8px; }
  .progress-track { height:8px;background:rgba(200,150,12,0.12);border-radius:10px;overflow:hidden;border:1px solid rgba(200,150,12,0.2); }
  .progress-fill { height:100%;background:linear-gradient(90deg,var(--gold-dk),var(--gold),var(--gold-lt));border-radius:10px;transition:width 0.5s ease;box-shadow:0 0 14px rgba(240,196,41,0.5); }

  /* ── Quiz Card ── */
  .quiz-card {
    background: rgba(255,248,220,0.05);
    backdrop-filter:blur(28px);
    -webkit-backdrop-filter:blur(28px);
    border:1px solid rgba(200,150,12,0.2);
    border-radius:32px;
    padding:clamp(24px,5vw,52px) clamp(20px,6vw,60px);
    width:100%;max-width:820px;
    position:relative;z-index:2;
    box-shadow:0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(240,196,41,0.15);
  }
  .quiz-card::before {
    content:'';position:absolute;top:-1px;left:60px;right:60px;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold-dk),var(--gold-lt),var(--amber),transparent);
    border-radius:0 0 4px 4px;
  }

  .word-label { font-size:12px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:rgba(200,150,12,0.55);margin-bottom:8px; }
  .word {
    font-family:'Playfair Display',serif;
    font-size:clamp(30px,6.5vw,70px);
    color:var(--cream);
    line-height:1.1;
    margin-bottom:8px;
    text-shadow:0 0 60px rgba(240,196,41,0.2);
  }
  .pos-badge {
    display:inline-block;
    font-size:12px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;
    color:var(--amber);
    background:rgba(200,150,12,0.12);
    border:1px solid rgba(200,150,12,0.25);
    padding:4px 14px;border-radius:50px;margin-bottom:28px;
  }

  /* ── Review badge ── */
  .review-badge {
    display:none;align-items:center;gap:8px;
    background:linear-gradient(135deg,#B8650A,#8B4500);
    color:var(--cream);
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:14px;letter-spacing:0.06em;
    padding:7px 20px;border-radius:50px;margin-bottom:16px;
    box-shadow:0 4px 18px rgba(184,101,10,0.55);
    animation:pulseAmber 1.8s ease-in-out infinite;
  }
  .review-badge.visible { display:inline-flex; }
  @keyframes pulseAmber {
    0%,100%{box-shadow:0 4px 18px rgba(184,101,10,0.55);}
    50%{box-shadow:0 6px 30px rgba(184,101,10,0.9);}
  }

  /* ── Options ── */
  .options { display:flex;flex-direction:column;gap:12px; }
  .option {
    background:rgba(255,248,220,0.05);
    border:2px solid rgba(200,150,12,0.15);
    border-radius:18px;
    padding:16px 22px;cursor:pointer;
    display:flex;align-items:flex-start;gap:14px;
    transition:all 0.2s;text-align:left;
  }
  .option:hover { background:rgba(200,150,12,0.1);border-color:rgba(200,150,12,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .option-letter {
    width:36px;height:36px;min-width:36px;border-radius:10px;
    background:rgba(200,150,12,0.12);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-size:17px;color:var(--gold-lt);
    transition:all 0.2s;border:1px solid rgba(200,150,12,0.2);
  }
  .option-text { font-size:clamp(14px,2vw,17px);font-weight:600;color:rgba(255,248,220,0.82);line-height:1.45;transition:all 0.2s;padding-top:5px; }

  .option.selected { border-color:var(--gold-lt);background:rgba(240,196,41,0.1); }
  .option.selected .option-letter { background:var(--gold-lt);color:var(--brown); }
  .option.correct { border-color:var(--green) !important;background:rgba(58,158,110,0.12) !important; }
  .option.correct .option-letter { background:var(--green) !important;color:#fff !important; }
  .option.correct .option-text { color:#6EE8AE !important;font-weight:700; }
  .option.wrong { border-color:var(--red) !important;background:rgba(217,79,61,0.1) !important;opacity:0.55; }
  .option.wrong .option-letter { background:var(--red) !important;color:white !important; }
  .option.wrong .option-text { color:rgba(255,220,210,0.4) !important; }
  .option.faded { opacity:0.25;transform:none !important; }
  .option.faded:hover { transform:none;border-color:rgba(200,150,12,0.15);background:rgba(255,248,220,0.05); }
  .option.disabled { cursor:default;pointer-events:none; }

  /* ── Buttons ── */
  .btn-row { display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;justify-content:center; }
  .btn { font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(15px,2.2vw,18px);border:none;border-radius:14px;padding:13px 34px;cursor:pointer;transition:all 0.2s; }
  .btn-reveal { background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--brown);box-shadow:0 8px 24px rgba(200,150,12,0.4);display:none; }
  .btn-reveal:hover { transform:translateY(-3px);box-shadow:0 14px 32px rgba(200,150,12,0.6); }
  .btn-reveal.visible { display:block; }
  .btn-next { background:linear-gradient(135deg,#5C3A00,#9A6500);color:var(--cream);border:1px solid rgba(200,150,12,0.35);box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none; }
  .btn-next:hover { transform:translateY(-3px);background:linear-gradient(135deg,#7A5000,#BF8A00); }
  .btn-next.visible { display:block; }
  .btn-review { background:linear-gradient(135deg,#B8650A,#8B4500);color:var(--cream);box-shadow:0 8px 24px rgba(184,101,10,0.45);display:none; }
  .btn-review:hover { transform:translateY(-3px);box-shadow:0 14px 32px rgba(184,101,10,0.65); }
  .btn-review.visible { display:inline-block; }

  .score-area { display:flex;gap:20px;justify-content:center;margin-top:20px;flex-wrap:wrap; }
  .score-pill { display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:rgba(200,150,12,0.6);background:rgba(200,150,12,0.07);border:1px solid rgba(200,150,12,0.15);padding:7px 16px;border-radius:50px; }
  .dot { width:10px;height:10px;border-radius:50%; }
  .dot-correct { background:var(--green);box-shadow:0 0 8px var(--green); }
  .dot-wrong { background:var(--red);box-shadow:0 0 8px var(--red); }

  /* ── Animations ── */
  .pop { animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { 0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;} }
  .slide-up { animation:slideUp 0.35s ease; }
  @keyframes slideUp { 0%{transform:translateY(16px);opacity:0;}100%{transform:translateY(0);opacity:1;} }

  /* ── End Screen ── */
  .end-screen { text-align:center;display:none; }
  .end-screen.visible { display:block; }
  .end-screen .big-emoji { font-size:80px;margin-bottom:16px;animation:popIn 0.5s ease; }
  .end-screen h2 { font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,52px);color:var(--gold-lt);margin-bottom:10px; }
  .end-screen p { font-size:18px;color:rgba(255,248,220,0.65);margin-bottom:28px; }
  .end-score { font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,72px);color:var(--cream);margin-bottom:24px; }
  .end-score span { color:var(--gold-lt); }
  .quiz-content.hidden { display:none; }

  /* Gold shimmer line decoration */
  .shimmer-line {
    width:120px;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold-lt),transparent);
    margin:0 auto 24px;
    animation:shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.4;transform:scaleX(0.7);}50%{opacity:1;transform:scaleX(1.1);} }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="dust-wrap" id="dust-wrap"></div>

<div class="header">
  <div class="unit-badge">✨ Vocabulary Quiz</div>
  <h1>Unit 9 · <span>Be Your Own Life Coach</span></h1>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progress-label">Question 1 of 15</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-card">
  <div class="quiz-content" id="quiz-content">
    <div class="word-label">What does this word / expression mean?</div>
    <div class="word" id="word-display">—</div>
    <div class="pos-badge" id="pos-display">expression</div>
    <div class="review-badge" id="review-badge">⚠️ REVIEW — you missed this one!</div>
    <div class="options" id="options-container"></div>
    <div class="btn-row">
      <button class="btn btn-reveal" id="btn-reveal" onclick="reveal()">🔍 Reveal Answer</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Next Word ➜</button>
    </div>
    <div class="score-area">
      <div class="score-pill"><div class="dot dot-correct"></div><span id="correct-count">0 correct</span></div>
      <div class="score-pill"><div class="dot dot-wrong"></div><span id="wrong-count">0 wrong</span></div>
    </div>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="big-emoji" id="end-emoji">🎉</div>
    <h2 id="end-title">Quiz Complete!</h2>
    <div class="shimmer-line"></div>
    <p id="end-message">Great work on Unit 9 vocabulary!</p>
    <div class="end-score">You scored <span id="final-score">—</span></div>
    <div id="end-review-note" style="font-size:15px;color:rgba(240,196,41,0.85);margin-bottom:20px;display:none;"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-review" id="btn-start-review" onclick="startReview()" style="display:none">⚠️ Review Missed Words</button>
      <button class="btn btn-next visible" onclick="restartQuiz()" style="display:inline-block">🔄 Play Again</button>
    </div>
  </div>
</div>

<script>
// ── VOCABULARY ────────────────────────────────────────
const vocab = [
  { word: "over-dramatize", pos: "verb",
    correct: "To make something seem much more serious or exciting than it really is",
    wrong: ["To rehearse a performance many times before showing it to an audience",
            "To speak very quietly so that other people cannot hear what you are saying"] },

  { word: "out of touch", pos: "expression",
    correct: "Not knowing or understanding what is happening or how people feel nowadays",
    wrong: ["Unable to reach someone because they are travelling in another country",
            "Feeling nervous about meeting someone you have not seen for a long time"] },

  { word: "unreasonable", pos: "adjective",
    correct: "Not fair or sensible; asking for or expecting too much from others",
    wrong: ["Unable to understand instructions even after they have been explained clearly",
            "Feeling confused and unsure about what decision to make in a situation"] },

  { word: "overreact", pos: "verb",
    correct: "To respond to something with too much emotion or in a way that is too extreme",
    wrong: ["To think about a problem very carefully before deciding what to do",
            "To refuse to take part in an activity because you disagree with it"] },

  { word: "live up to expectations", pos: "expression",
    correct: "To be as good as people hoped or believed you would be",
    wrong: ["To work very hard in order to impress people who are watching you",
            "To set yourself difficult goals and try to achieve them over time"] },

  { word: "dwell on the past", pos: "expression",
    correct: "To spend too much time thinking or talking about things that have already happened",
    wrong: ["To study history carefully in order to understand the present better",
            "To remember a happy time in your life and feel grateful for it"] },

  { word: "blame others", pos: "expression",
    correct: "To say that other people are responsible for something bad that has happened",
    wrong: ["To ask for help from the people around you when you are in difficulty",
            "To forgive someone after they have done something wrong to you"] },

  { word: "quarrel", pos: "verb",
    correct: "To have an angry argument with someone, often about something unimportant",
    wrong: ["To discuss a serious problem in a calm and organised way",
            "To feel upset after someone has said something unkind about you"] },

  { word: "jump to conclusions", pos: "expression",
    correct: "To decide something is true too quickly, without knowing all the facts",
    wrong: ["To surprise everyone by achieving something that seemed impossible",
            "To think very carefully about all possible answers before choosing one"] },

  { word: "exaggerate", pos: "verb",
    correct: "To make something sound bigger, better, worse, or more important than it really is",
    wrong: ["To copy someone else's idea and present it as if it were your own",
            "To speak very fast so that people find it difficult to understand you"] },

  { word: "assert yourself", pos: "expression",
    correct: "To speak and behave in a confident way so that people take notice of your opinions",
    wrong: ["To volunteer to take on extra responsibilities at school or at work",
            "To practise a skill repeatedly until you become very good at it"] },

  { word: "to be diplomatic", pos: "expression",
    correct: "To deal with people carefully and tactfully, so as not to upset or offend them",
    wrong: ["To represent your country in official meetings with other governments",
            "To avoid getting involved in other people's arguments or problems"] },

  { word: "aspirations", pos: "noun (plural)",
    correct: "Strong hopes and ambitions to achieve something important in the future",
    wrong: ["The skills and qualifications needed to apply for a particular job",
            "The reasons given to explain why something did not go as planned"] },

  { word: "dignity", pos: "noun",
    correct: "A calm, serious manner that makes people respect you and treat you well",
    wrong: ["The ability to make other people laugh and feel comfortable around you",
            "A strong feeling of pride about the country or group you belong to"] },

  { word: "precisely", pos: "adverb",
    correct: "Exactly and accurately, with no mistakes or vagueness",
    wrong: ["In a way that is easy for everyone to understand without explanation",
            "Very slowly and carefully, so as not to make any noise"] }
];

// ── QUIZ STATE ────────────────────────────────────────
let questions   = [];
let current     = 0;
let score       = 0;
let correct     = 0;
let wrong       = 0;
let answered    = false;
let missedWords = [];
let isReviewMode = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildQuestions() {
  const shuffledVocab = shuffle(vocab);
  // Guarantee even spread: 5 A's, 5 B's, 5 C's (for 15 questions)
  const positions = [];
  const perSlot = Math.floor(shuffledVocab.length / 3);
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < perSlot; j++) positions.push(i);
  }
  while (positions.length < shuffledVocab.length) {
    positions.push(Math.floor(Math.random() * 3));
  }
  const shuffledPositions = shuffle(positions);

  questions = shuffledVocab.map(function(v, idx) {
    const correctPos = shuffledPositions[idx];
    const wrongOpts = shuffle([
      { text: v.wrong[0], isCorrect: false },
      { text: v.wrong[1], isCorrect: false }
    ]);
    const opts = wrongOpts.slice();
    opts.splice(correctPos, 0, { text: v.correct, isCorrect: true });
    return { word: v.word, pos: v.pos, opts: opts };
  });
}

function render() {
  answered = false;
  const q = questions[current];
  const wordEl = document.getElementById('word-display');
  wordEl.textContent = q.word;
  wordEl.className = 'word pop';
  document.getElementById('pos-display').textContent = q.pos;

  const total = questions.length;
  const label = isReviewMode ? 'Review ' : 'Question ';
  document.getElementById('progress-label').textContent = label + (current + 1) + ' of ' + total;
  document.getElementById('score-label').textContent = isReviewMode ? '⚠️ Review Mode' : 'Score: ' + score;
  document.getElementById('progress-fill').style.width = ((current / total) * 100) + '%';

  const badge = document.getElementById('review-badge');
  if (isReviewMode) { badge.classList.add('visible'); } else { badge.classList.remove('visible'); }

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  container.className = 'options slide-up';
  const letters = ['A', 'B', 'C'];
  q.opts.forEach(function(opt, i) {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.correct = opt.isCorrect;
    div.innerHTML = '<div class="option-letter">' + letters[i] + '</div><div class="option-text">' + opt.text + '</div>';
    div.addEventListener('click', function() { selectOption(div, opt.isCorrect); });
    container.appendChild(div);
  });
  document.getElementById('btn-reveal').classList.remove('visible');
  document.getElementById('btn-next').classList.remove('visible');
}

function selectOption(el, isCorrect) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option').forEach(function(o) { o.classList.add('disabled'); });
  el.classList.add('selected');
  if (isCorrect) {
    el.classList.add('correct');
    score++; correct++;
    document.querySelectorAll('.option').forEach(function(o) { if (o !== el) o.classList.add('faded'); });
    document.getElementById('btn-next').classList.add('visible');
  } else {
    el.classList.add('wrong');
    wrong++;
    document.getElementById('btn-reveal').classList.add('visible');
  }
  document.getElementById('correct-count').textContent = correct + ' correct';
  document.getElementById('wrong-count').textContent = wrong + ' wrong';
  document.getElementById('score-label').textContent = isReviewMode ? '⚠️ Review Mode' : 'Score: ' + score;
}

function reveal() {
  if (!isReviewMode) {
    const q = questions[current];
    const vocabEntry = vocab.find(function(v) { return v.word === q.word; });
    if (vocabEntry && !missedWords.find(function(m) { return m.word === vocabEntry.word; })) {
      missedWords.push(vocabEntry);
    }
  }
  document.querySelectorAll('.option').forEach(function(o) {
    if (o.dataset.correct === 'true') { o.classList.add('correct'); o.classList.remove('faded'); }
    else if (!o.classList.contains('wrong')) { o.classList.add('faded'); }
  });
  document.getElementById('btn-reveal').classList.remove('visible');
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) { showEnd(); return; }
  render();
}

function showEnd() {
  document.getElementById('quiz-content').classList.add('hidden');
  document.getElementById('end-screen').classList.add('visible');

  if (isReviewMode) {
    document.getElementById('end-emoji').textContent = '✅';
    document.getElementById('end-title').textContent = 'Review Complete!';
    document.getElementById('end-message').textContent = 'Well done for going back over the tricky ones!';
    document.getElementById('final-score').textContent = 'All ' + questions.length + ' reviewed';
    document.getElementById('btn-start-review').style.display = 'none';
    document.getElementById('end-review-note').style.display = 'none';
  } else {
    const pct = Math.round((correct / questions.length) * 100);
    document.getElementById('final-score').textContent = correct + ' / ' + questions.length;
    let emoji = '🎉', title = 'Quiz Complete!', msg = 'Great work on Unit 9 vocabulary!';
    if (pct >= 80) { emoji = '🏆'; title = 'Outstanding!'; msg = 'You really know your Unit 9 vocabulary!'; }
    else if (pct >= 60) { emoji = '🎉'; title = 'Great job!'; msg = 'Good solid knowledge — keep practising!'; }
    else if (pct >= 40) { emoji = '💪'; title = 'Good effort!'; msg = 'Review the words you missed and try again!'; }
    else { emoji = '📚'; title = 'Keep studying!'; msg = 'Go back to Unit 9 and try the quiz again!'; }
    document.getElementById('end-emoji').textContent = emoji;
    document.getElementById('end-title').textContent = title;
    document.getElementById('end-message').textContent = msg;

    if (missedWords.length > 0) {
      const reviewBtn = document.getElementById('btn-start-review');
      reviewBtn.style.display = 'inline-block';
      const note = document.getElementById('end-review-note');
      note.style.display = 'block';
      note.textContent = '⚠️ You revealed the answer for ' + missedWords.length + ' word' + (missedWords.length > 1 ? 's' : '') + ' — want to practise them again?';
    }
  }
  document.getElementById('progress-fill').style.width = '100%';
}

function startReview() {
  isReviewMode = true;
  current = 0;
  questions = shuffle(missedWords).map(function(v) {
    const opts = shuffle([
      { text: v.correct, isCorrect: true },
      { text: v.wrong[0], isCorrect: false },
      { text: v.wrong[1], isCorrect: false }
    ]);
    return { word: v.word, pos: v.pos, opts: opts };
  });
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('quiz-content').classList.remove('hidden');
  render();
}

function restartQuiz() {
  current = 0; score = 0; correct = 0; wrong = 0;
  missedWords = []; isReviewMode = false;
  buildQuestions();
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('quiz-content').classList.remove('hidden');
  document.getElementById('correct-count').textContent = '0 correct';
  document.getElementById('wrong-count').textContent = '0 wrong';
  render();
}

// ── GOLD DUST PARTICLES ───────────────────────────────
(function() {
  const wrap = document.getElementById('dust-wrap');
  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.cssText =
      'left:' + (Math.random() * 100) + '%;' +
      'top:' + (Math.random() * 100) + '%;' +
      '--dur:' + (Math.random() * 6 + 5) + 's;' +
      'animation-delay:' + (Math.random() * 8) + 's;' +
      'opacity:0;';
    wrap.appendChild(d);
  }
})();

// ── INIT ──────────────────────────────────────────────
buildQuestions();
render();

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    if (document.getElementById('btn-next').classList.contains('visible')) nextQuestion();
    else if (document.getElementById('btn-reveal').classList.contains('visible')) reveal();
  }
});
</script>
</body>
