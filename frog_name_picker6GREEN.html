<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frog Name Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #a8e063 0%, #56ab2f 50%, #2d7a1f 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Pond / lily pad decorations */
  .pond {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 180px;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, #2196a8 0%, #1a7a80 60%, transparent 100%);
    border-radius: 50% 50% 0 0 / 30% 30% 0 0;
  }

  .lily {
    position: absolute;
    border-radius: 50% 0 50% 50%;
    opacity: 0.7;
  }
  .lily1 { width: 80px; height: 80px; background: #3cb371; bottom: 40px; left: 8%; transform: rotate(-20deg); }
  .lily2 { width: 60px; height: 60px; background: #228b22; bottom: 20px; right: 12%; transform: rotate(30deg); }
  .lily3 { width: 50px; height: 50px; background: #3cb371; bottom: 50px; right: 28%; transform: rotate(-10deg); }

  /* Bubbles background */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.5; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
  }

  /* Main frog container */
  .frog-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .frog-img {
    width: min(75vw, 75vh);
    height: min(75vw, 75vh);
    object-fit: contain;
    filter: drop-shadow(0 12px 30px rgba(0,80,0,0.5));
    transition: transform 0.1s ease;
    animation: idle 3s ease-in-out infinite;
  }

  @keyframes idle {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }

  .frog-img.bounce {
    animation: bounce 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  @keyframes bounce {
    0%   { transform: scale(1) translateY(0); }
    25%  { transform: scale(1.12, 0.9) translateY(4px); }
    50%  { transform: scale(0.93, 1.1) translateY(-30px); }
    75%  { transform: scale(1.05, 0.95) translateY(6px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* Speech bubble */
  .speech-bubble {
    position: absolute;
    top: -60px;
    left: 52%;
    background: white;
    border-radius: 28px;
    padding: 24px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 8vw, 6rem);
    color: #2d7a1f;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    opacity: 0;
    transform: scale(0.15) translateY(30px);
    transform-origin: bottom left;
    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    z-index: 10;
    border: 5px solid #56ab2f;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -22px;
    left: 28px;
    border: 12px solid transparent;
    border-top-color: #56ab2f;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -15px;
    left: 30px;
    border: 10px solid transparent;
    border-top-color: white;
  }

  .speech-bubble.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* Hint text */
  .hint {
    position: fixed;
    bottom: 24px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    letter-spacing: 0.05em;
    animation: pulse 2s ease-in-out infinite;
    z-index: 20;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  /* Stars burst on pick */
  .star {
    position: fixed;
    pointer-events: none;
    font-size: 2rem;
    animation: starfly 1s ease-out forwards;
    z-index: 30;
  }

  @keyframes starfly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
  }
</style>
</head>

<div class="hint">🐸 Press SPACEBAR or tap the frog to pick a name!</div>

<script>
  const names = [
    "Akramjon","Sador",
    "Xushnud","Shamshod","Otabek","Azizbek","Durbek","Davlat","Samandar"
  ];

  let deck = [];
  let lastPicked = null;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getNext() {
    if (deck.length === 0) deck = shuffle(names);
    // avoid repeating the last name if possible
    if (deck.length > 1 && deck[deck.length - 1] === lastPicked) {
      const idx = deck.findIndex(n => n !== lastPicked);
      if (idx !== -1) {
        const picked = deck.splice(idx, 1)[0];
        return picked;
      }
    }
    return deck.pop();
  }

  function spawnStars(x, y) {
    const emojis = ['⭐','🌟','✨','💚','🐸'];
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      const angle = (Math.PI * 2 / 8) * i;
      const dist = 80 + Math.random() * 80;
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function pick(cx, cy) {
    const name = getNext();
    lastPicked = name;

    const bubble = document.getElementById('bubble');
    const frogImg = document.getElementById('frogImg');

    // Instantly hide with no transition, then re-trigger the slow emerge
    bubble.style.transition = 'none';
    bubble.classList.remove('show');
    void bubble.offsetWidth; // force reflow so the reset is painted
    bubble.textContent = name;
    void bubble.offsetWidth; // force reflow again after text change
    bubble.style.transition = '';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bubble.classList.add('show');
      });
    });

    frogImg.classList.remove('bounce');
    void frogImg.offsetWidth;
    frogImg.classList.add('bounce');
    frogImg.addEventListener('animationend', () => {
      frogImg.classList.remove('bounce');
    }, { once: true });

    spawnStars(cx ?? window.innerWidth / 2, cy ?? window.innerHeight / 2);
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      pick(window.innerWidth / 2, window.innerHeight / 2);
    }
  });

  document.getElementById('frogWrap').addEventListener('click', (e) => {
    pick(e.clientX, e.clientY);
  });

  // Floating bubbles
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 10 + Math.random() * 40;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + 'vw';
    b.style.bottom = -size + 'px';
    b.style.animationDuration = (6 + Math.random() * 10) + 's';
    b.style.animationDelay = (Math.random() * 8) + 's';
    document.body.appendChild(b);
  }
</script>
</body>
</html>
