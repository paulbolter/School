<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Presidential Name Picker ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            /* Split background: dark mech left, warm rust right */
            background: linear-gradient(90deg,
                #0a0a14 0%,
                #0d1a2e 20%,
                #111827 35%,
                #1a1008 65%,
                #2d1a06 80%,
                #1a0e02 100%
            );
            background-attachment: fixed;
        }

        /* ── SIDE PANELS ── */
        .side-panel {
            position: fixed;
            top: 0;
            width: calc((100vw - 680px) / 2);
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .left-panel { left: 0; }
        .right-panel { right: 0; }
        .side-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            opacity: 0.88;
        }
        /* Gradient fade on inner edges to blend with centre */
        .left-panel::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 80px;
            background: linear-gradient(to right, transparent, #0d1a2e);
        }
        .right-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 80px;
            background: linear-gradient(to left, transparent, #1a1008);
        }
        @media (max-width: 900px) {
            .side-panel { display: none; }
        }



        /* ── MAIN CARD ── */
        .container {
            position: relative;
            z-index: 1;
            margin-top: 10px;
            max-width: 640px;
            width: 100%;
            border-radius: 0px;
            padding: 0;
            overflow: hidden;

            /* Split card: left half mech dark, right half rust warm */
            background: linear-gradient(90deg,
                rgba(8,12,28,0.95) 0%,
                rgba(15,20,40,0.92) 48%,
                rgba(35,18,5,0.92) 52%,
                rgba(28,14,4,0.95) 100%
            );

            border: 2px solid transparent;
            border-image: linear-gradient(180deg, #00d4ff 0%, #7c3aed 30%, #ffd700 70%, #ff6b00 100%) 1;
            box-shadow:
                0 0 40px rgba(0,212,255,0.25),
                0 0 40px rgba(255,107,0,0.15),
                inset 0 0 60px rgba(0,0,0,0.5);

            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }

        /* Corner bolts */
        .container::before, .container::after {
            content: '⬡';
            position: absolute;
            font-size: 22px;
            color: #00d4ff;
            z-index: 10;
            text-shadow: 0 0 8px #00d4ff;
        }
        .container::before { top: 4px; left: 8px; }
        .container::after  { bottom: 4px; right: 8px; color: #ffd700; text-shadow: 0 0 8px #ffd700; font-size: 18px; }

        .card-inner {
            padding: 28px 28px 22px 28px;
        }

        /* ── TITLE ── */
        h1 {
            font-family: 'Orbitron', monospace;
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.4em;
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1.4;
            /* Half blue laser, half rust gold */
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 40%, #ffd700 60%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            filter: drop-shadow(0 0 8px rgba(0,212,255,0.4));
        }

        /* ── DIVIDER LINE (centre split) ── */
        .split-divider {
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #ffd700, #ff6b00);
            margin: 0 0 16px 0;
            box-shadow: 0 0 10px rgba(0,212,255,0.5), 0 0 10px rgba(255,215,0,0.3);
            position: relative;
        }
        .split-divider::after {
            content: '⚡ VS ⚡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', monospace;
            font-size: 0.7em;
            color: #fff;
            background: #111;
            padding: 2px 10px;
            letter-spacing: 2px;
            font-weight: 700;
            border: 1px solid #7c3aed;
        }

        /* ── HERO ICONS ── */
        .hero-images {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .hero-img-wrap {
            width: 72px;
            height: 72px;
            overflow: hidden;
            border: 2px solid;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: default;
            transition: transform 0.3s, box-shadow 0.3s;
            clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
        }
        /* Alternating mech/rust */
        .hero-img-wrap:nth-child(odd)  { border-color: #00d4ff; background: linear-gradient(135deg, #0a0a1e, #1a2a4e); box-shadow: 0 0 12px rgba(0,212,255,0.5); }
        .hero-img-wrap:nth-child(even) { border-color: #ffd700; background: linear-gradient(135deg, #1a0e00, #2d1800); box-shadow: 0 0 12px rgba(255,215,0,0.5); }
        .hero-img-wrap:hover {
            transform: scale(1.2) rotate(5deg);
            box-shadow: 0 0 24px rgba(0,212,255,0.8);
        }

        /* ── PICK BUTTON ── */
        .pick-button {
            width: auto;
            display: block;
            padding: 14px 48px;
            font-size: 1.3em;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 12px auto;
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 40%, #ffd700 60%, #ff6b00 100%);
            background-size: 300% 100%;
            animation: laserShift 3s ease-in-out infinite;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 20px rgba(255,107,0,0.3);
            border: none;
            cursor: pointer;
            clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0% calc(100% - 8px), 0% 8px);
            transition: transform 0.2s, box-shadow 0.2s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        @keyframes laserShift {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 100% 0%; }
            100% { background-position: 0% 0%; }
        }
        .pick-button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 35px rgba(0,212,255,0.8), 0 0 35px rgba(255,107,0,0.6);
        }
        .pick-button:active { transform: translateY(0) scale(0.98); }

        /* ── SMALL BUTTONS ── */
        button {
            padding: 10px 18px;
            border-radius: 2px;
            border: 1px solid #7c3aed;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(124,58,237,0.15);
            color: #c4b5fd;
            letter-spacing: 1px;
        }
        button:hover {
            background: rgba(124,58,237,0.35);
            box-shadow: 0 0 10px rgba(124,58,237,0.5);
        }

        /* ── SELECTED NAME DISPLAY ── */
        .selected-student-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 16px 0;
            min-height: 130px;
        }

        .selected-student {
            background: linear-gradient(90deg,
                rgba(0,20,50,0.95) 0%,
                rgba(10,10,30,0.95) 48%,
                rgba(40,20,5,0.95) 52%,
                rgba(30,15,3,0.95) 100%
            );
            color: white;
            padding: 22px 40px;
            text-align: center;
            font-size: 2.1em;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            min-width: 260px;
            max-width: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            border-image: linear-gradient(90deg, #00d4ff, #7c3aed, #ffd700, #ff6b00) 1;
            box-shadow:
                0 0 25px rgba(0,212,255,0.3),
                0 0 25px rgba(255,107,0,0.2),
                inset 0 0 30px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            clip-path: polygon(12px 0%, calc(100% - 12px) 0%, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0% calc(100% - 12px), 0% 12px);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Scan shimmer */
        .selected-student::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(0,212,255,0.08), transparent);
            animation: scanShimmer 3s linear infinite;
        }
        @keyframes scanShimmer { to { left: 160%; } }

        .selected-student > * { position: relative; z-index: 1; }
        .placeholder { font-family: 'Rajdhani', sans-serif; font-size: 0.45em; opacity: 0.7; letter-spacing: 2px; color: #a5f3fc; }

        .selected-student.is-spinning {
            animation: spinWheel 0.15s linear infinite;
            border-image: linear-gradient(90deg, #ff0080, #00d4ff, #ff6b00, #ffd700) 1;
        }
        @keyframes spinWheel {
            0%   { transform: rotateY(0deg) scale(1.0); }
            50%  { transform: rotateY(180deg) scale(0.85); }
            100% { transform: rotateY(360deg) scale(1.0); }
        }

        .selected-student.reveal {
            animation: revealPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
            box-shadow: 0 0 60px rgba(0,212,255,0.7), 0 0 60px rgba(255,215,0,0.5);
        }
        @keyframes revealPop {
            0%   { transform: scale(0.5) rotate(-5deg); opacity: 0.3; }
            60%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ── STUDENT LIST ── */
        .student-list {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            padding: 10px 0 6px;
        }

        .student-item {
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.25);
            color: #a5f3fc;
            padding: 6px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 1px;
            transition: all 0.25s;
            clip-path: polygon(4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px);
            text-transform: uppercase;
        }
        .student-item:hover {
            background: rgba(0,212,255,0.15);
            box-shadow: 0 0 8px rgba(0,212,255,0.4);
        }

        .student-item.last-picked {
            background: linear-gradient(90deg, rgba(0,212,255,0.2), rgba(255,215,0,0.2));
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
            font-weight: 700;
        }
        .student-item.excluded {
            background: rgba(124,58,237,0.08);
            border-color: rgba(124,58,237,0.2);
            color: rgba(196,181,253,0.35);
            text-decoration: line-through;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            margin-bottom: 8px;
            border-top: 1px solid rgba(0,212,255,0.2);
            border-bottom: 1px solid rgba(255,107,0,0.2);
        }
        .status-left {
            font-family: 'Orbitron', monospace;
            font-size: 0.6em;
            color: #00d4ff;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #00d4ff;
        }
        .status-right {
            font-family: 'Orbitron', monospace;
            font-size: 0.6em;
            color: #ffd700;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #ffd700;
        }

        /* ── CANVAS ── */
        canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>

    <canvas id="confettiCanvas"></canvas>

    <div class="container">
      <div class="card-inner">
        <h1>⚡ Presidential<br>Name Picker ⚡</h1>
        <div class="split-divider"></div>

        <div class="hero-images" id="heroImages"></div>

        <button class="pick-button" onclick="pickStudent()">▶ PICK STUDENT ◀</button>

        <div style="text-align:center; margin: 8px 0;">
            <button onclick="resetExcluded()" class="small-button reset-btn">↺ RESET ALL</button>
        </div>

        <div class="selected-student-wrap">
            <div id="selectedStudent" class="selected-student">
                <span class="placeholder">[ AWAITING SELECTION ]</span>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-left" id="statusLeft">◈ DECEPTICONS READY</span>
            <span class="status-right" id="statusRight">WALL·E ONLINE ◈</span>
        </div>

        <div id="studentList" class="student-list"></div>
      </div>
    </div>

    <script>
        const students = [
            'Sardor', 'Samandar', 'Durdona', 'Ifora', 'Setora',
            'Davlat', 'Xushnud', 'Akramjon', 'Shamshod', 'Otabek',
            'Azizbek', 'Durbek'
        ];

        let lastPicked = null;
        let temporarilyExcluded = [];

        const heroIcons = [
            { emoji: '🤖', label: 'Bot' },
            { emoji: '⚡', label: 'Power' },
            { emoji: '🔧', label: 'Wrench' },
            { emoji: '🚀', label: 'Rocket' },
            { emoji: '🛸', label: 'UFO' },
        ];

        function renderHeroImages() {
            const container = document.getElementById('heroImages');
            container.innerHTML = '';
            heroIcons.forEach(item => {
                const wrap = document.createElement('div');
                wrap.className = 'hero-img-wrap';
                wrap.title = item.label;
                wrap.textContent = item.emoji;
                container.appendChild(wrap);
            });
        }

        function updateStatus() {
            const total = students.length;
            const remaining = students.filter(s => !temporarilyExcluded.includes(s)).length;
            document.getElementById('statusLeft').textContent = `◈ TARGETS: ${remaining}/${total}`;
            document.getElementById('statusRight').textContent = `SCANNED: ${temporarilyExcluded.length} ◈`;
        }

        function displayStudentList() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';
            students.forEach(student => {
                const div = document.createElement('div');
                div.className = 'student-item';
                const isExcluded = temporarilyExcluded.includes(student);
                if (student === lastPicked && !isExcluded) div.classList.add('last-picked');
                if (isExcluded) div.classList.add('excluded');
                div.textContent = student;
                listDiv.appendChild(div);
            });
            updateStatus();
        }

        function resetExcluded() {
            temporarilyExcluded = [];
            displayStudentList();
        }

        function pickStudent() {
            const availableStudents = students.filter(s => !temporarilyExcluded.includes(s));
            if (availableStudents.length === 0) {
                alert('All students scanned! Click RESET ALL to start again.');
                return;
            }

            const displayElement = document.getElementById('selectedStudent');
            const spinTexts = ['◈ SCANNING ◈', '⚡ LOCKING ⚡', '▶ TARGET ◀', '🤖 CALC... 🤖', '◈◈◈◈◈◈'];

            displayElement.classList.remove('reveal');
            displayElement.classList.add('is-spinning');

            let spinCount = 0;
            const totalSpins = 22;

            const spinInterval = setInterval(() => {
                const randomStudent = availableStudents[Math.floor(Math.random() * availableStudents.length)];
                const txt = spinTexts[Math.floor(Math.random() * spinTexts.length)];
                displayElement.innerHTML = `<span>${txt} ${randomStudent}</span>`;
                spinCount++;

                if (spinCount >= totalSpins) {
                    clearInterval(spinInterval);
                    let finalPool = availableStudents.filter(s => s !== lastPicked);
                    if (finalPool.length === 0) finalPool = availableStudents;
                    const picked = finalPool[Math.floor(Math.random() * finalPool.length)];
                    lastPicked = picked;
                    if (!temporarilyExcluded.includes(picked)) temporarilyExcluded.push(picked);

                    displayElement.classList.remove('is-spinning');
                    displayElement.innerHTML = `<span>⚡ ${picked} ⚡</span>`;
                    void displayElement.offsetWidth;
                    displayElement.classList.add('reveal');

                    displayStudentList();
                    createConfetti();
                }
            }, 100);
        }

        function createConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const cx = canvas.width / 2, cy = canvas.height / 2;
            const pieces = [];
            const mechColors = ['#00d4ff','#7c3aed','#a78bfa','#0ea5e9','#6366f1'];
            const walleColors = ['#ffd700','#ff6b00','#f97316','#fbbf24','#d97706'];
            const allColors = [...mechColors, ...walleColors];

            for (let i = 0; i < 120; i++) {
                const angle = (Math.PI * 2 * i) / 120;
                const v = Math.random() * 9 + 5;
                pieces.push({
                    x: cx, y: cy,
                    size: Math.random() * 8 + 3,
                    speedX: Math.cos(angle) * v,
                    speedY: Math.sin(angle) * v - Math.random() * 4,
                    color: allColors[Math.floor(Math.random() * allColors.length)],
                    rotation: Math.random() * 360,
                    rotSpeed: Math.random() * 12 - 6,
                    gravity: 0.28,
                    isRect: Math.random() > 0.4,
                    opacity: 1
                });
            }
            // Emoji sparks
            const emojis = ['⚡','🤖','🔧','💥','⭐','🚀'];
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const v = Math.random() * 7 + 3;
                pieces.push({ x: cx, y: cy, emoji: emojis[Math.floor(Math.random()*emojis.length)],
                    size: 26, speedX: Math.cos(angle)*v, speedY: Math.sin(angle)*v - 2,
                    rotation: 0, rotSpeed: Math.random()*8-4, gravity: 0.22, opacity: 1 });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach((p, i) => {
                    p.speedY += p.gravity;
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.rotation += p.rotSpeed;
                    p.opacity = Math.max(0, p.opacity - 0.008);
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    if (p.emoji) {
                        ctx.font = p.size + 'px Arial';
                        ctx.fillText(p.emoji, -p.size/2, p.size/2);
                    } else {
                        ctx.fillStyle = p.color;
                        if (p.isRect) ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size*0.5);
                        else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
                    }
                    ctx.restore();
                    if (p.y > canvas.height + 50) pieces.splice(i, 1);
                });
                if (pieces.length > 0) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        window.onload = function() {
            renderHeroImages();
            displayStudentList();
        };
    </script>
