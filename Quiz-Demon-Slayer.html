<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demon Slayer Quiz — 鬼滅の刃</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c1a;
    --card: #161630;
    --card-border: rgba(120,200,180,0.15);
    --teal: #3ddbc4;
    --green: #2ecc71;
    --red: #e74c3c;
    --pink: #ff6b9d;
    --gold: #ffd166;
    --white: #f0f0f5;
    --muted: #8888aa;
    --ink: #cccce0;
    --correct-bg: rgba(46,204,113,0.12);
    --wrong-bg: rgba(231,76,60,0.12);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ANIMATED BACKGROUND */
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-orbs span { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.08; animation: orbFloat 20s ease-in-out infinite; }
  .bg-orbs span:nth-child(1) { width:500px;height:500px;background:var(--teal);top:-10%;left:-10%;animation-delay:0s; }
  .bg-orbs span:nth-child(2) { width:400px;height:400px;background:var(--pink);bottom:-10%;right:-5%;animation-delay:-7s; }
  .bg-orbs span:nth-child(3) { width:350px;height:350px;background:var(--gold);top:40%;left:50%;animation-delay:-14s; }
  @keyframes orbFloat {
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(30px,-40px) scale(1.08);}
    66%{transform:translate(-20px,30px) scale(0.95);}
  }

  /* FLOATING KANJI */
  .floaters { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1; }
  .floater {
    position:absolute; font-family:'Fredoka One',cursive;
    animation: floatUp var(--fdur) ease-in-out infinite;
    animation-delay: var(--fdelay); opacity:0; user-select:none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(var(--frot)) scale(0.8); opacity:0; }
    15% { opacity: var(--fopacity); }
    85% { opacity: var(--fopacity); }
    100% { transform: translateY(-120px) rotate(calc(var(--frot) + 20deg)) scale(1.1); opacity:0; }
  }

  /* CONTAINER */
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; position: relative; z-index: 2; }

  /* BANNER IMAGE */
  .banner-img {
    width: 100%; max-height: 260px; object-fit: cover; border-radius: 16px;
    margin-bottom: 20px; box-shadow: var(--shadow); display: none;
  }
  .banner-img.loaded { display: block; }

  /* TITLE BLOCK */
  .title-block { text-align:center; margin-bottom:24px; }
  .main-title {
    font-family:'Fredoka One',cursive; font-size: clamp(28px,6vw,52px);
    color: var(--white); line-height:1.1;
    text-shadow: 0 0 40px rgba(61,219,196,0.3); letter-spacing: 1px;
  }
  .main-sub {
    font-family:'DM Sans',sans-serif; font-size: 14px; color: var(--teal);
    letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; font-weight: 700;
  }

  /* PICKER */
  .picker-wrap { max-width: 820px; margin: 0 auto; }
  .picker-intro { text-align:center; color: var(--muted); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
  .section-list { display:flex; flex-direction:column; gap:10px; }
  .section-btn {
    background: var(--card); border: 1.5px solid var(--card-border); border-radius: 14px;
    padding: 16px 20px; cursor: pointer; display: flex; align-items: center;
    gap: 14px; transition: all 0.25s ease; text-align: left;
  }
  .section-btn:hover {
    border-color: var(--teal); background: rgba(61,219,196,0.06);
    transform: translateY(-2px); box-shadow: 0 6px 24px rgba(61,219,196,0.1);
  }
  .section-btn .emoji { font-size:28px; flex-shrink:0; }
  .section-btn .label { font-family:'Fredoka One',cursive; font-size: 16px; color: var(--white); }
  .section-btn .sublabel { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 500; }
  .section-btn .score-badge {
    margin-left: auto; font-size: 13px; font-weight: 700; color: var(--teal);
    background: rgba(61,219,196,0.1); padding: 4px 12px; border-radius: 20px; white-space: nowrap;
  }

  /* QUIZ LAYOUT — side image on desktop */
  .quiz-layout { display: flex; gap: 28px; align-items: flex-start; }
  .quiz-main { flex: 1; min-width: 0; max-width: 820px; }
  .quiz-sidebar { flex: 0 0 280px; position: sticky; top: 30px; }
  .sidebar-img {
    width: 100%; border-radius: 16px; box-shadow: var(--shadow);
    border: 1.5px solid var(--card-border); object-fit: cover; display: none;
  }
  .sidebar-img.loaded { display: block; }

  /* PROGRESS BAR */
  .progress-bar-wrap { width:100%; margin:0 auto 16px; position:relative; z-index:2; }
  .progress-info { display:flex; justify-content:space-between; color:var(--muted); font-size:13px; font-weight:700; margin-bottom:8px; }
  .progress-track { height:8px; background:rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
  .progress-fill {
    height:100%; background: linear-gradient(90deg, var(--teal), var(--pink), var(--gold));
    border-radius:10px; transition: width 0.5s ease; width: 0%;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card); border: 1.5px solid var(--card-border); border-radius: 18px;
    padding: 28px 24px; box-shadow: var(--shadow); animation: cardIn 0.35s ease;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .q-number { font-size:12px; color:var(--teal); letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-bottom:12px; }
  .q-text { font-size: 18px; font-weight: 700; color: var(--white); line-height: 1.5; margin-bottom: 20px; }

  /* OPTIONS */
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt-btn {
    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 14px 18px; color: var(--ink); font-size: 15px;
    font-weight: 500; cursor: pointer; transition: all 0.2s ease; text-align: left;
    font-family: 'DM Sans', sans-serif; line-height: 1.4;
  }
  .opt-btn:hover:not(.disabled) { border-color: var(--teal); background: rgba(61,219,196,0.08); color: var(--white); }
  .opt-btn.correct { border-color: var(--green); background: var(--correct-bg); color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: var(--wrong-bg); color: var(--red); }
  .opt-btn.disabled { cursor:default; opacity:0.6; }
  .opt-btn.disabled.correct { opacity:1; }

  /* FEEDBACK */
  .feedback { margin-top: 16px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; display: none; }
  .feedback.correct-fb { background: var(--correct-bg); border: 1px solid rgba(46,204,113,0.25); color: #8eedb8; display: block; }
  .feedback.wrong-fb { background: var(--wrong-bg); border: 1px solid rgba(231,76,60,0.25); color: #f5a8a0; display: block; }
  .feedback.opinion-fb { background: rgba(61,219,196,0.08); border: 1px solid rgba(61,219,196,0.2); color: var(--teal); display: block; }

  /* NEXT BUTTON */
  .next-btn {
    margin-top: 18px; background: linear-gradient(135deg, var(--teal), #2ab8a4); border: none;
    border-radius: 12px; padding: 14px 32px; color: #0c0c1a; font-family:'Fredoka One',cursive;
    font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: none; letter-spacing: 0.5px;
  }
  .next-btn:hover { transform:translateY(-2px); box-shadow: 0 6px 20px rgba(61,219,196,0.3); }
  .next-btn.show { display:inline-block; }

  /* RESULTS */
  .results-card {
    text-align: center; background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 18px; padding: 40px 24px; box-shadow: var(--shadow); animation: cardIn 0.35s ease;
  }
  .results-score { font-family:'Fredoka One',cursive; font-size: clamp(42px,8vw,64px); color: var(--teal); margin-bottom: 8px; }
  .results-label { font-size: 16px; color: var(--muted); margin-bottom: 24px; }
  .results-msg { font-size: 18px; color: var(--white); font-weight: 700; margin-bottom: 28px; line-height: 1.5; }
  .back-btn {
    background: transparent; border: 2px solid var(--teal); border-radius: 12px;
    padding: 12px 28px; color: var(--teal); font-family:'Fredoka One',cursive;
    font-size: 14px; cursor: pointer; transition: all 0.2s ease;
  }
  .back-btn:hover { background: var(--teal); color: var(--bg); }

  .hidden { display:none !important; }

  @media (max-width: 860px) {
    .quiz-sidebar { display: none; }
    .quiz-layout { gap: 0; }
    .container { max-width: 820px; }
  }
  @media (max-width: 600px) {
    .main-title { font-size: 24px; }
    .q-text { font-size: 16px; }
    .q-card { padding: 20px 16px; }
    .opt-btn { padding: 12px 14px; font-size: 14px; }
    .container { padding: 14px 10px 40px; }
    .banner-img { max-height: 180px; border-radius: 12px; }
  }
</style>
</head>

let currentSection = null, currentQ = 0, score = 0, shuffledQs = [], sectionScores = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function shuffleOptions(q) {
  if (q.ans === undefined) return { ...q, opts: shuffle(q.opts), ans: undefined };
  const correct = q.opts[q.ans]; const shuffled = shuffle(q.opts);
  return { ...q, opts: shuffled, ans: shuffled.indexOf(correct) };
}

function createFloaters() {
  const box = document.getElementById('floaters');
  const chars = ['鬼','滅','刃','柱','炎','水','雷','風','蛇','恋','霞','岩','蟲'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div'); el.className = 'floater';
    el.textContent = chars[Math.floor(Math.random() * chars.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.top = (20 + Math.random() * 70) + '%';
    el.style.fontSize = (14 + Math.random() * 22) + 'px';
    el.style.color = ['var(--teal)','var(--pink)','var(--gold)','var(--muted)'][Math.floor(Math.random()*4)];
    el.style.setProperty('--fdur', (6 + Math.random()*8) + 's');
    el.style.setProperty('--fdelay', (Math.random()*10) + 's');
    el.style.setProperty('--frot', (Math.random()*40 - 20) + 'deg');
    el.style.setProperty('--fopacity', (0.06 + Math.random()*0.12));
    box.appendChild(el);
  }
}

function renderPicker() {
  document.getElementById('picker').classList.remove('hidden');
  document.getElementById('quiz-view').classList.add('hidden');
  const b = document.getElementById('banner'); b.style.display = '';
  if (b.naturalWidth > 0) b.classList.add('loaded');
  const list = document.getElementById('section-list'); list.innerHTML = '';
  SECTIONS.forEach((sec, i) => {
    const btn = document.createElement('div'); btn.className = 'section-btn';
    const scoreTxt = sectionScores[sec.id] !== undefined ? `${sectionScores[sec.id]}/${sec.questions.length}` : '';
    btn.innerHTML = `<div class="emoji">${sec.emoji}</div><div><div class="label">${sec.title}</div><div class="sublabel">${sec.sub}</div></div>${scoreTxt ? `<div class="score-badge">${scoreTxt}</div>` : ''}`;
    btn.onclick = () => startSection(i); list.appendChild(btn);
  });
}

function startSection(idx) {
  currentSection = SECTIONS[idx]; currentQ = 0; score = 0;
  shuffledQs = shuffle(currentSection.questions).map(shuffleOptions);
  document.getElementById('picker').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  document.getElementById('banner').style.display = 'none';
  const sideImg = document.getElementById('sidebar-img');
  const imgFile = SECTION_IMAGES[currentSection.id];
  if (imgFile) { sideImg.src = imgFile; sideImg.alt = currentSection.title; sideImg.classList.remove('loaded'); sideImg.style.display = ''; }
  else { sideImg.style.display = 'none'; }
  renderQuestion();
}

function renderQuestion() {
  const sec = currentSection, total = shuffledQs.length, q = shuffledQs[currentQ];
  document.getElementById('section-label').textContent = `${sec.emoji} ${sec.title}`;
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = ((currentQ) / total * 100) + '%';
  const area = document.getElementById('q-area'); area.innerHTML = '';
  const card = document.createElement('div'); card.className = 'q-card';
  const numLabel = sec.opinion ? 'OPINION' : `QUESTION ${currentQ + 1}`;
  card.innerHTML = `<div class="q-number">${numLabel}</div><div class="q-text">${q.q}</div><div class="options" id="opts"></div><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn">${currentQ < total - 1 ? 'Next Question →' : 'See Results'}</button>`;
  area.appendChild(card);
  const optsBox = card.querySelector('#opts');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.textContent = opt;
    btn.onclick = () => handleAnswer(i, q, card); optsBox.appendChild(btn);
  });
  card.querySelector('#next-btn').onclick = () => { currentQ++; if (currentQ < total) renderQuestion(); else showResults(); };
}

function handleAnswer(chosen, q, card) {
  const btns = card.querySelectorAll('.opt-btn');
  const fb = card.querySelector('#feedback');
  const nextBtn = card.querySelector('#next-btn');
  btns.forEach(b => b.classList.add('disabled'));
  if (currentSection.opinion) {
    btns[chosen].style.borderColor = 'var(--teal)';
    btns[chosen].style.background = 'rgba(61,219,196,0.12)';
    btns[chosen].style.color = 'var(--teal)';
    fb.className = 'feedback opinion-fb'; fb.textContent = q.fb; score++;
  } else if (chosen === q.ans) {
    btns[chosen].classList.add('correct');
    fb.className = 'feedback correct-fb'; fb.innerHTML = `✓ ${q.fb}`; score++;
  } else {
    btns[chosen].classList.add('wrong'); btns[q.ans].classList.add('correct');
    fb.className = 'feedback wrong-fb'; fb.innerHTML = `✗ ${q.fb}`;
  }
  nextBtn.classList.add('show');
  setTimeout(() => nextBtn.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
}

function showResults() {
  const sec = currentSection, total = shuffledQs.length;
  document.getElementById('progress-fill').style.width = '100%';
  if (!sec.opinion) sectionScores[sec.id] = score;
  const pct = Math.round(score / total * 100);
  let msg = '';
  if (sec.opinion) msg = "Thanks for sharing your opinions! There are no wrong answers here.";
  else if (pct === 100) msg = "Perfect score! You really know your Demon Slayer! 🔥";
  else if (pct >= 80) msg = "Excellent! You'd make a fine member of the Corps!";
  else if (pct >= 60) msg = "Good work! You know the story well.";
  else if (pct >= 40) msg = "Not bad — maybe time for a rewatch?";
  else msg = "Looks like you need to watch more carefully next time!";
  const area = document.getElementById('q-area');
  area.innerHTML = `<div class="results-card"><div class="results-score">${score} / ${total}</div><div class="results-label">${sec.opinion ? 'Opinions shared' : 'Correct answers'}</div><div class="results-msg">${msg}</div><button class="back-btn" onclick="renderPicker()">← Back to Sections</button></div>`;
}

createFloaters();
renderPicker();
</script>
</body>
</html>
