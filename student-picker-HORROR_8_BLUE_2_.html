<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💀 8 BLUE – Class Roll</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Rajdhani:wght@400;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood:    #8b0000;
            --blood-bright: #cc0000;
            --blood-drip: #ff2222;
            --dark:   #050505;
            --dark-mid: #0f0a0a;
            --dark-red: #1a0000;
            --bone:   #d4c9a8;
            --sickly: #7a9e3a;
            --panel:  rgba(5,0,0,0.92);
            --fog:    rgba(120,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 15px 15px 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            position: relative;
            background:
                linear-gradient(180deg,
                    #000000 0%,
                    #080002 30%,
                    #0f0000 60%,
                    #050000 80%,
                    #000000 100%
                );
            background-attachment: fixed;
        }

        /* Blood drip at top */
        .blood-drip-bar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 80px;
            pointer-events: none; z-index: 0;
            background: linear-gradient(180deg, var(--blood) 0%, transparent 100%);
            opacity: 0.6;
        }
        /* SVG drip shapes */
        .blood-drips {
            position: fixed;
            top: 0; left: 0; width: 100%; pointer-events: none; z-index: 1;
        }

        /* Fog / mist at bottom */
        .fog-layer {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 30%;
            pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 50% 100%,
                rgba(80,0,0,0.35) 0%,
                rgba(20,0,0,0.15) 50%,
                transparent 100%);
            animation: fogPulse 8s ease-in-out infinite;
        }
        @keyframes fogPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Red moon */
        .moon {
            position: fixed;
            top: 40px; right: 80px;
            width: 90px; height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #cc2200, #660000 60%, #220000);
            box-shadow:
                0 0 40px rgba(180,0,0,0.6),
                0 0 100px rgba(100,0,0,0.3),
                inset 0 0 20px rgba(0,0,0,0.4);
            pointer-events: none; z-index: 0;
            animation: moonPulse 6s ease-in-out infinite;
        }
        @keyframes moonPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(180,0,0,0.6), 0 0 100px rgba(100,0,0,0.3); }
            50% { box-shadow: 0 0 70px rgba(200,0,0,0.8), 0 0 150px rgba(120,0,0,0.5); }
        }

        /* ---- Floating horror objects ---- */
        .floater {
            position: fixed;
            pointer-events: none; z-index: 0;
            opacity: 0.2;
            animation: drift 18s ease-in-out infinite;
        }
        @keyframes drift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25%  { transform: translateY(-20px) rotate(8deg); }
            50%  { transform: translateY(-35px) rotate(-4deg); }
            75%  { transform: translateY(-15px) rotate(10deg); }
        }

        /* Japanese horror text strips */
        .kanji-strip {
            position: fixed;
            top: 0;
            writing-mode: vertical-rl;
            font-size: 14px;
            color: var(--blood-bright);
            opacity: 0.07;
            pointer-events: none; z-index: 0;
            animation: fall linear infinite;
            letter-spacing: 8px;
            font-family: serif;
        }
        @keyframes fall {
            from { transform: translateY(-120%); }
            to   { transform: translateY(110vh); }
        }

        /* ---- Main container ---- */
        .container {
            position: relative; z-index: 1;
            max-width: 660px; width: 100%;
            margin-top: 50px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2px;
            border: 1px solid rgba(139,0,0,0.4);
            border-top: 5px solid var(--blood-bright);
            border-bottom: 5px solid var(--blood);
            box-shadow:
                0 0 0 1px rgba(139,0,0,0.1),
                0 0 60px rgba(139,0,0,0.25),
                0 0 120px rgba(100,0,0,0.12),
                0 20px 60px rgba(0,0,0,0.9);
            padding: 30px 28px 36px;
        }

        /* Cracked corner brackets */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            border: 2px solid var(--blood-bright);
            opacity: 0.6;
        }
        .container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .container::after  { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* ---- Title ---- */
        h1 {
            font-family: 'Creepster', cursive;
            color: var(--bone);
            text-align: center;
            font-size: 2.8em;
            letter-spacing: 6px;
            line-height: 1.15;
            text-shadow:
                0 0 20px var(--blood-bright),
                0 0 40px rgba(180,0,0,0.5),
                0 2px 0 rgba(0,0,0,0.9),
                3px 3px 0 rgba(100,0,0,0.4);
            margin-bottom: 4px;
        }
        h1 span.accent {
            color: var(--blood-bright);
            text-shadow: 0 0 20px var(--blood-bright), 0 0 50px rgba(200,0,0,0.6), 0 0 80px rgba(150,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.82em; font-weight: 600;
            color: rgba(200,150,150,0.35);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        /* ---- Hero icons ---- */
        .hero-images {
            display: flex; justify-content: center; gap: 12px;
            margin-bottom: 26px; flex-wrap: wrap;
        }
        .hero-img-wrap {
            width: 74px; height: 74px;
            background: rgba(80,0,0,0.15);
            border: 1px solid rgba(139,0,0,0.4);
            border-radius: 2px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px;
            transition: all 0.25s ease;
            cursor: default;
            position: relative; overflow: hidden;
        }
        .hero-img-wrap::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--blood), #330000);
            opacity: 0; transition: opacity 0.3s;
        }
        .hero-img-wrap:hover::before { opacity: 0.2; }
        .hero-img-wrap:hover {
            border-color: var(--blood-bright);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(139,0,0,0.4);
        }
        .hero-img-wrap span.emoji { font-size: 30px; position: relative; z-index: 1; }
        .hero-img-wrap span.label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.58em; font-weight: 700;
            color: rgba(200,150,150,0.45);
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative; z-index: 1;
        }

        /* ---- PICK button ---- */
        .pick-button {
            display: block; width: 100%;
            padding: 18px;
            font-family: 'Creepster', cursive;
            font-size: 1.6em;
            letter-spacing: 5px;
            color: var(--bone);
            background: linear-gradient(135deg, #3a0000 0%, #8b0000 50%, #4a0000 100%);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            position: relative; overflow: hidden;
            box-shadow:
                0 0 30px rgba(139,0,0,0.6),
                0 6px 20px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,100,100,0.15);
            transition: all 0.25s;
            margin-bottom: 14px;
            text-shadow: 0 0 15px rgba(255,80,80,0.6), 0 2px 4px rgba(0,0,0,0.8);
        }
        .pick-button::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,100,100,0.15), transparent);
            animation: btnShine 3.5s infinite;
        }
        @keyframes btnShine { 0% { left: -60%; } 40%, 100% { left: 110%; } }
        .pick-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(180,0,0,0.8), 0 10px 30px rgba(0,0,0,0.7);
            background: linear-gradient(135deg, #500000 0%, #aa0000 50%, #600000 100%);
        }
        .pick-button:active { transform: translateY(0); }

        /* ---- Reset button ---- */
        .reset-wrap { text-align: center; margin-bottom: 18px; }
        .reset-btn {
            background: transparent;
            border: 1px solid rgba(139,0,0,0.35);
            color: rgba(180,80,80,0.55);
            padding: 8px 22px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9em; font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            border-color: var(--blood-bright);
            color: var(--blood-bright);
            background: rgba(139,0,0,0.12);
            box-shadow: 0 0 15px rgba(139,0,0,0.25);
        }

        /* ---- Name display ---- */
        .selected-student-wrap {
            display: flex; justify-content: center; align-items: center;
            min-height: 130px; margin: 4px 0 18px;
            perspective: 600px;
        }
        .selected-student {
            background: linear-gradient(135deg, #0a0000 0%, #150000 60%, #0a0000 100%);
            color: var(--blood-bright);
            padding: 24px 52px;
            border-radius: 2px;
            text-align: center;
            font-family: 'Creepster', cursive;
            font-size: 2em;
            letter-spacing: 4px;
            display: inline-flex;
            align-items: center; justify-content: center;
            min-width: 280px;
            border: 2px solid rgba(139,0,0,0.5);
            box-shadow:
                0 0 40px rgba(139,0,0,0.18),
                0 0 80px rgba(100,0,0,0.08),
                inset 0 0 30px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
        }
        .selected-student::before {
            content: '';
            position: absolute;
            top: 15%; left: 10%; width: 30%; height: 30%;
            background: radial-gradient(ellipse, rgba(139,0,0,0.1), transparent);
            border-radius: 50%;
        }

        .placeholder {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.38em; font-weight: 600;
            color: rgba(139,0,0,0.4);
            letter-spacing: 5px;
        }

        /* Spinning state */
        .selected-student.is-spinning {
            animation: scanSpin 0.18s linear infinite;
            color: rgba(255,150,150,0.9);
            border-color: rgba(180,0,0,0.5);
            background: linear-gradient(135deg, #080000 0%, #120000 60%, #080000 100%);
        }
        @keyframes scanSpin {
            0%   { transform: rotateY(0deg); }
            25%  { transform: rotateY(90deg) scaleX(0.08); }
            50%  { transform: rotateY(180deg); }
            75%  { transform: rotateY(270deg) scaleX(0.08); }
            100% { transform: rotateY(360deg); }
        }

        /* Reveal */
        .selected-student.reveal {
            animation: blastIn 0.55s cubic-bezier(.22,.8,.36,1.4) forwards;
            color: var(--bone);
            border-color: var(--blood-bright);
            box-shadow:
                0 0 50px rgba(180,0,0,0.5),
                0 0 100px rgba(139,0,0,0.2),
                inset 0 0 30px rgba(0,0,0,0.7);
        }
        @keyframes blastIn {
            0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
            60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
            80%  { transform: scale(0.95) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ---- Student cards ---- */
        .student-list {
            display: flex; flex-wrap: wrap;
            justify-content: center;
            gap: 10px; margin-top: 4px;
        }
        .student-item {
            width: 86px; height: 86px;
            border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 0.8em;
            letter-spacing: 0.5px;
            line-height: 1.25; padding: 8px;
            color: rgba(210,180,180,0.85);
            border: 1px solid rgba(139,0,0,0.25);
            transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
            cursor: default;
            position: relative;
            text-transform: uppercase;
            word-break: break-word;
        }
        .student-item:nth-child(6n+1) { background: linear-gradient(145deg, #1a0000, #2a0505); border-color: rgba(180,0,0,0.35); }
        .student-item:nth-child(6n+2) { background: linear-gradient(145deg, #0a0000, #150000); border-color: rgba(100,0,0,0.3); }
        .student-item:nth-child(6n+3) { background: linear-gradient(145deg, #100005, #1a000a); border-color: rgba(150,0,20,0.35); }
        .student-item:nth-child(6n+4) { background: linear-gradient(145deg, #050010, #0a0018); border-color: rgba(60,0,80,0.3); }
        .student-item:nth-child(6n+5) { background: linear-gradient(145deg, #001005, #001a08); border-color: rgba(0,60,20,0.3); }
        .student-item:nth-child(6n+6) { background: linear-gradient(145deg, #0a0505, #150a0a); border-color: rgba(120,20,20,0.3); }

        /* Number overlay */
        .student-item::before {
            content: attr(data-num);
            position: absolute;
            top: 4px; right: 6px;
            font-size: 0.65em;
            color: rgba(180,50,50,0.2);
            font-family: monospace;
        }

        .student-item:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 8px 24px rgba(139,0,0,0.4);
            border-color: var(--blood-bright);
            z-index: 2;
            color: var(--bone);
        }
        .student-item.last-picked {
            background: linear-gradient(145deg, #2a0000, #400000) !important;
            border-color: var(--blood-bright) !important;
            box-shadow: 0 0 20px rgba(180,0,0,0.7), 0 0 40px rgba(120,0,0,0.3);
            animation: bloodGlow 1.8s ease-in-out infinite;
            color: var(--bone);
        }
        @keyframes bloodGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(180,0,0,0.6); }
            50%       { box-shadow: 0 0 35px rgba(200,0,0,1), 0 0 70px rgba(150,0,0,0.35); }
        }
        .student-item.excluded {
            background: rgba(255,255,255,0.02) !important;
            border-color: rgba(80,20,20,0.1) !important;
            color: rgba(120,60,60,0.25);
            text-decoration: line-through;
            box-shadow: none;
        }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }

        /* Flicker animation for atmosphere */
        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.6; }
            98% { opacity: 0.8; }
        }
        .container { animation: flicker 12s ease-in-out infinite; }

        /* =============================================
           SADAKO FACE — large close-up, sides of screen
           ============================================= */
        .sadako-face {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            height: 280px;
            pointer-events: none;
            z-index: 2;
            opacity: 0.62;
            animation: sadakoBreath 8s ease-in-out infinite;
        }
        .sadako-face.left  { left:  calc(50% - 480px); }
        .sadako-face.right { right: calc(50% - 480px); transform: translateY(-50%) scaleX(-1); }

        @keyframes sadakoBreath {
            0%, 100% { opacity: 0.62; }
            50%       { opacity: 0.38; }
        }
        .sadako-face.right {
            animation: sadakoBreathR 8s ease-in-out infinite, sadakoFlicker 20s ease-in-out infinite;
            animation-delay: 4s, 9s;
        }
        @keyframes sadakoBreathR {
            0%, 100% { opacity: 0.62; }
            50%       { opacity: 0.38; }
        }
        @keyframes sadakoFlicker {
            0%, 86%, 92%, 96%, 100% { opacity: 0.62; }
            89% { opacity: 0.03; }
            94% { opacity: 0.25; }
        }
    </style>
</head>

    <!-- Blood red moon -->
    <div class="moon"></div>

    <!-- Fog at bottom -->
    <div class="fog-layer"></div>

    <!-- Japanese horror text strips (curses, warnings) -->
    <div class="kanji-strip" style="left:4%; animation-duration:12s; animation-delay:0s;">呪怨死霊鬼血闇</div>

    <!-- Floating horror objects -->
    <div class="floater" style="top:8%;  left:4%;  font-size:32px; animation-delay:0s;   animation-duration:16s;">🔪</div>
    <div class="floater" style="top:20%; right:6%; font-size:28px; animation-delay:3s;   animation-duration:20s;">💀</div>
    <div class="floater" style="top:35%; left:2%;  font-size:36px; animation-delay:7s;   animation-duration:14s;">🩸</div>
    <div class="floater" style="top:55%; right:4%; font-size:24px; animation-delay:2s;   animation-duration:22s;">👁️</div>
    <div class="floater" style="top:70%; left:8%;  font-size:28px; animation-delay:5s;   animation-duration:18s;">🕯️</div>
    <div class="floater" style="top:15%; right:2%; font-size:22px; animation-delay:9s;   animation-duration:15s;">☠️</div>
    <div class="floater" style="top:45%; left:94%; font-size:30px; animation-delay:11s;  animation-duration:19s;">🩸</div>
    <div class="floater" style="top:80%; right:9%; font-size:26px; animation-delay:4s;   animation-duration:13s;">🔪</div>

    <canvas id="confettiCanvas"></canvas>

    <!-- ======= SADAKO FACES (Ring close-up) ======= -->

    <!-- LEFT FACE -->
    <svg class="sadako-face left" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="faceGradL" cx="50%" cy="45%" r="50%">
          <stop offset="0%"  stop-color="#c8c4bc" stop-opacity="0.9"/>
          <stop offset="60%" stop-color="#908c84" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#201c18" stop-opacity="0.4"/>

    <div class="container">
        <h1>💀 8 <span class="accent">BLUE</span> 💀</h1>

        <div class="hero-images" id="heroImages"></div>

        <button class="pick-button" onclick="pickStudent()">🔪 WHO WILL IT BE... 🩸</button>

        <div class="reset-wrap">
            <button onclick="resetExcluded()" class="reset-btn">☠ Reset All Students</button>
        </div>

        <div class="selected-student-wrap">
            <div id="selectedStudent" class="selected-student">
                <span class="placeholder">THE DARKNESS AWAITS...</span>
            </div>
        </div>

    <script>
        // ===== PUT YOUR STUDENT NAMES HERE =====
        const students = [
            'Azizbek', 'Masrur', 'Miraziz', 'Mahmud',
            'Iroda', 'Zarina', 'Jahongir', 'Shojahon',
            'Islom', 'Abror', 'Fayoz', 'Firdavs'
        ];
        // ========================================

        let lastPicked = null;
        let temporarilyExcluded = [];

        const heroImageSets = [
            { emoji: '🔪', label: 'Knife' },
            { emoji: '💀', label: 'Skull' },
            { emoji: '🩸', label: 'Blood' },
            { emoji: '👁️', label: 'Watching' },
            { emoji: '🕯️', label: 'Darkness' },
        ];

        function renderHeroImages() {
            const container = document.getElementById('heroImages');
            container.innerHTML = '';
            heroImageSets.forEach(item => {
                const wrap = document.createElement('div');
                wrap.className = 'hero-img-wrap';
                wrap.title = item.label;
                wrap.innerHTML = `<span class="emoji">${item.emoji}</span><span class="label">${item.label}</span>`;
                container.appendChild(wrap);
            });
        }

        function displayStudentList() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';
            students.forEach((student, idx) => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.setAttribute('data-num', String(idx + 1).padStart(2,'0'));
                const isExcluded = temporarilyExcluded.includes(student);
                if (student === lastPicked && !isExcluded) div.classList.add('last-picked');
                if (isExcluded) div.classList.add('excluded');
                div.innerHTML = `<span>${student}</span>`;
                listDiv.appendChild(div);
            });
        }

        function resetExcluded() {
            temporarilyExcluded = [];
            displayStudentList();
        }

        function pickStudent() {
            const availableStudents = students.filter(s => !temporarilyExcluded.includes(s));
            if (availableStudents.length === 0) {
                alert('All students have been chosen! Hit Reset to begin again... if you dare.');
                return;
            }

            const displayElement = document.getElementById('selectedStudent');
            let spinCount = 0;
            const totalSpins = 24;

            displayElement.classList.remove('reveal');
            displayElement.classList.add('is-spinning');

            const spinInterval = setInterval(() => {
                const randomName = availableStudents[Math.floor(Math.random() * availableStudents.length)];
                displayElement.innerHTML = `<span>${randomName}</span>`;
                spinCount++;

                if (spinCount >= totalSpins) {
                    clearInterval(spinInterval);

                    let finalPool = availableStudents.filter(s => s !== lastPicked);
                    if (finalPool.length === 0) finalPool = availableStudents;
                    const picked = finalPool[Math.floor(Math.random() * finalPool.length)];
                    lastPicked = picked;
                    if (!temporarilyExcluded.includes(picked)) temporarilyExcluded.push(picked);

                    displayElement.classList.remove('is-spinning');
                    displayElement.innerHTML = `<span>🔪 ${picked} 🩸</span>`;
                    void displayElement.offsetWidth;
                    displayElement.classList.add('reveal');

                    displayStudentList();
                    createBloodSplatter();
                }
            }, 90);
        }

        function createBloodSplatter() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const drips = [];
            const numDrips = 18 + Math.floor(Math.random() * 10);

            for (let i = 0; i < numDrips; i++) {
                const x = Math.random() * canvas.width;
                const startY = -20;
                const color = Math.random() < 0.75
                    ? `rgb(${140 + Math.floor(Math.random()*80)},${Math.floor(Math.random()*15)},${Math.floor(Math.random()*15)})`
                    : `rgb(80,0,0)`;

                drips.push({
                    x,
                    y: startY,
                    width: Math.random() * 10 + 5,
                    speed: Math.random() * 4 + 2,
                    length: 0,
                    maxLength: Math.random() * canvas.height * 0.55 + canvas.height * 0.15,
                    dripping: true,
                    settled: false,
                    settleTimer: 0,
                    settleMax: 60 + Math.floor(Math.random() * 80),
                    color,
                    delay: Math.floor(Math.random() * 40),
                    alpha: 1,
                });
            }

            let frame = 0;
            const fadeStartFrame = 160;
            const fadeDuration = 60;

            // Draw a tapered blood drip shape (wide at top, pointed at bottom)
            function drawTaperedDrip(ctx, x, y, width, length) {
                const halfW = width / 2;
                const taperLen = Math.min(length * 0.35, 40); // bottom portion that tapers
                const straightLen = length - taperLen;

                ctx.beginPath();
                // Top-left corner (rounded start)
                ctx.moveTo(x - halfW, y);
                // Left side straight down
                ctx.lineTo(x - halfW, y + straightLen);
                // Taper to a point
                ctx.quadraticCurveTo(x - halfW * 0.4, y + straightLen + taperLen * 0.7, x, y + length);
                // Back up the right side
                ctx.quadraticCurveTo(x + halfW * 0.4, y + straightLen + taperLen * 0.7, x + halfW, y + straightLen);
                // Right side straight up
                ctx.lineTo(x + halfW, y);
                ctx.closePath();
                ctx.fill();
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frame++;

                if (frame > fadeStartFrame + fadeDuration) {
                    return;
                }
                const globalAlpha = frame > fadeStartFrame
                    ? 1 - (frame - fadeStartFrame) / fadeDuration
                    : 1;

                drips.forEach(d => {
                    if (frame < d.delay) { return; }

                    ctx.save();
                    ctx.globalAlpha = globalAlpha;
                    ctx.fillStyle = d.color;
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = d.color;

                    if (d.dripping) {
                        d.length += d.speed;

                        drawTaperedDrip(ctx, d.x, d.y, d.width, d.length);

                        if (d.length >= d.maxLength) {
                            d.dripping = false;
                            d.settled = true;
                        }
                    } else if (d.settled) {
                        d.settleTimer++;
                        ctx.shadowBlur = 4;

                        drawTaperedDrip(ctx, d.x, d.y, d.width, d.maxLength);
                    }

                    ctx.restore();
                });

                if (frame <= fadeStartFrame + fadeDuration) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        window.onload = function() {
            renderHeroImages();
            displayStudentList();
        };
