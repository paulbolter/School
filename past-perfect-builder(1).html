<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Perfect Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF4DAF;
    --yellow: #FFD93D;
    --cyan: #00D4FF;
    --green: #6BCB77;
    --orange: #FF6B35;
    --purple: #A855F7;
    --bg: #FFF5F9;
    --card: #ffffff;
    --text: #1a1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,77,175,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(0,212,255,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,217,61,0.08) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--text);
    letter-spacing: -1px;
  }

  header h1 span {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: #666;
    font-size: 1rem;
    margin-top: 4px;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 10px;
    background: #e0e0e0;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Card */
  .card {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 680px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan), var(--green));
  }

  .sentence-num {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    color: var(--pink);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .prompt {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.5;
    background: #FFF5F9;
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 4px solid var(--pink);
  }

  /* Drop zone */
  .drop-zone-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .drop-zone {
    min-height: 70px;
    border: 2.5px dashed #ddd;
    border-radius: 16px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
    transition: border-color 0.2s, background 0.2s;
    background: #FAFAFA;
  }

  .drop-zone.drag-over {
    border-color: var(--purple);
    background: rgba(168,85,247,0.06);
  }

  .drop-zone.correct {
    border-color: var(--green);
    background: rgba(107,203,119,0.08);
    border-style: solid;
  }

  /* Word tiles */
  .word-bank-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .word-bank {
    min-height: 60px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 10px;
    background: #F5F5F5;
    border-radius: 16px;
    margin-bottom: 20px;
  }

  .tile {
    padding: 10px 16px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    border: none;
    color: white;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  }

  .tile:active { cursor: grabbing; }

  .tile.dragging {
    opacity: 0.4;
    transform: scale(0.95);
  }

  .tile.correct-tile {
    cursor: default;
  }

  /* Tile colours cycling */
  .tile-color-0 { background: linear-gradient(135deg, #FF4DAF, #e0399a); }
  .tile-color-1 { background: linear-gradient(135deg, #A855F7, #8B35d6); }
  .tile-color-2 { background: linear-gradient(135deg, #00D4FF, #00a8cc); }
  .tile-color-3 { background: linear-gradient(135deg, #FF6B35, #e05520); }
  .tile-color-4 { background: linear-gradient(135deg, #6BCB77, #4faa5b); }
  .tile-color-5 { background: linear-gradient(135deg, #FFD93D, #e5be20); color: #333 !important; }

  /* Feedback */
  .feedback {
    display: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 12px 18px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
  }

  .feedback.wrong {
    display: block;
    background: rgba(255,77,77,0.1);
    color: #cc2200;
    border: 2px solid rgba(255,77,77,0.3);
  }

  .feedback.success {
    display: block;
    background: rgba(107,203,119,0.15);
    color: #2e7d32;
    border: 2px solid rgba(107,203,119,0.4);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .btn:active { transform: translateY(0); }

  .btn-check {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    flex: 1;
  }

  .btn-reset {
    background: #f0f0f0;
    color: #666;
  }

  .btn-next {
    background: linear-gradient(135deg, var(--green), #3a9e48);
    color: white;
    flex: 1;
  }

  .btn-next.hidden {
    display: none;
  }

  /* Finished screen */
  #finished-screen {
    display: none;
    text-align: center;
    padding: 20px 0;
  }

  #finished-screen h2 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 10px;
  }

  .score-display {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 4rem;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }

  .score-msg {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 24px;
  }

  .btn-restart {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    font-size: 1.1rem;
    padding: 14px 32px;
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Touch hint */
  .touch-hint {
    text-align: center;
    font-size: 0.8rem;
    color: #bbb;
    margin-top: 12px;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <h1>Past Perfect <span>Builder</span> 🧩</h1>
  <p>Drag the words into the correct order!</p>
</header>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-label">Sentence 1 of 5</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="card" id="main-card">
  <div id="question-area">
    <div class="sentence-num" id="sentence-num">Sentence 1</div>
    <div class="prompt" id="prompt-text"></div>

    <div class="drop-zone-label">📝 Build your sentence here:</div>
    <div class="drop-zone" id="drop-zone"></div>

    <div class="word-bank-label">🔤 Word bank — drag from here:</div>
    <div class="word-bank" id="word-bank"></div>

    <div class="feedback" id="feedback"></div>

    <div class="btn-row">
      <button class="btn btn-reset" onclick="resetSentence()">↺ Reset</button>
      <button class="btn btn-check" id="btn-check" onclick="checkAnswer()">✓ Check</button>
      <button class="btn btn-next hidden" id="btn-next" onclick="nextSentence()">Next →</button>
    </div>
  </div>

  <div id="finished-screen">
    <div style="font-size:3rem">🎉</div>
    <h2>Well done!</h2>
    <div class="score-display" id="final-score"></div>
    <div class="score-msg" id="final-msg"></div>
    <button class="btn btn-restart" onclick="restartQuiz()">🔄 Play Again</button>
  </div>
</div>

<div class="touch-hint">💡 Tip: On a phone or tablet, tap and hold a word to drag it</div>

<script>
const sentences = [
  {
    prompt: "Mia was full because she had eaten too much pizza. 🍕\nPut the words in the right order:",
    words: ["She", "had", "eaten", "three", "whole", "slices."],
    answer: ["She", "had", "eaten", "three", "whole", "slices."]
  },
  {
    prompt: "Jake was tired at school because he hadn't slept much. 😴\nPut the words in the right order:",
    words: ["He", "had", "stayed", "up", "until", "midnight."],
    answer: ["He", "had", "stayed", "up", "until", "midnight."]
  },
  {
    prompt: "The team celebrated because they had won the match. ⚽\nPut the words in the right order:",
    words: ["They", "had", "never", "won", "before."],
    answer: ["They", "had", "never", "won", "before."]
  },
  {
    prompt: "Sofia was upset because someone had taken her pencil case. 😤\nPut the words in the right order:",
    words: ["Someone", "had", "taken", "it", "from", "her", "bag."],
    answer: ["Someone", "had", "taken", "it", "from", "her", "bag."]
  },
  {
    prompt: "Leo was excited — he had never been to a concert before! 🎸\nPut the words in the right order:",
    words: ["He", "had", "always", "wanted", "to", "go."],
    answer: ["He", "had", "always", "wanted", "to", "go."]
  }
];

let current = 0;
let score = 0;
let answered = false;

const COLORS = ['tile-color-0','tile-color-1','tile-color-2','tile-color-3','tile-color-4','tile-color-5'];

let dragSrc = null;
let dragFromZone = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildTile(word, index) {
  const div = document.createElement('div');
  div.className = `tile ${COLORS[index % COLORS.length]}`;
  div.textContent = word;
  div.draggable = true;
  div.dataset.word = word;

  // Desktop drag
  div.addEventListener('dragstart', e => {
    dragSrc = div;
    dragFromZone = div.parentElement.id;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  // Touch support
  let touchOffsetX, touchOffsetY, clone, originalParent;
  div.addEventListener('touchstart', e => {
    if (answered) return;
    const t = e.touches[0];
    const rect = div.getBoundingClientRect();
    touchOffsetX = t.clientX - rect.left;
    touchOffsetY = t.clientY - rect.top;
    originalParent = div.parentElement;
    clone = div.cloneNode(true);
    clone.style.cssText = `position:fixed;opacity:0.85;pointer-events:none;z-index:9998;width:${rect.width}px;`;
    document.body.appendChild(clone);
    div.style.opacity = '0.3';
    e.preventDefault();
  }, {passive: false});

  div.addEventListener('touchmove', e => {
    if (!clone) return;
    const t = e.touches[0];
    clone.style.left = (t.clientX - touchOffsetX) + 'px';
    clone.style.top = (t.clientY - touchOffsetY) + 'px';
    e.preventDefault();
  }, {passive: false});

  div.addEventListener('touchend', e => {
    if (!clone) return;
    clone.remove();
    div.style.opacity = '1';
    const t = e.changedTouches[0];
    const dropZone = document.getElementById('drop-zone');
    const wordBank = document.getElementById('word-bank');
    const dzRect = dropZone.getBoundingClientRect();
    const wbRect = wordBank.getBoundingClientRect();
    const x = t.clientX, y = t.clientY;
    if (x >= dzRect.left && x <= dzRect.right && y >= dzRect.top && y <= dzRect.bottom) {
      dropZone.appendChild(div);
    } else if (x >= wbRect.left && x <= wbRect.right && y >= wbRect.top && y <= wbRect.bottom) {
      wordBank.appendChild(div);
    }
    clone = null;
  });

  return div;
}

function loadSentence(index) {
  answered = false;
  const s = sentences[index];
  document.getElementById('sentence-num').textContent = `Sentence ${index + 1}`;
  document.getElementById('prompt-text').textContent = s.prompt;

  const dropZone = document.getElementById('drop-zone');
  const wordBank = document.getElementById('word-bank');
  const feedback = document.getElementById('feedback');
  dropZone.innerHTML = '';
  wordBank.innerHTML = '';
  feedback.className = 'feedback';
  feedback.textContent = '';
  dropZone.classList.remove('correct');

  document.getElementById('btn-check').style.display = '';
  document.getElementById('btn-next').classList.add('hidden');

  const shuffled = shuffle(s.words);
  shuffled.forEach((word, i) => {
    wordBank.appendChild(buildTile(word, i));
  });

  // Progress
  document.getElementById('prog-label').textContent = `Sentence ${index + 1} of ${sentences.length}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  const pct = (index / sentences.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// Drag-over for drop zone and word bank
function setupDropTarget(el) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('drag-over');
    e.dataTransfer.dropEffect = 'move';
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (dragSrc && dragSrc.parentElement !== el) {
      el.appendChild(dragSrc);
    }
  });
}

setupDropTarget(document.getElementById('drop-zone'));
setupDropTarget(document.getElementById('word-bank'));

function checkAnswer() {
  if (answered) return;
  const dropZone = document.getElementById('drop-zone');
  const tiles = [...dropZone.querySelectorAll('.tile')];
  const s = sentences[current];

  if (tiles.length !== s.answer.length) {
    showFeedback('wrong', `⚠️ You need to place all ${s.answer.length} words!`);
    return;
  }

  const attempt = tiles.map(t => t.dataset.word);
  const correct = attempt.every((w, i) => w === s.answer[i]);

  if (correct) {
    answered = true;
    score++;
    dropZone.classList.add('correct');
    tiles.forEach(t => t.classList.add('correct-tile'));
    showFeedback('success', '🎉 Brilliant! That\'s correct!');
    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-next').classList.remove('hidden');
    launchConfetti();
  } else {
    showFeedback('wrong', '❌ Not quite — try rearranging the words!');
  }
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + type;
  fb.textContent = msg;
}

function resetSentence() {
  if (answered) return;
  loadSentence(current);
}

function nextSentence() {
  current++;
  if (current >= sentences.length) {
    showFinished();
  } else {
    loadSentence(current);
  }
}

function showFinished() {
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('finished-screen').style.display = 'block';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Finished!';
  document.getElementById('score-label').textContent = `Score: ${score}`;

  document.getElementById('final-score').textContent = `${score} / ${sentences.length}`;
  const msgs = ['Keep practising — you\'ll get there! 💪', 'Good effort! Try again to improve! 😊', 'Nice work! Almost perfect! 🌟', 'Excellent! Nearly there! ⭐', 'Outstanding! Perfect score! 🏆'];
  document.getElementById('final-msg').textContent = msgs[Math.min(score, msgs.length - 1)];
  launchConfetti(200);
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('question-area').style.display = '';
  document.getElementById('finished-screen').style.display = 'none';
  loadSentence(0);
}

// Confetti
function launchConfetti(count = 80) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colours = ['#FF4DAF','#FFD93D','#00D4FF','#6BCB77','#FF6B35','#A855F7'];
  const pieces = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 5 + Math.random() * 6,
    d: 2 + Math.random() * 4,
    color: colours[Math.floor(Math.random() * colours.length)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltSpeed: 0.1 + Math.random() * 0.1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  }));

  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.y += p.d;
      p.tiltAngle += p.tiltSpeed;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (p.y < canvas.height + 20) alive = true;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      if (p.shape === 'circle') {
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.tilt * Math.PI / 180);
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
        ctx.restore();
        return;
      }
      ctx.fill();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  cancelAnimationFrame(frame);
  draw();
}

// Init
loadSentence(0);
</script>
</body>
</html>
