<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Jizzax Protocol: Name Selector ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; align-items: stretch;
            background-color: #0b0c10; color: #45f3ff; overflow-x: hidden;
            background-image: linear-gradient(rgba(69, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(69, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 4px, 3px 100%; z-index: 999; pointer-events: none; opacity: 0.4;
        }

        .laser-beam { position: fixed; width: 150px; height: 2px; background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; opacity: 0; pointer-events: none; z-index: 0; }
        .laser-beam:nth-child(1) { top: 15%; left: -20%; animation: fireLaser 4s 1s infinite; background: #00ffcc; box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; }
        .laser-beam:nth-child(2) { top: 60%; left: -20%; animation: fireLaser 6s 3.5s infinite; }
        .laser-beam:nth-child(3) { top: 80%; right: -20%; animation: fireLaserReverse 5s 2s infinite; background: #ffea00; box-shadow: 0 0 10px #ffea00; }
        @keyframes fireLaser { 0%{opacity:0;transform:translateX(0)} 5%{opacity:1} 15%{opacity:1;transform:translateX(120vw)} 16%,100%{opacity:0} }
        @keyframes fireLaserReverse { 0%{opacity:0;transform:translateX(0)} 5%{opacity:1} 15%{opacity:1;transform:translateX(-120vw)} 16%,100%{opacity:0} }

        .bg-float { position: fixed; opacity: 0.15; color: #45f3ff; animation: pulseTech 4s ease-in-out infinite alternate; pointer-events: none; z-index: 0; font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 2px; }
        @keyframes pulseTech { 0%{opacity:0.1;text-shadow:none} 100%{opacity:0.3;text-shadow:0 0 10px #45f3ff} }

        /* === MAIN LAYOUT === */
        .page-layout {
            display: flex;
            align-items: stretch;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Mech panels fill the full height of the page */
        .mech-panel {
            flex: 1;
            min-width: 0;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: stretch;
        }
        .mech-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Focus on the top-centre of the image where the mech head/body is */
            object-position: center top;
            display: block;
            filter: brightness(0.85) contrast(1.1) saturate(1.1);
        }
        /* Glow border on the inner edge of each panel */
        .mech-left {
            border-right: 3px solid #45f3ff;
            box-shadow: inset -20px 0 40px rgba(69,243,255,0.15);
        }
        /* Flip left mech so its laser points RIGHT (inward toward centre) */
        .mech-left img {
            transform: scaleX(-1);
        }
        .mech-right {
            border-left: 3px solid #ff6a00;
            box-shadow: inset 20px 0 40px rgba(255,106,0,0.15);
        }
        /* Flip the right mech so it faces LEFT (inward) */
        .mech-right img {
            transform: scaleX(-1);
        }

        /* The centre panel with all the controls */
        .container {
            background: rgba(11,12,16,0.92);
            backdrop-filter: blur(8px);
            border-left: 2px solid #1f2833;
            border-right: 2px solid #1f2833;
            border-top: 4px solid #45f3ff;
            border-bottom: 4px solid #ff0055;
            padding: 28px 28px 40px;
            width: 660px;
            flex-shrink: 0;
            box-shadow: 0 0 40px rgba(69,243,255,0.12);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-family: 'Orbitron', sans-serif; color: #fff; text-align: center; margin-bottom: 20px; font-size: 2em; text-transform: uppercase; text-shadow: 0 0 10px #45f3ff; letter-spacing: 3px; line-height: 1.2; }
        h1 span { color: #ff0055; text-shadow: 0 0 10px #ff0055; }

        .hero-images { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .hero-img-wrap { width: 70px; height: 70px; background: #1f2833; border: 2px solid #45f3ff; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 0 10px rgba(69,243,255,0.3); }
        .hero-img-wrap span { transform: rotate(-45deg); font-size: 30px; }
        .hero-img-wrap:nth-child(even) { border-color: #ff0055; box-shadow: 0 0 10px rgba(255,0,85,0.3); }
        .hero-img-wrap:hover { background: #45f3ff; box-shadow: 0 0 20px #45f3ff; }
        .hero-img-wrap:nth-child(even):hover { background: #ff0055; box-shadow: 0 0 20px #ff0055; }

        button { padding: 12px 20px; background: rgba(31,40,51,0.8); border: 1px solid #45f3ff; color: #45f3ff; font-size: 1.1em; cursor: pointer; transition: all 0.2s; font-weight: 700; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #45f3ff; color: #0b0c10; box-shadow: 0 0 15px #45f3ff; }

        .pick-button { width: 100%; display: block; padding: 18px; font-size: 1.8em; font-family: 'Orbitron', sans-serif; margin: 15px auto; background: repeating-linear-gradient(45deg, #ff0055, #ff0055 10px, #cc0044 10px, #cc0044 20px); color: white; border: 2px solid #fff; text-shadow: 2px 2px 0 #000; box-shadow: 0 0 20px rgba(255,0,85,0.6); position: relative; overflow: hidden; }
        .pick-button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 3s infinite; }
        @keyframes shine { 0%{left:-100%} 20%,100%{left:100%} }
        .pick-button:hover { background: #ff0055; box-shadow: 0 0 35px #ff0055; transform: scale(1.02); }

        .selected-student-wrap { display: flex; justify-content: center; align-items: center; margin: 20px 0; min-height: 120px; width: 100%; }
        .selected-student {
            background: rgba(0,0,0,0.7); color: #ffea00;
            padding: 22px 48px; border-radius: 999px;
            text-align: center; font-size: 2.2em; font-family: 'Orbitron', sans-serif;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(255,234,0,0.15), 0 0 20px rgba(255,234,0,0.3);
            border: 2px solid #ffea00; text-transform: uppercase; position: relative; overflow: hidden; min-width: 260px;
        }
        .placeholder { color: rgba(69,243,255,0.4); font-size: 0.45em; font-family: 'Rajdhani', sans-serif; letter-spacing: 2px; }

        .selected-student.is-spinning { animation: mechaSpin 0.15s linear infinite; color: #ff0055; border-color: #ff0055; box-shadow: inset 0 0 20px rgba(255,0,85,0.2), 0 0 20px rgba(255,0,85,0.5); }
        @keyframes mechaSpin { 0%{transform:rotateY(0deg) scaleX(1)} 25%{transform:rotateY(90deg) scaleX(0.1)} 50%{transform:rotateY(180deg) scaleX(1)} 75%{transform:rotateY(270deg) scaleX(0.1)} 100%{transform:rotateY(360deg) scaleX(1)} }

        .selected-student.reveal { animation: mechaReveal 0.5s cubic-bezier(.34,1.56,.64,1) forwards; color: #ffea00; border-color: #ffea00; box-shadow: inset 0 0 20px rgba(255,234,0,0.15), 0 0 30px rgba(255,234,0,0.6); }
        @keyframes mechaReveal { 0%{transform:scaleX(0.05);opacity:0.2} 60%{transform:scaleX(1.05);opacity:1} 100%{transform:scaleX(1);opacity:1} }

        .student-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; width: 100%; }
        .student-item { background: rgba(31,40,51,0.6); color: #fff; border: 1px solid #45f3ff; border-left: 4px solid #45f3ff; padding: 10px 15px; font-weight: 600; text-transform: uppercase; transition: all 0.2s; min-width: 100px; text-align: center; }
        .student-item:hover { background: rgba(69,243,255,0.2); box-shadow: 0 0 10px rgba(69,243,255,0.5); transform: translateY(-2px); }
        .student-item.last-picked { background: rgba(255,234,0,0.2); border-color: #ffea00; border-left: 4px solid #ffea00; color: #ffea00; animation: targetPulse 1.5s infinite; }
        @keyframes targetPulse { 0%,100%{box-shadow:0 0 10px rgba(255,234,0,0.4)} 50%{box-shadow:0 0 25px rgba(255,234,0,0.8)} }
        .student-item.excluded { background: rgba(255,255,255,0.05); border-color: #333; color: #666; text-decoration: line-through; border-left: 4px solid #666; }

        .reset-btn { border-color: #00ffcc; color: #00ffcc; }
        .reset-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        /* === VIOLENT 2-SECOND SEISMIC SHAKE ===
           The key trick here is keeping large random-feeling displacements
           for the first ~70% of the animation, then gradually reducing them
           so it "settles" naturally rather than cutting out abruptly. */
        @keyframes earthquake {
            0%   { transform: translate(0,    0)    rotate(0deg);   }
            3%   { transform: translate(-20px,-14px) rotate(-2.5deg); }
            6%   { transform: translate(22px,  16px) rotate( 2.8deg); }
            9%   { transform: translate(-25px, 10px) rotate(-2deg);   }
            12%  { transform: translate(28px, -18px) rotate( 3deg);   }
            15%  { transform: translate(-22px, 20px) rotate(-2.8deg); }
            18%  { transform: translate(26px, -14px) rotate( 2.5deg); }
            21%  { transform: translate(-18px, 16px) rotate(-2deg);   }
            24%  { transform: translate(24px, -12px) rotate( 2.2deg); }
            27%  { transform: translate(-20px, 18px) rotate(-2.5deg); }
            30%  { transform: translate(22px, -10px) rotate( 2deg);   }
            33%  { transform: translate(-16px, 14px) rotate(-1.8deg); }
            36%  { transform: translate(20px,  -8px) rotate( 1.5deg); }
            40%  { transform: translate(-14px, 12px) rotate(-1.5deg); }
            45%  { transform: translate(16px,  -9px) rotate( 1.2deg); }
            50%  { transform: translate(-12px, 10px) rotate(-1deg);   }
            55%  { transform: translate(14px,  -7px) rotate( 1deg);   }
            60%  { transform: translate(-10px,  8px) rotate(-0.8deg); }
            65%  { transform: translate(10px,  -6px) rotate( 0.7deg); }
            70%  { transform: translate(-7px,   6px) rotate(-0.5deg); }
            75%  { transform: translate(8px,   -4px) rotate( 0.4deg); }
            80%  { transform: translate(-5px,   4px) rotate(-0.3deg); }
            85%  { transform: translate(4px,   -3px) rotate( 0.2deg); }
            90%  { transform: translate(-3px,   2px) rotate(-0.15deg);}
            95%  { transform: translate(2px,   -1px) rotate( 0.1deg); }
            100% { transform: translate(0,      0)   rotate(0deg);    }
        }
        .container.shaking {
            animation: earthquake 2s ease-out forwards;
        }

        /* === SINGLE ULTRA-FAT FUZZY LASER BEAM ===
           The "fat and fuzzy" look is achieved by layering six box-shadows:
           - A razor-thin bright white core for that plasma-channel feel
           - A medium tight glow in the beam colour
           - Two progressively wider, softer halos that bleed outward
           - Two very wide ultra-faint blooms that light up the surrounding area
           The beam itself is also quite tall (40px) so it has real physical presence.
           The slight angle (rotate) stops it looking like a boring horizontal rule. */
        #laser1 {
            position: fixed;
            width: 140vw;           /* overshoots both edges so the angled tips stay off-screen */
            height: 40px;
            top: 49%;
            left: -140vw;
            transform: rotate(1.8deg);  /* subtle tilt — not perfectly horizontal */
            border-radius: 50%;         /* rounds the ends so it tapers rather than cuts off hard */
            pointer-events: none;
            z-index: 9998;
            opacity: 0;

            /* Gradient fades from transparent → full colour → white hot core → full colour → transparent */
            background: linear-gradient(
                90deg,
                transparent    0%,
                #45f3ff       10%,
                #aaffff       35%,
                #ffffff       50%,
                #aaffff       65%,
                #45f3ff       90%,
                transparent  100%
            );

            /* Six-layer glow stack — this is what makes it look thick and atmospheric */
            box-shadow:
                0   0   4px  2px  #ffffff,               /* 1. white-hot core thread */
                0   0  15px  6px  #45f3ff,               /* 2. tight cyan inner glow */
                0   0  35px 14px  rgba(69,243,255,0.75), /* 3. medium halo */
                0   0  70px 28px  rgba(69,243,255,0.45), /* 4. wide soft halo */
                0   0 120px 50px  rgba(69,243,255,0.25), /* 5. atmospheric bloom */
                0   0 200px 80px  rgba(69,243,255,0.1);  /* 6. room-lighting bloom */
        }

        /* The beam rockets across the screen quickly — fast entry, clean exit */
        @keyframes laser1Fire {
            0%   { opacity: 0;   left: -140vw; }
            6%   { opacity: 1; }               /* snaps to full brightness almost instantly */
            50%  { opacity: 1;   left:  -5vw;  } /* blazes through the middle */
            80%  { opacity: 0.8; left:  80vw;  }
            100% { opacity: 0;   left: 140vw;  }
        }
        #laser1.firing {
            animation: laser1Fire 0.55s ease-in forwards;
        }

        @media (max-width: 1000px) { .mech-panel { display: none; } }
    </style>
</head>

    <script>
        const students = [
            'Alisher','Umidjon','Mardon','Abdulaziz','Azizbek',
            'Rushana','Robiya','Shojahon','Ulugbek',
            'Saidakbar','Azimjon','Abirbek'
        ];
        let lastPicked = null, temporarilyExcluded = [];

        const heroImageSets = [
            {emoji:'🤖',label:'Mecha'},{emoji:'⚔️',label:'Blade'},
            {emoji:'⚡',label:'Energy'},{emoji:'🚀',label:'Thruster'}
        ];

        function renderHeroImages() {
            const container = document.getElementById('heroImages');
            container.innerHTML = '';
            heroImageSets.forEach(item => {
                const wrap = document.createElement('div');
                wrap.className = 'hero-img-wrap'; wrap.title = item.label;
                const span = document.createElement('span');
                span.textContent = item.emoji; wrap.appendChild(span);
                container.appendChild(wrap);
            });
        }

        function displayStudentList() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';
            students.forEach(student => {
                const div = document.createElement('div');
                div.className = 'student-item';
                const isExcluded = temporarilyExcluded.includes(student);
                if (student === lastPicked && !isExcluded) div.classList.add('last-picked');
                if (isExcluded) div.classList.add('excluded');
                const nameSpan = document.createElement('span');
                nameSpan.textContent = student; div.appendChild(nameSpan);
                listDiv.appendChild(div);
            });
        }

        function resetExcluded() { temporarilyExcluded = []; displayStudentList(); }

        function pickStudent() {
            const available = students.filter(s => !temporarilyExcluded.includes(s));
            if (available.length === 0) return alert('ERROR: ALL PILOTS INCAPACITATED. REBOOT ROSTER.');
            const el = document.getElementById('selectedStudent');
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
            let count = 0;
            el.classList.remove('reveal'); el.classList.add('is-spinning');
            const spin = setInterval(() => {
                let t = '';
                for (let i=0;i<8;i++) t += chars[Math.floor(Math.random()*chars.length)];
                el.innerHTML = '<span>[ ' + t + ' ]</span>';
                if (++count >= 20) {
                    clearInterval(spin);
                    let pool = available.filter(s => s !== lastPicked);
                    if (!pool.length) pool = available;
                    const picked = pool[Math.floor(Math.random()*pool.length)];
                    lastPicked = picked;
                    if (!temporarilyExcluded.includes(picked)) temporarilyExcluded.push(picked);
                    el.classList.remove('is-spinning');
                    el.innerHTML = '<span>>> ' + picked + ' <<</span>';
                    void el.offsetWidth; el.classList.add('reveal');
                    displayStudentList(); createSparks();
                    triggerImpactEffects();
                }
            }, 80);
        }

        function createSparks() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const sparks = [], colors = ['#45f3ff','#ff0055','#ffea00','#ffffff'];
            for (let i=0;i<80;i++) {
                const angle = (Math.PI*2*i)/80+(Math.random()*0.5);
                const v = Math.random()*15+10;
                sparks.push({ x:canvas.width/2, y:canvas.height/2+50, length:Math.random()*20+10, width:Math.random()*3+1, speedX:Math.cos(angle)*v, speedY:Math.sin(angle)*v, color:colors[Math.floor(Math.random()*colors.length)], life:1.0, decay:Math.random()*0.03+0.015 });
            }
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                let active=false;
                sparks.forEach(s => {
                    if (s.life>0) { active=true; s.x+=s.speedX; s.y+=s.speedY; s.life-=s.decay;
                        ctx.save(); ctx.globalAlpha=Math.max(0,s.life); ctx.translate(s.x,s.y);
                        ctx.rotate(Math.atan2(s.speedY,s.speedX)); ctx.fillStyle=s.color;
                        ctx.shadowBlur=10; ctx.shadowColor=s.color; ctx.fillRect(0,0,s.length,s.width); ctx.restore(); }
                });
                if (active) requestAnimationFrame(anim); else ctx.clearRect(0,0,canvas.width,canvas.height);
            }
            anim();
        }

        // Triggers the 2-second seismic shake and fires the single fat laser beam
        function triggerImpactEffects() {
            // --- Violent seismic shake on the centre panel ---
            const container = document.querySelector('.container');
            container.classList.remove('shaking');
            void container.offsetWidth; // force reflow so animation restarts if picked again quickly
            container.classList.add('shaking');
            setTimeout(() => container.classList.remove('shaking'), 2100);

            // --- Single fat laser blast across the full screen ---
            const laser = document.getElementById('laser1');
            laser.classList.remove('firing');
            void laser.offsetWidth; // same reflow trick to reset the animation
            laser.classList.add('firing');
            setTimeout(() => laser.classList.remove('firing'), 700);
        }

        window.onload = function() { renderHeroImages(); displayStudentList(); };
    </script>
