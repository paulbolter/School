<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Green</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            background: linear-gradient(180deg,
                #0d2b6b 0%, #1a3f8a 15%, #1565c0 30%, #1976d2 45%,
                #0288d1 58%, #00695c 72%, #00796b 85%, #004d40 100%
            );
            background-attachment: fixed;
        }

        .rainbow-arc {
            position: fixed; top: -180px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 300px;
            border-radius: 300px 300px 0 0;
            background: conic-gradient(from 180deg at 50% 100%,
                #f9a825, #fdd835, #fff176, #1565c0, #00897b, #f9a825);
            opacity: 0.22; z-index: 0; pointer-events: none;
            animation: rainbowPulse 8s ease-in-out infinite;
        }
        @keyframes rainbowPulse {
            0%, 100% { opacity: 0.15; transform: translateX(-50%) scale(1); }
            50%       { opacity: 0.25; transform: translateX(-50%) scale(1.05); }
        }

        .shooting-star {
            position: fixed; width: 3px; height: 3px; background: white;
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 0;
        }
        .shooting-star:nth-child(1) { top: 8%;  left: 15%; animation: shoot 6s 1s   infinite; }
        .shooting-star:nth-child(2) { top: 20%; left: 70%; animation: shoot 8s 3.5s infinite; }
        .shooting-star:nth-child(3) { top: 12%; left: 45%; animation: shoot 7s 5.5s infinite; }
        @keyframes shoot {
            0%   { opacity: 0; transform: translate(0,0); }
            2%   { opacity: 1; }
            8%   { opacity: 1; transform: translate(120px,80px); }
            10%  { opacity: 0; transform: translate(150px,100px); }
            100% { opacity: 0; }
        }

        .container {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 18px 16px 24px;
            max-width: 680px;
            width: 100%;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 8px 40px rgba(13,43,107,0.3), 0 2px 10px rgba(255,255,255,0.3) inset;
            position: relative;
            z-index: 1;
            margin-top: 8px;
        }

        /* ── HEADER ROW ── */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #f9a825;
            font-size: 1.4em;
            text-shadow: 0 2px 10px rgba(249,168,37,0.4);
            letter-spacing: 1px;
            text-align: center;
        }

        .reset-btn {
            position: absolute;
            right: 0;
            padding: 6px 14px;
            font-size: 0.78em;
            border-radius: 50px;
            background: rgba(255,255,255,0.35);
            color: #0d2b6b;
            border: 1px solid rgba(13,43,107,0.2);
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(6px);
        }
        .reset-btn:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-1px);
        }

        /* ── WINNER STAGE ── */
        .winner-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 160px;
            margin-bottom: 6px;
        }

        .winner-circle {
            width: 145px; height: 145px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #fdd835;
            display: none; flex-shrink: 0;
        }
        .winner-circle img { width:100%; height:100%; object-fit:cover; display:block; }
        .winner-circle.active  { display: block; }
        .winner-circle.fly-in  { animation: flyIn 0.65s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes flyIn {
            0%   { transform: scale(0.1) translateY(120px); opacity: 0; }
            65%  { transform: scale(1.2)  translateY(-12px); opacity: 1; }
            100% { transform: scale(1)   translateY(0);      opacity: 1; }
        }
        .winner-circle.glowing { animation: goldenPulse 1.5s ease-in-out infinite; }
        @keyframes goldenPulse {
            0%, 100% { box-shadow: 0 0 20px  4px rgba(253,216,53,0.6); }
            50%       { box-shadow: 0 0 55px 16px rgba(253,216,53,1), 0 0 85px 26px rgba(249,168,37,0.5); }
        }

        .waiting-msg {
            font-size: 0.9em; color: rgba(13,43,107,0.55);
            text-align: center; padding: 46px 0 8px;
        }

        /* ── PICK BUTTON ── */
        .pick-button {
            display: block;
            padding: 14px 44px; font-size: 1.35em;
            font-family: 'Pacifico', cursive;
            margin: 6px auto 10px;
            background: linear-gradient(135deg, #f9a825 0%, #fdd835 25%, #1565c0 50%, #00897b 75%, #f9a825 100%);
            background-size: 300% 300%;
            animation: rainbowBtn 4s ease-in-out infinite;
            color: white;
            box-shadow: 0 6px 30px rgba(249,168,37,0.5);
            border: none; border-radius: 50px;
            letter-spacing: 1px; cursor: pointer;
            text-shadow: 0 1px 6px rgba(0,0,0,0.25);
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        @keyframes rainbowBtn {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }
        .pick-button:hover    { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px rgba(249,168,37,0.7); }
        .pick-button:active   { transform: translateY(0); }
        .pick-button:disabled { opacity:.5; cursor:not-allowed; transform:none; animation:none; }

        /* ── BOUNCE ARENA ── */
        #arena {
            position: relative;
            width: 100%;
            height: 420px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,255,255,0.3);
        }

        /* Each portrait — absolutely positioned, JS drives left/top */
        .portrait-item {
            position: absolute;
            width: 84px; height: 84px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.85);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: border-color 0.15s, box-shadow 0.15s, opacity 0.4s;
            will-change: left, top;
        }
        .portrait-item img {
            width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;
        }

        /* Winner flash mid-bounce */
        .portrait-item.hot {
            border-color: #fdd835 !important;
            box-shadow: 0 0 26px 8px rgba(253,216,53,1), 0 0 52px 16px rgba(249,168,37,0.6) !important;
            z-index: 5;
        }

        /* Excluded — fade out in place */
        .portrait-item.excluded {
            opacity: 0.18 !important;
            filter: grayscale(100%);
            border-color: rgba(255,255,255,0.15) !important;
            box-shadow: none !important;
        }

        canvas#confettiCanvas {
            position: fixed; top:0; left:0;
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>
    <div class="rainbow-arc"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <canvas id="confettiCanvas"></canvas>

    <div class="container">

        <!-- Header: title + reset -->
        <div class="header-row">
            <h1>🌟 6 Green 🌟</h1>
            <button class="reset-btn" onclick="resetAll()">↻ Reset</button>
        </div>

        <!-- Winner display -->
        <div class="winner-stage" id="winnerStage">
            <div class="winner-circle" id="winnerCircle">
                <img id="winnerImg" src="" alt="">
            </div>
            <div class="waiting-msg" id="waitingMsg">Tap the button to pick a student! ⭐</div>
        </div>

        <button class="pick-button" id="pickBtn" onclick="pickStudent()">⭐ PICK! 🏆</button>

        <!-- Bounce arena -->
        <div id="arena"></div>
    </div>

];

        /* ── STATE ── */
        let excluded   = [];
        let spinning   = false;

        /* ── PHYSICS ── */
        let balls  = [];
        let arenaW = 0, arenaH = 0;
        const R        = 42;
        const DIAMETER = R * 2;
        let rafId      = null;
        let bouncing   = false;

        function buildArena() {
            const arena = document.getElementById('arena');
            arena.innerHTML = '';
            balls = [];
            arenaW = arena.clientWidth;
            arenaH = arena.clientHeight;

            // Grid home positions
            const cols  = Math.ceil(Math.sqrt(studentData.length * arenaW / arenaH));
            const rows  = Math.ceil(studentData.length / cols);
            const cellW = arenaW / cols;
            const cellH = arenaH / rows;

            studentData.forEach((s, idx) => {
                const col   = idx % cols;
                const row   = Math.floor(idx / cols);
                const homeX = cellW * col + cellW / 2 - R;
                const homeY = cellH * row + cellH / 2 - R;

                const el = document.createElement('div');
                el.className = 'portrait-item';
                el.id = `p${idx}`;

                const img = document.createElement('img');
                img.src = s.img; img.alt = '';
                el.appendChild(img);

                el.style.left = homeX + 'px';
                el.style.top  = homeY + 'px';
                arena.appendChild(el);

                if (excluded.includes(idx)) el.classList.add('excluded');

                balls.push({ idx, x: homeX, y: homeY, vx: 0, vy: 0, el, homeX, homeY });
            });
        }

        function startBouncing() {
            bouncing = true;
            balls.forEach(b => {
                if (excluded.includes(b.idx)) return;
                const speed = 4 + Math.random() * 4;
                const angle = Math.random() * Math.PI * 2;
                b.vx = Math.cos(angle) * speed;
                b.vy = Math.sin(angle) * speed;
            });
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(physicsLoop);
        }

        function stopBouncing() {
            bouncing = false;
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        }

        function physicsLoop() {
            arenaW = document.getElementById('arena').clientWidth;
            arenaH = document.getElementById('arena').clientHeight;

            balls.forEach(b => {
                if (excluded.includes(b.idx)) return;
                b.x += b.vx;
                b.y += b.vy;

                if (b.x < 0)                  { b.x = 0;                  b.vx =  Math.abs(b.vx); }
                if (b.x > arenaW - DIAMETER)  { b.x = arenaW - DIAMETER;  b.vx = -Math.abs(b.vx); }
                if (b.y < 0)                  { b.y = 0;                   b.vy =  Math.abs(b.vy); }
                if (b.y > arenaH - DIAMETER)  { b.y = arenaH - DIAMETER;  b.vy = -Math.abs(b.vy); }

                b.el.style.left = b.x + 'px';
                b.el.style.top  = b.y + 'px';
            });

            // Ball-ball elastic collisions
            for (let i = 0; i < balls.length; i++) {
                if (excluded.includes(balls[i].idx)) continue;
                for (let j = i + 1; j < balls.length; j++) {
                    if (excluded.includes(balls[j].idx)) continue;
                    const a = balls[i], bj = balls[j];
                    const dx = (a.x + R) - (bj.x + R);
                    const dy = (a.y + R) - (bj.y + R);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < DIAMETER && dist > 0) {
                        const overlap = (DIAMETER - dist) / 2;
                        const nx = dx/dist, ny = dy/dist;
                        a.x  += nx * overlap;  a.y  += ny * overlap;
                        bj.x -= nx * overlap;  bj.y -= ny * overlap;
                        const dvx = a.vx - bj.vx, dvy = a.vy - bj.vy;
                        const dot = dvx*nx + dvy*ny;
                        if (dot < 0) {
                            a.vx  -= dot*nx; a.vy  -= dot*ny;
                            bj.vx += dot*nx; bj.vy += dot*ny;
                        }
                    }
                }
            }

            if (bouncing) rafId = requestAnimationFrame(physicsLoop);
        }

        /* ── SHOW WINNER ── */
        function showWinner(student) {
            const circle = document.getElementById('winnerCircle');
            const img    = document.getElementById('winnerImg');
            document.getElementById('waitingMsg').style.display = 'none';

            circle.classList.remove('fly-in','glowing','active');
            void circle.offsetWidth;

            img.src = student.img;
            circle.classList.add('active','fly-in');
            setTimeout(() => circle.classList.add('glowing'), 650);
        }

        /* ── PICK ── */
        function pickStudent() {
            if (spinning) return;
            const available = studentData.filter((s,i) => !excluded.includes(i));
            if (available.length === 0) {
                alert('All students have been picked! Tap ↻ Reset to start again.');
                return;
            }

            spinning = true;
            document.getElementById('pickBtn').disabled = true;
            document.getElementById('winnerCircle').classList.remove('active','fly-in','glowing');
            document.getElementById('waitingMsg').style.display = '';
            document.getElementById('waitingMsg').textContent = '';

            // Choose winner now
            const availableIdxs = studentData.map((_,i) => excluded.includes(i) ? null : i).filter(i=>i!==null);
            const winnerIdx = availableIdxs[Math.floor(Math.random() * availableIdxs.length)];

            // Bounce for 1.4 seconds then FREEZE and reveal
            startBouncing();

            setTimeout(() => {
                // FREEZE everything mid-bounce
                stopBouncing();

                // Brief gold flash on winner portrait
                const winEl = document.getElementById(`p${winnerIdx}`);
                if (winEl) winEl.classList.add('hot');

                setTimeout(() => {
                    if (winEl) winEl.classList.remove('hot');
                    excluded.push(winnerIdx);
                    balls[winnerIdx].el.classList.add('excluded');

                    showWinner(studentData[winnerIdx]);
                    createConfetti();
                    spinning = false;
                    document.getElementById('pickBtn').disabled = false;
                }, 350);

            }, 2800);
        }

        /* ── RESET ── */
        function resetAll() {
            stopBouncing();
            excluded = [];
            buildArena();
            document.getElementById('winnerCircle').classList.remove('active','fly-in','glowing');
            document.getElementById('waitingMsg').style.display = '';
            document.getElementById('waitingMsg').textContent = 'Tap the button to pick a student! ⭐';
            document.getElementById('pickBtn').disabled = false;
            spinning = false;
        }

        /* ── CONFETTI ── */
        function createConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx    = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const cx = canvas.width/2, cy = 180;
            const pieces = [];
            const emojis = ['⭐','🏆','🌟','🎉','🎊','✨'];
            const colors = ['#1565c0','#0d47a1','#f9a825','#fdd835','#00897b','#00695c','#0288d1','#f57f17'];
            for (let i = 0; i < 90; i++) {
                const a = (Math.PI*2*i)/90, v = Math.random()*8+5;
                pieces.push({ x:cx, y:cy, size:Math.random()*8+3, speedX:Math.cos(a)*v, speedY:Math.sin(a)*v-Math.random()*4, color:colors[i%colors.length], rotation:Math.random()*360, rotationSpeed:Math.random()*10-5, gravity:.28, isCircle:Math.random()>.4 });
            }
            for (let i = 0; i < 16; i++) {
                const a = (Math.PI*2*i)/16, v = Math.random()*5+3;
                pieces.push({ x:cx, y:cy, emoji:emojis[i%emojis.length], size:26, speedX:Math.cos(a)*v, speedY:Math.sin(a)*v-Math.random()*2, rotation:0, rotationSpeed:Math.random()*8-4, gravity:.22 });
            }
            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                for (let i = pieces.length-1; i >= 0; i--) {
                    const p = pieces[i];
                    p.speedY += p.gravity; p.x += p.speedX; p.y += p.speedY; p.rotation += p.rotationSpeed;
                    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180);
                    if (p.emoji) { ctx.font=p.size+'px Arial'; ctx.fillText(p.emoji,-p.size/2,p.size/2); }
                    else { ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-(p.y/canvas.height)*1.2); if(p.isCircle){ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}else{ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);} ctx.globalAlpha=1; }
                    ctx.restore();
                    if (p.y > canvas.height+50) pieces.splice(i,1);
                }
                if (pieces.length > 0) requestAnimationFrame(animate);
                else ctx.clearRect(0,0,canvas.width,canvas.height);
            }
            animate();
        }

        window.onload  = () => buildArena();
        window.addEventListener('resize', () => { if (!spinning) buildArena(); });
    </script>
</body>
</html>
