<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCL Final Predictor – PSG vs Arsenal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --psg: #004170;
    --arsenal: #EF0107;
    --gold: #C9A84C;
    --bg: #0a0a0f;
    --surface: #14141e;
    --surface2: #1e1e2e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  .hero {
    background: linear-gradient(135deg, #004170 0%, #0a0a0f 45%, #1a0003 100%);
    padding: 36px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '⚽';
    position: absolute;
    font-size: 200px;
    opacity: 0.04;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .matchup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 12px 0 4px;
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    letter-spacing: 2px;
  }
  .team-psg { color: #4da6ff; }
  .team-arsenal { color: #ff6b6b; }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .ucl-badge {
    display: inline-block;
    margin-top: 8px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .field-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--gold);
  }

  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
  }

  .score-team-label {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 6px;
  }
  .score-team-label.psg { color: #4da6ff; }
  .score-team-label.ars { color: #ff6b6b; }

  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    text-align: center;
    padding: 10px 0;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--gold); }

  .score-dash {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--muted);
    text-align: center;
  }

  .toggle-group {
    display: flex;
    gap: 10px;
  }

  .toggle-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 0;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .toggle-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .submit-btn {
    width: 100%;
    background: var(--gold);
    border: none;
    border-radius: 12px;
    color: #0a0a0f;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .notice {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
  }

  #status-msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    text-align: center;
  }
  #status-msg.success {
    background: rgba(60,180,100,0.12);
    border: 1px solid rgba(60,180,100,0.3);
    color: #6fda8e;
    display: block;
  }
  #status-msg.error {
    background: rgba(239,1,7,0.12);
    border: 1px solid rgba(239,1,7,0.3);
    color: #ff8080;
    display: block;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0 0;
  }

  .guesses-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 14px;
    text-align: center;
  }

  #guesses-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .guess-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .guess-name {
    font-weight: 500;
    font-size: 15px;
  }

  .guess-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .guess-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .guess-extras {
    display: flex;
    gap: 5px;
  }

  .badge {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 6px;
  }
  .badge-et {
    background: rgba(77,166,255,0.12);
    color: #4da6ff;
    border: 1px solid rgba(77,166,255,0.2);
  }
  .badge-pen {
    background: rgba(255,200,50,0.12);
    color: #ffc832;
    border: 1px solid rgba(255,200,50,0.2);
  }

  .load-more {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    text-decoration: underline;
  }

  #guesses-loading {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 16px;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">UEFA Champions League Final 2025</div>
  <div class="matchup">
    <span class="team-name team-psg">PSG</span>
    <span class="vs">vs</span>
    <span class="team-name team-arsenal">Arsenal</span>
  </div>
  <div class="ucl-badge">Score Predictor</div>
</div>

<div class="container">

  <p class="section-title">Your prediction</p>

  <div class="card">
    <div class="field-group">
      <label>Your name</label>
      <input type="text" id="name" placeholder="e.g. Amir Karimov" maxlength="40" autocomplete="off">
    </div>

    <div class="field-group">
      <label>Final score (after 90 minutes)</label>
      <div>
        <div class="score-row" style="margin-bottom:4px;">
          <div class="score-team-label psg">PSG</div>
          <div></div>
          <div class="score-team-label ars">Arsenal</div>
        </div>
        <div class="score-row">
          <input type="number" id="score-psg" min="0" max="20" value="0" placeholder="0">
          <div class="score-dash">–</div>
          <input type="number" id="score-ars" min="0" max="20" value="0" placeholder="0">
        </div>
      </div>
    </div>

    <div class="field-group">
      <label>Extra time?</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="et-no" onclick="setToggle('et','no')">No</button>
        <button class="toggle-btn" id="et-yes" onclick="setToggle('et','yes')">Yes</button>
      </div>
    </div>

    <div class="field-group" id="pen-group" style="display:none;">
      <label>Penalties?</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="pen-no" onclick="setToggle('pen','no')">No</button>
        <button class="toggle-btn" id="pen-yes" onclick="setToggle('pen','yes')">Yes</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitGuess()">Submit my prediction ⚽</button>
    <p class="notice">You can only submit once per name.</p>
    <div id="status-msg"></div>
  </div>

  <hr class="divider">
  <p class="guesses-title">All predictions so far</p>
  <div id="guesses-loading">Loading predictions…</div>
  <div id="guesses-list"></div>

</div>

<script>
  // ============================================================
  // CONFIGURATION — replace with your Apps Script web app URL
  // ============================================================
  const SHEET_URL = ;'https://script.google.com/macros/s/AKfycbxZlhorhz3Fg7T6bIspsDfQHQrvuKkDFTKhTTF9p7GBmkjessXw6l5bULOIN43AmMtw/exec'
  // ============================================================

  const state = { et: 'no', pen: 'no' };

  function setToggle(field, val) {
    state[field] = val;
    ['yes','no'].forEach(v => {
      document.getElementById(field+'-'+v).classList.toggle('active', v === val);
    });
    if (field === 'et') {
      const penGroup = document.getElementById('pen-group');
      if (val === 'yes') {
        penGroup.style.display = 'block';
      } else {
        penGroup.style.display = 'none';
        setToggle('pen','no');
      }
    }
  }

  // initialise toggle states
  setToggle('et','no');
  setToggle('pen','no');

  function clamp(val) {
    const n = parseInt(val, 10);
    return isNaN(n) ? 0 : Math.max(0, Math.min(20, n));
  }

  async function submitGuess() {
    const name = document.getElementById('name').value.trim();
    if (!name) { showStatus('Please enter your name.', 'error'); return; }
    const psg = clamp(document.getElementById('score-psg').value);
    const ars = clamp(document.getElementById('score-ars').value);

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';
    hideStatus();

    const payload = {
      action: 'submit',
      name,
      psg,
      ars,
      et: state.et,
      pen: state.pen === 'yes' && state.et === 'yes' ? 'yes' : 'no'
    };

    try {
      const res = await fetch(SHEET_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      if (data.status === 'ok') {
        showStatus('✓ Prediction saved! Good luck!', 'success');
        btn.textContent = 'Prediction submitted ✓';
        loadGuesses();
      } else {
        showStatus(data.message || 'Something went wrong. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Submit my prediction ⚽';
      }
    } catch(e) {
      showStatus('Could not connect. Check your internet and try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Submit my prediction ⚽';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = type;
  }
  function hideStatus() {
    const el = document.getElementById('status-msg');
    el.className = '';
    el.style.display = 'none';
  }

  async function loadGuesses() {
    const list = document.getElementById('guesses-list');
    const loading = document.getElementById('guesses-loading');
    loading.style.display = 'block';
    list.innerHTML = '';

    try {
      const res = await fetch(SHEET_URL + '?action=list');
      const data = await res.json();
      loading.style.display = 'none';
      if (!data.guesses || data.guesses.length === 0) {
        loading.textContent = 'No predictions yet — be the first!';
        loading.style.display = 'block';
        return;
      }
      data.guesses.forEach(g => {
        const div = document.createElement('div');
        div.className = 'guess-card';
        div.innerHTML = `
          <span class="guess-name">${esc(g.name)}</span>
          <div class="guess-right">
            <span class="guess-score" style="color:#4da6ff">${g.psg}</span>
            <span class="guess-score" style="color:var(--muted);font-size:16px;">–</span>
            <span class="guess-score" style="color:#ff6b6b">${g.ars}</span>
            <div class="guess-extras">
              ${g.et === 'yes' ? '<span class="badge badge-et">ET</span>' : ''}
              ${g.pen === 'yes' ? '<span class="badge badge-pen">PEN</span>' : ''}
            </div>
          </div>`;
        list.appendChild(div);
      });
    } catch(e) {
      loading.textContent = 'Could not load predictions right now.';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadGuesses();
  setInterval(loadGuesses, 30000);
</script>
</body>
</html>
