<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think About It!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf8f0;
  --card: #ffffff;
  --accent: #f97316;
  --accent2: #8b5cf6;
  --accent3: #10b981;
  --text: #1c1917;
  --muted: #78716c;
  --border: #e7e5e4;
  --sidebar-bg: #ffffff;
  --sidebar-hover: #fff7ed;
  --sidebar-active-bg: #fff1e2;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(249,115,22,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Nunito Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 13px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.header-icon {
  font-size: 1.6rem;
  line-height: 1;
}
header h1 {
  font-family: "Nunito", sans-serif;
  font-size: 1.55rem;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
  line-height: 1;
}
header h1 span { color: var(--accent2); }
header p {
  color: var(--muted);
  font-size: 0.84rem;
  font-weight: 300;
  margin-left: 4px;
}
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 250px;
  min-width: 210px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding-bottom: 20px;
}
.cat-label {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  padding: 13px 14px 4px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.cat-label:first-child { border-top: none; margin-top: 0; padding-top: 10px; }
.topic-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 7px 14px 7px 18px;
  font-family: "Nunito Sans", sans-serif;
  font-size: 0.84rem;
  color: #44403c;
  cursor: pointer;
  line-height: 1.4;
  transition: background 0.12s;
  border-left: 3px solid transparent;
}
.topic-btn .t-icon { font-size: 1rem; flex-shrink: 0; }
.topic-btn:hover { background: var(--sidebar-hover); color: var(--text); }
.topic-btn.active {
  background: var(--sidebar-active-bg);
  color: var(--accent);
  font-weight: 700;
  border-left-color: var(--accent);
}
.main {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  display: flex;
  flex-direction: column;
}
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-align: center;
  gap: 14px;
}
.empty-icon { font-size: 3.2rem; opacity: 0.55; }
.empty-state p {
  font-size: 0.95rem;
  max-width: 300px;
  line-height: 1.7;
  font-weight: 400;
}
.empty-state .hint {
  font-size: 0.8rem;
  color: #a8a29e;
  font-style: italic;
}
.q-area { display: none; flex-direction: column; gap: 22px; max-width: 600px; }
.q-area.show { display: flex; }
.topic-heading {
  font-family: "Nunito", sans-serif;
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.4px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.topic-heading .th-icon { font-size: 1.8rem; }
.get-btn {
  padding: 13px 30px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: "Nunito", sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  align-self: flex-start;
  letter-spacing: 0.01em;
}
.get-btn:hover { background: #ea6c0a; }
.get-btn:active { transform: scale(0.97); }
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 30px;
  border-left: 5px solid var(--accent);
  border-top-left-radius: 0;
  border-bottom-left-radius: 0;
  display: none;
  animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
}
.q-card.show { display: block; }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.96) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.q-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: white;
  background: var(--accent);
  border-radius: 6px;
  padding: 3px 10px;
  margin-bottom: 14px;
}
.q-text {
  font-family: "Nunito", sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.55;
  color: var(--text);
}
.q-hint {
  margin-top: 10px;
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
}
.again-btn {
  margin-top: 20px;
  background: none;
  border: 2px solid var(--accent);
  color: var(--accent);
  padding: 8px 20px;
  border-radius: 9px;
  font-family: "Nunito", sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.again-btn:hover { background: var(--accent); color: white; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-icon">💭</div>
  <h1>Think <span>About It!</span></h1>
  <p>Choose a topic — get a fun question to think about.</p>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">👈</div>
      <p>Pick any topic from the list to get a question!</p>
      <p class="hint">There are no wrong answers here — just interesting ones.</p>
    </div>
    <div class="q-area" id="qArea">
      <div class="topic-heading">
        <span class="th-icon" id="topicIcon"></span>
        <span id="topicHeading"></span>
      </div>
      <button class="get-btn" onclick="getQ()">Give me a question! ✨</button>
      <div class="q-card" id="qCard">
        <div class="q-tag">Think about it</div>
        <div class="q-text" id="qText"></div>
        <div class="q-hint">Talk with a partner, or think about your answer first.</div>
        <button class="again-btn" onclick="getQ()">Another question →</button>
      </div>
    </div>
  </main>
</div>

<script>

  ],

    "Is it useful to learn a language even if you may never visit that country?",
    "If you could instantly speak any language fluently, which would you choose?",

var currentTopic = null;
var currentIcon = "";
var used = {};

function buildSidebar() {
  var sb = document.getElementById("sidebar");
  CATS.forEach(function(cat) {
    var lbl = document.createElement("div");
    lbl.className = "cat-label";
    lbl.textContent = cat.label;
    sb.appendChild(lbl);
    cat.topics.forEach(function(t) {
      var btn = document.createElement("button");
      btn.className = "topic-btn";
      btn.innerHTML = '<span class="t-icon">' + t.icon + '</span>' + t.name;
      btn.onclick = function() { selectTopic(t.name, t.icon, btn); };
      sb.appendChild(btn);
    });
  });
}

function selectTopic(topic, icon, btn) {
  document.querySelectorAll(".topic-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  currentTopic = topic;
  currentIcon = icon;
  document.getElementById("topicHeading").textContent = topic;
  document.getElementById("topicIcon").textContent = icon;
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("qArea").classList.add("show");
  document.getElementById("qCard").classList.remove("show");
}

function getQ() {
  if (!currentTopic) return;
  var pool = QUESTIONS[currentTopic];
  if (!pool || !pool.length) return;
  if (!used[currentTopic]) used[currentTopic] = [];
  var avail = pool.map(function(_, i) { return i; }).filter(function(i) { return used[currentTopic].indexOf(i) === -1; });
  if (!avail.length) { used[currentTopic] = []; avail = pool.map(function(_, i) { return i; }); }
  var idx = avail[Math.floor(Math.random() * avail.length)];
  used[currentTopic].push(idx);
  document.getElementById("qText").textContent = pool[idx];
  var card = document.getElementById("qCard");
  card.classList.remove("show");
  void card.offsetWidth;
  card.classList.add("show");
}

buildSidebar();
</script>
</body>
</html>
