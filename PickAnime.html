<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Name Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Dark dramatic background layers */
  .bg-layer {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(80,0,120,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 20% 100%, rgba(0,30,80,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 80% 40% at 80% 100%, rgba(120,0,40,0.3) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating energy particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: float-up linear infinite;
    z-index: 1;
  }

  @keyframes float-up {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
  }

  /* Speed lines */
  .speed-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .speed-lines.active { opacity: 1; }
  .speed-lines svg { width: 100%; height: 100%; }

  /* Main character container */
  .char-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    z-index: 10;
  }

  .char-img {
    width: min(78vw, 78vh);
    height: min(78vw, 78vh);
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(180,80,255,0.5)) drop-shadow(0 0 60px rgba(255,50,50,0.3));
    transition: filter 0.2s ease;
    animation: idle 4s ease-in-out infinite;
    image-rendering: auto;
  }

  @keyframes idle {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50%  { transform: translateY(-8px) rotate(0.5deg); }
  }

  .char-img.strike {
    animation: strike 0.45s cubic-bezier(0.2,0.8,0.2,1) both;
  }

  @keyframes strike {
    0%   { transform: scale(1) translateY(0) rotate(0deg); }
    20%  { transform: scale(0.9, 1.1) translateY(6px) rotate(-3deg); }
    45%  { transform: scale(1.15, 0.9) translateY(-28px) rotate(4deg); filter: brightness(2) drop-shadow(0 0 40px #fff) drop-shadow(0 0 80px rgba(180,80,255,0.9)); }
    70%  { transform: scale(1.05, 0.97) translateY(8px) rotate(-1deg); }
    100% { transform: scale(1) translateY(0) rotate(0deg); }
  }

  /* Speech bubble */
  .speech-bubble {
    position: absolute;
    bottom: 5%;
    left: 95%;
    background: linear-gradient(135deg, #1a0030 0%, #2d0050 100%);
    border: 3px solid #cc44ff;
    border-radius: 20px;
    padding: 18px 36px;
    font-family: 'Bangers', cursive;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 20px rgba(200,100,255,0.9), 0 0 40px rgba(200,100,255,0.5);
    white-space: nowrap;
    box-shadow: 0 0 30px rgba(180,50,255,0.6), 0 8px 32px rgba(0,0,0,0.6);
    opacity: 0;
    transform: scale(0.1) translateY(30px);
    transform-origin: bottom left;
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    z-index: 20;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -16px;
    left: 20px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 16px solid #cc44ff;
  }

  .speech-bubble.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* Hint text */
  .hint {
    position: fixed;
    bottom: 24px;
    font-size: 1rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Burst effect */
  .burst {
    position: fixed;
    pointer-events: none;
    font-size: 1.6rem;
    z-index: 30;
    animation: burst-out 0.8s ease-out forwards;
  }

  @keyframes burst-out {
    0%   { transform: translate(0,0) scale(0.5); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.3); opacity: 0; }
  }
</style>
</head>

<div class="hint">⚡ Press SPACEBAR or tap to pick a name!</div>

<script>
  const names = [
    "Masrur","Fayozbek","Firdavs","Islom","Shojahon",
    "Iroda","Zarina","Miraziz","Maxmud","Jahongir","Abror","Azizbek"
  ];

  let deck = [];
  let lastPicked = null;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getNext() {
    if (deck.length === 0) {
      deck = shuffle(names);
      // If the first card matches lastPicked, shuffle until it doesn't
      while (deck.length > 1 && deck[0] === lastPicked) {
        deck = shuffle(names);
      }
    }
    return deck.shift();
  }

  function spawnBursts(cx, cy) {
    const symbols = ['⚡','💥','✨','🌟','👊','🔥','💫','⭐'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      const angle = (Math.PI * 2 / 10) * i;
      const dist = 80 + Math.random() * 100;
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // Generate speed lines
  function showSpeedLines() {
    const svg = document.getElementById('linesSvg');
    svg.innerHTML = '';
    const cx = 50, cy = 50;
    for (let i = 0; i < 28; i++) {
      const angle = (360 / 28) * i;
      const rad = angle * Math.PI / 180;
      const x1 = cx + Math.cos(rad) * 15;
      const y1 = cy + Math.sin(rad) * 15;
      const x2 = cx + Math.cos(rad) * (55 + Math.random() * 35);
      const y2 = cy + Math.sin(rad) * (55 + Math.random() * 35);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', `rgba(200,100,255,${0.2 + Math.random() * 0.3})`);
      line.setAttribute('stroke-width', 0.3 + Math.random() * 0.4);
      svg.appendChild(line);
    }
    const sl = document.getElementById('speedLines');
    sl.classList.add('active');
    setTimeout(() => sl.classList.remove('active'), 350);
  }

  function pick(cx, cy) {
    const name = getNext();
    lastPicked = name;

    const bubble = document.getElementById('bubble');
    const charImg = document.getElementById('charImg');

    bubble.style.transition = 'none';
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.textContent = name;
    void bubble.offsetWidth;
    bubble.style.transition = '';
    requestAnimationFrame(() => requestAnimationFrame(() => bubble.classList.add('show')));

    charImg.classList.remove('strike');
    void charImg.offsetWidth;
    charImg.classList.add('strike');
    charImg.addEventListener('animationend', () => charImg.classList.remove('strike'), { once: true });

    showSpeedLines();
    spawnBursts(cx ?? window.innerWidth / 2, cy ?? window.innerHeight / 2);
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      pick(window.innerWidth / 2, window.innerHeight / 2);
    }
  });

  document.getElementById('charWrap').addEventListener('click', e => pick(e.clientX, e.clientY));

  // Floating particles
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 5;
    const colors = ['rgba(180,80,255,0.8)','rgba(255,60,80,0.7)','rgba(80,160,255,0.7)','rgba(255,200,50,0.6)'];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw;
      bottom:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      box-shadow: 0 0 6px currentColor;
      animation-duration:${7 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
