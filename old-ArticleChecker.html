<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 600; color: #1a1a1a; letter-spacing: -0.02em; }
  header p { font-size: 0.9rem; color: #666; margin-top: 4px; }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd6;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafaf8;
    color: #1a1a1a;
    font-family: inherit;
    transition: border-color 0.15s;
    min-height: 260px;
  }
  textarea:focus { outline: none; border-color: #b0a89a; background: #fff; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  button.check-btn {
    padding: 10px 26px; font-size: 14px; font-weight: 600;
    border-radius: 8px; cursor: pointer; border: none; transition: all 0.15s;
    background: #2a2a2a; color: #fff;
  }
  button.check-btn:hover { background: #444; }
  button.check-btn:disabled { background: #aaa; cursor: not-allowed; }
  button.clear-btn {
    padding: 10px 22px; font-size: 14px; font-weight: 600;
    border-radius: 8px; cursor: pointer; background: transparent;
    color: #888; border: 1px solid #ddd; transition: all 0.15s;
  }
  button.clear-btn:hover { background: #f5f4f0; }

  .status { font-size: 13px; color: #888; margin-top: 10px; min-height: 18px; display: flex; align-items: center; gap: 8px; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #888;
    border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin-top: 12px; padding: 10px 14px; background: #fff0ee;
    border: 1px solid #f5c4b3; border-radius: 8px; font-size: 13px;
    color: #993C1D; display: none;
  }

  /* Results */
  .results-card { display: none; }
  .results-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }

  .marked-text-editable {
    font-size: 15px;
    line-height: 2.4;
    color: #1a1a1a;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 14px;
    background: #fafaf8;
    min-height: 80px;
    outline: none;
    white-space: pre-wrap;
    word-wrap: break-word;
    position: relative;
  }
  .marked-text-editable:focus { border-color: #b0a89a; background: #fff; }

  .edit-hint {
    font-size: 12px; color: #999; margin-top: 6px; font-style: italic;
  }

  /* Article error highlight */
  .err-missing {
    background: #fff0b3;
    border-bottom: 2px solid #e6a817;
    border-radius: 3px;
    padding: 2px 3px;
    font-weight: 600;
    color: #7a5000;
    cursor: pointer;
    position: relative;
  }
  .err-missing:hover {
    background: #ffe680;
  }

  /* Tooltip — shown by JS on click, not CSS hover */
  .suggestion-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #7a5000;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 100;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    pointer-events: all;
  }
  .suggestion-tip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #7a5000;
  }
  /* Arrow pointing area — invisible padding so mouse doesn't lose the tooltip */
  .suggestion-tip::before {
    content: '';
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    height: 16px;
  }
  .suggestion-tip.visible { display: block; }

  /* Feedback */
  .feedback-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 8px; }
  .feedback-item {
    display: flex; gap: 10px; align-items: flex-start; font-size: 14px;
    padding: 8px 12px; background: #fafaf8; border-radius: 8px; border: 1px solid #ede9e3;
    transition: opacity 0.3s;
  }
  .fb-num { font-weight: 700; color: #e6a817; font-size: 13px; min-width: 20px; padding-top: 1px; }
  .fb-text { color: #333; line-height: 1.5; }
  .fb-text strong { color: #1a1a1a; }

  .no-errors {
    display: flex; align-items: center; gap: 8px; font-size: 14px; color: #2d7a3a;
    font-weight: 600; padding: 10px 14px; background: #edf7ee; border-radius: 8px; border: 1px solid #b5e0bc;
  }
  .all-fixed {
    display: flex; align-items: center; gap: 8px; font-size: 14px; color: #2d7a3a;
    font-weight: 600; padding: 10px 14px; background: #edf7ee; border-radius: 8px;
    border: 1px solid #b5e0bc; margin-top: 10px;
  }
  .count-badge {
    display: inline-block; background: #fff7e0; color: #7a5000;
    font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-left: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>Article Checker 🟡</h1>
    <p>Paste your writing and check for article errors — <em>a</em>, <em>an</em>, <em>the</em>.</p>
  </header>

  <div class="card">
    <label for="student-text">Student writing</label>
    <textarea id="student-text" placeholder="Paste your writing here..."></textarea>
    <div class="btn-row">
      <button class="check-btn" id="check-btn" onclick="checkArticles()">Check articles</button>
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>
    <div class="status" id="status"></div>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="card results-card" id="results-card">
    <div class="results-label">
      Marked text
      <span id="badge" class="count-badge" style="display:none;"></span>
    </div>
    <div class="marked-text-editable" id="marked-text" contenteditable="true" spellcheck="false"></div>
    <div class="edit-hint" id="edit-hint" style="display:none;">💡 Click a <span style="background:#fff0b3;color:#7a5000;font-weight:600;padding:0 4px;border-radius:3px;">highlighted word</span> to see the suggestion. Click the suggestion to apply it, or type the correction yourself.</div>
    <div id="all-fixed" class="all-fixed" style="display:none;">🎉 All article errors fixed — great work!</div>
    <div class="feedback-list" id="feedback-list"></div>
  </div>

</div>

<script>
const PROXY = "https://claude-proxy.paulbolter.workers.dev/";
let articleErrors = [];
let activeSpan = null; // track which span's tooltip is open

// Close tooltip if clicking outside a highlight
document.addEventListener('click', function(e) {
  if (!e.target.closest('.err-missing') && !e.target.closest('.suggestion-tip')) {
    closeAllTips();
  }
});

function closeAllTips() {
  document.querySelectorAll('.suggestion-tip.visible').forEach(t => t.classList.remove('visible'));
  activeSpan = null;
}

function toggleTip(span) {
  const tip = span.querySelector('.suggestion-tip');
  if (!tip) return;
  const isOpen = tip.classList.contains('visible');
  closeAllTips();
  if (!isOpen) {
    tip.classList.add('visible');
    activeSpan = span;
  }
}

function applyArticleSuggestion(tipEl, event) {
  event.stopPropagation();
  const span = tipEl.closest('.err-missing');
  if (!span) return;
  const correction = span.getAttribute('data-correction');
  span.replaceWith(document.createTextNode(correction));
  activeSpan = null;
  checkArticleCorrections();
}

function checkArticleCorrections() {
  const markedDiv = document.getElementById('marked-text');
  const badge = document.getElementById('badge');
  const allFixed = document.getElementById('all-fixed');
  const hint = document.getElementById('edit-hint');

  markedDiv.querySelectorAll('.err-missing').forEach(span => {
    const tip = span.querySelector('.suggestion-tip');
    let visible = '';
    span.childNodes.forEach(n => { if (n !== tip) visible += n.textContent; });
    const correction = span.getAttribute('data-correction');
    if (visible.trim().toLowerCase() === correction.trim().toLowerCase()) {
      const idx = span.getAttribute('data-index');
      span.replaceWith(document.createTextNode(visible));
      const fb = document.getElementById('fb-item-' + idx);
      if (fb) fb.style.opacity = '0.35';
    }
  });

  const remaining = markedDiv.querySelectorAll('.err-missing').length;
  if (remaining === 0 && articleErrors.length > 0) {
    badge.style.display = 'none';
    hint.style.display = 'none';
    allFixed.style.display = 'flex';
  } else {
    badge.textContent = remaining + ' error' + (remaining !== 1 ? 's' : '');
    badge.style.display = 'inline-block';
    allFixed.style.display = 'none';
  }
}

async function checkArticles() {
  const text = document.getElementById('student-text').value.trim();
  if (!text) { showError('Please paste your writing before checking.'); return; }

  const btn = document.getElementById('check-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('results-card').style.display = 'none';
  status.innerHTML = '<div class="spinner"></div> Checking...';

  const prompt = `You are an English article checker for Grade 8 ESL students (B2 level).
Your ONLY job is to find errors with English articles: missing "a", "an", "the", or a wrong article.
Do NOT comment on spelling, grammar, vocabulary, punctuation, or anything else.

Return ONLY a valid JSON object. No markdown, no explanation, no extra text.

{
  "errors": [
    {
      "wrong_phrase": "exact substring from the text that contains the error (2-5 words for context)",
      "corrected_phrase": "the corrected version of that same phrase",
      "note": "short note e.g. 'missing article before dog' or 'use THE not A here'"
    }
  ]
}

If there are no article errors, return: {"errors": []}

Student text:
${text}`;

  try {
    const data = await callAPI(prompt);
    articleErrors = data.errors || [];
    renderResults(text, articleErrors);
  } catch(e) {
    showError('Error: ' + e.message);
  }
  btn.disabled = false;
  status.innerHTML = '';
}

function renderResults(text, errors) {
  const markedDiv = document.getElementById('marked-text');
  const feedbackDiv = document.getElementById('feedback-list');
  const resultsCard = document.getElementById('results-card');
  const badge = document.getElementById('badge');
  const hint = document.getElementById('edit-hint');
  const allFixed = document.getElementById('all-fixed');

  resultsCard.style.display = 'block';
  feedbackDiv.innerHTML = '';
  allFixed.style.display = 'none';
  activeSpan = null;

  if (!errors.length) {
    markedDiv.innerHTML = esc(text);
    markedDiv.contentEditable = 'false';
    badge.style.display = 'none';
    hint.style.display = 'none';
    feedbackDiv.innerHTML = '<div class="no-errors">✓ No article errors found — well done!</div>';
    return;
  }

  badge.textContent = errors.length + ' error' + (errors.length !== 1 ? 's' : '');
  badge.style.display = 'inline-block';
  hint.style.display = 'block';
  markedDiv.contentEditable = 'true';

  let html = esc(text);
  errors.forEach((err, i) => {
    if (!err.wrong_phrase) return;
    const ep = esc(err.wrong_phrase);
    const re = new RegExp(ep.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    html = html.replace(re, match =>
      `<span class="err-missing" data-index="${i}" data-correction="${esc(err.corrected_phrase)}" onclick="toggleTip(this)">` +
      `<span class="suggestion-tip" onclick="applyArticleSuggestion(this, event)">✓ Use: ${esc(err.corrected_phrase)}</span>` +
      `${match}</span>`
    );
  });
  markedDiv.innerHTML = html;
  markedDiv.oninput = checkArticleCorrections;

  errors.forEach((err, i) => {
    const item = document.createElement('div');
    item.className = 'feedback-item';
    item.id = 'fb-item-' + i;
    item.innerHTML = `<span class="fb-num">${i+1}</span><span class="fb-text"><strong>"${esc(err.wrong_phrase)}"</strong> → <strong>"${esc(err.corrected_phrase)}"</strong> — ${esc(err.note)}</span>`;
    feedbackDiv.appendChild(item);
  });
}

async function callAPI(prompt) {
  const resp = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) throw new Error(`Server error ${resp.status}: ${(await resp.text()).slice(0,300)}`);
  const data = await resp.json();
  if (data.error) throw new Error(JSON.stringify(data.error));
  const raw = (data.content || []).map(b => b.text || '').join('');
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON found in response.');
  return JSON.parse(match[0]);
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearAll() {
  document.getElementById('student-text').value = '';
  articleErrors = [];
  activeSpan = null;
  document.getElementById('results-card').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('status').innerHTML = '';
  document.getElementById('all-fixed').style.display = 'none';
}
</script>
</body>
</html>
