<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Deeper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --blue: #2563b0;
  --blue-dark: #1a4d99;
  --text: #1a1a2e;
  --muted: #6b7280;
  --border: #e5e7eb;
  --sidebar-bg: #ffffff;
  --sidebar-hover: #f0f4fb;
  --sidebar-active-bg: #e8f0fb;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(37,99,176,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-shrink: 0;
}
header h1 {
  font-family: "DM Serif Display", Georgia, serif;
  font-size: 1.7rem;
  color: var(--blue);
  letter-spacing: -0.3px;
  line-height: 1;
}
header h1 em { font-style: italic; color: #1a3a6e; }
header p {
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 300;
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  min-width: 220px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding-bottom: 20px;
}

.cat-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--blue);
  padding: 14px 16px 5px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.cat-label:first-child { border-top: none; margin-top: 0; padding-top: 12px; }

.topic-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 7px 16px 7px 20px;
  font-family: "DM Sans", sans-serif;
  font-size: 0.85rem;
  color: #374151;
  cursor: pointer;
  line-height: 1.4;
  transition: background 0.12s;
  border-left: 3px solid transparent;
}
.topic-btn:hover {
  background: var(--sidebar-hover);
  color: var(--text);
}
.topic-btn.active {
  background: var(--sidebar-active-bg);
  color: var(--blue);
  font-weight: 600;
  border-left-color: var(--blue);
}

/* ── MAIN PANEL ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  display: flex;
  flex-direction: column;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-align: center;
  gap: 12px;
}
.empty-icon {
  font-size: 2.6rem;
  opacity: 0.5;
}
.empty-state p {
  font-size: 0.95rem;
  max-width: 280px;
  line-height: 1.6;
  font-weight: 300;
}

/* Question area */
.q-area { display: none; flex-direction: column; gap: 24px; max-width: 620px; }
.q-area.show { display: flex; }

.topic-heading {
  font-family: "DM Serif Display", Georgia, serif;
  font-size: 1.9rem;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 10px;
}

.diff-row { display: flex; gap: 10px; }
.diff-btn {
  flex: 1;
  padding: 10px 8px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: #fafafa;
  font-family: "DM Sans", sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.diff-btn:hover { border-color: var(--blue); color: var(--blue); }
.diff-btn.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }

.diff-hint {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--muted);
  font-style: italic;
  min-height: 1.2em;
}

.get-btn {
  padding: 14px 32px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: "DM Sans", sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  align-self: flex-start;
}
.get-btn:hover { background: var(--blue-dark); }

/* Question card */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 30px 32px;
  border-left: 5px solid var(--blue);
  border-top-left-radius: 0;
  border-bottom-left-radius: 0;
  display: none;
  animation: slideUp 0.3s ease;
}
.q-card.show { display: block; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-level {
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 14px;
}
.q-text {
  font-family: "DM Serif Display", Georgia, serif;
  font-size: 1.45rem;
  line-height: 1.5;
  color: var(--text);
}
.q-hint {
  margin-top: 10px;
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
}
.again-btn {
  margin-top: 20px;
  background: none;
  border: 1.5px solid var(--blue);
  color: var(--blue);
  padding: 9px 22px;
  border-radius: 8px;
  font-family: "DM Sans", sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.again-btn:hover { background: var(--blue); color: white; }

/* Scrollbar styling */
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>Think <em>Deeper</em></h1>
  <p>Pick a topic &mdash; choose your level &mdash; get a question worth talking about.</p>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- MAIN -->
  <main class="main">

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <p>Choose a topic from the left to get a critical thinking question.</p>
    </div>

    <div class="q-area" id="qArea">
      <div class="topic-heading" id="topicHeading"></div>

      <div>
        <div class="section-label">Difficulty</div>
        <div class="diff-row">
          <button class="diff-btn" data-level="accessible" onclick="setDiff(this)">Accessible</button>
          <button class="diff-btn active" data-level="challenging" onclick="setDiff(this)">Challenging</button>
        </div>
        <div class="diff-hint" id="diffHint">Requires some analysis and a supported opinion.</div>
      </div>

      <button class="get-btn" onclick="getQ()">Get question</button>

      <div class="q-card" id="qCard">
        <div class="q-level" id="qLevel"></div>
        <div class="q-text" id="qText"></div>
        <div class="q-hint">Discuss with a partner — or think about your answer first.</div>
        <button class="again-btn" onclick="getQ()">Another question</button>
      </div>
    </div>

  </main>
</div>

ose who are poor?","Is poverty always caused by personal choices, or are there other causes?","Do you think it is possible to end poverty completely? Why or why not?"],"challenging":["Is a society with some inequality but high overall wealth better or worse than a more equal but poorer society?","Should basic needs like housing, food and healthcare be guaranteed to everyone by the government?","Does extreme wealth cause harm to society, even if it was earned fairly?"]},"War and peace":{"accessible":["Is war ever the right solution to a conflict? Can you think of an example?","Should young people be required to serve in the military?","Do you think the world will ever be completely free of war? Why or why not?"],"challenging":["Is it ever right to go to war to protect people in another country?","Should countries that start wars be held responsible for the damage they cause, even decades later?","Does spending money on military make a country safer or more dangerous?"]},"Artificial intelligence":{"accessible":["Do you think AI will make life better or worse in the future?","Should AI be allowed to make important decisions, like who gets a job or a loan?","Is it possible to trust a machine the same way you trust a person?"],"challenging":["Should AI systems be required to explain how they make their decisions?","Is it dangerous to allow AI to become more intelligent than humans?","Who should be responsible when an AI system makes a serious mistake — the programmer, the company, or no one?"]},"Robots":{"accessible":["Would you like to have a robot helper at home? What would be good or bad about it?","Should robots be used to do dangerous jobs that humans currently do?","Is it strange or normal to feel emotions towards a robot?"],"challenging":["If robots do most of the work in the future, what will give people's lives meaning?","Should there be a limit on how human-like robots are allowed to look and behave?","Is it ethical to create robots that can feel pain or fear, var currentDiff = "challenging";
var currentTopic = null;
var used = {};

function buildSidebar() {
  var sb = document.getElementById("sidebar");
  CATS.forEach(function(cat) {
    var lbl = document.createElement("div");
    lbl.className = "cat-label";
    lbl.textContent = cat.label;
    sb.appendChild(lbl);
    cat.topics.forEach(function(t) {
      var btn = document.createElement("button");
      btn.className = "topic-btn";
      btn.textContent = t;
      btn.onclick = function() { selectTopic(t, btn); };
      sb.appendChild(btn);
    });
  });
}

function selectTopic(topic, btn) {
  document.querySelectorAll(".topic-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  currentTopic = topic;
  document.getElementById("topicHeading").textContent = topic;
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("qArea").classList.add("show");
  var card = document.getElementById("qCard");
  card.classList.remove("show");
}

function setDiff(btn) {
  document.querySelectorAll(".diff-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  currentDiff = btn.getAttribute("data-level");
  document.getElementById("diffHint").textContent = DIFF_HINTS[currentDiff];
  document.getElementById("qCard").classList.remove("show");
}

function getQ() {
  if (!currentTopic) return;
  var pool = QUESTIONS[currentTopic] && QUESTIONS[currentTopic][currentDiff];
  if (!pool || !pool.length) return;
  var key = currentTopic + "|" + currentDiff;
  if (!used[key]) used[key] = [];
  var avail = pool.map(function(_, i) { return i; }).filter(function(i) { return used[key].indexOf(i) === -1; });
  if (!avail.length) { used[key] = []; avail = pool.map(function(_, i) { return i; }); }
  var idx = avail[Math.floor(Math.random() * avail.length)];
  used[key].push(idx);
  document.getElementById("qLevel").textContent = DIFF_LABELS[currentDiff];
  document.getElementById("qText").textContent = pool[idx];
  var card = document.getElementById("qCard");
  card.classList.remove("show");
  void card.offsetWidth;
  card.classList.add("show");
}

buildSidebar();
</script>
