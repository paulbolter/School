/* ============== SHUFFLE HELPERS ============== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuestionOptions(question) {
  const indices = shuffle(question.options.map(function(_, i) { return i; }));
  const newOptions = indices.map(function(i) { return question.options[i]; });
  const newQuestion = {
    q: question.q,
    options: newOptions,
    feedback: question.feedback
  };
  if (typeof question.answer === 'number') {
    newQuestion.answer = indices.indexOf(question.answer);
  }
  return newQuestion;
}

function prepareSection(section) {
  const shuffledQs = shuffle(section.questions);
  section._questions = shuffledQs.map(shuffleQuestionOptions);
}

    const card = document.createElement('button');
    card.className = 'section-card';
    card.onclick = function() { startSection(s.id); };
    card.innerHTML =
      '<div class="section-card-top">' +
        '<span class="section-card-num">' + s.label + '</span>' +
      '</div>' +
      '<div class="section-card-title">' + s.icon + ' ' + s.title + '</div>' +
      '<div class="section-card-desc">' + s.desc + '</div>';
    list.appendChild(card);
  });
}

/* ============== QUIZ ============== */
function startSection(id) {
  currentSection = sections.find(function(s) { return s.id === id; });
  prepareSection(currentSection);
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('banner').style.display = 'none';
  document.getElementById('picker').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  window.scrollTo(0, 0);
  document.getElementById('quiz-section-label').textContent = currentSection.label;
  document.getElementById('quiz-section-title').textContent = currentSection.icon + ' ' + currentSection.title;
  render();
}

function render() {
  const q = currentSection._questions[current];
  const total = currentSection._questions.length;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-text').textContent = (current + 1) + ' of ' + total;
  document.getElementById('progress-fill').style.width = ((current / total) * 100) + '%';
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<span class="letter">' + letters[i] + '</span>' + opt;
    btn.onclick = function() { choose(i); };
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className = 'feedback hidden';
  document.getElementById('feedback').textContent = '';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.disabled = false;
  const skipBtn = document.getElementById('skip-btn');
  skipBtn.style.display = currentSection.isOpinion ? 'inline-block' : 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = currentSection._questions[current];
  const btns = document.querySelectorAll('.option');
  btns.forEach(function(b) { b.disabled = true; });
  const fb = document.getElementById('feedback');

  if (currentSection.isOpinion) {
    btns[i].classList.add('opinion');
    fb.className = 'feedback opinion';
  } else if (i === q.answer) {
    btns[i].classList.add('correct');
    fb.className = 'feedback correct';
    score++;
  } else {
    btns[i].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback wrong';
  }
  fb.textContent = q.feedback;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn visible';
  nextBtn.disabled = true;
  setTimeout(function() { nextBtn.disabled = false; }, 500);
  document.getElementById('skip-btn').style.display = 'none';
}

function skipQuestion() {
  nextQuestion();
}

function nextQuestion() {
  current++;
  if (current >= currentSection._questions.length) {
    showResult();
  } else {
    render();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const total = currentSection._questions.length;

  if (currentSection.isOpinion) {
    document.getElementById('result-score').textContent = '✓';
    document.getElementById('result-label').textContent = 'No score — just opinions';
    document.getElementById('result-msg').textContent = "Thanks for sharing your views. There are no right or wrong answers in this section.";
  } else {
    document.getElementById('result-score').textContent = score + '/' + total;
    document.getElementById('result-label').textContent = 'out of ' + total;
    const msgs = ["Keep watching!", "Not bad — a few details slipped by.", "Good knowledge of this season.", "Very good — you really know this one.", "Perfect score — true Hawkins material."];
    const pct = score / total;
    const idx = pct < 0.25 ? 0 : pct < 0.5 ? 1 : pct < 0.75 ? 2 : pct < 1 ? 3 : 4;
    document.getElementById('result-msg').textContent = msgs[idx];
  }
}

function restartCurrent() {
  prepareSection(currentSection);
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  render();
}

function goHome() {
  currentSection = null;
  current = 0;
  score = 0;
  answered = false;
  renderPicker();
}

renderPicker();
</script>
