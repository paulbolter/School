<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGCSE Writing Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #faf8f4;
    --cream: #f2ede4;
    --rule: #c8bfaf;
    --accent: #2a5298;
    --accent-light: #dce6f5;
    --green: #1d6b35;
    --green-light: #d6f0df;
    --amber: #9a5a00;
    --amber-light: #fdefd8;
    --red: #9a1a1a;
    --red-light: #fde0e0;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b8a898' fill-opacity='0.12'%3E%3Ccircle cx='20' cy='20' r='1'/%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    padding: 2.5rem 1rem 4rem;
    font-family: 'Source Serif 4', Georgia, serif;
  }

  .sheet {
    max-width: 740px;
    margin: 0 auto;
    background: var(--paper);
    box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
    border-radius: 2px;
    overflow: hidden;
  }

  /* ── Header ── */
  .sheet-header {
    background: var(--accent);
    padding: 1.4rem 2.2rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sheet-header h1 {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-size: 1.25rem;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .sheet-header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .logo-mark {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }

  /* ── Body sections ── */
  .section {
    padding: 1.6rem 2.2rem;
    border-bottom: 1px solid var(--rule);
  }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.7rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent-light);
  }

  /* ── Question paste area ── */
  #question-box {
    width: 100%;
    min-height: 130px;
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 0.9rem 1rem;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
    background: #fff;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  #question-box:focus { border-color: var(--accent); }
  #question-box::placeholder { color: #bbb; font-style: italic; font-size: 13.5px; }

  /* ── Name input ── */
  #name-box {
    width: 100%;
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 0.7rem 1rem;
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  #name-box:focus { border-color: var(--accent); }
  #name-box::placeholder { color: #bbb; font-style: italic; font-size: 13.5px; }

  /* ── Word target selector ── */
  .target-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }
  .target-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 14px;
    border: 1.5px solid var(--rule);
    border-radius: 20px;
    background: #fff;
    color: #666;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .target-btn:hover { border-color: var(--accent); color: var(--accent); }
  .target-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .target-hint {
    font-size: 12px;
    color: #999;
    font-style: italic;
    margin-top: 0.5rem;
    font-family: 'Source Serif 4', serif;
  }

  /* ── Writing area ── */
  .writing-wrap {
    position: relative;
  }
  #answer {
    width: 100%;
    min-height: 400px;
    border: none;
    border-bottom: 1px solid var(--rule);
    padding: 0.5rem 2px;
    font-family: 'Source Serif 4', serif;
    font-size: 14.5px;
    line-height: 2.2;
    color: var(--ink);
    background: transparent;
    outline: none;
    resize: vertical;
    caret-color: var(--accent);
  }
  #answer::placeholder { color: #ccc; font-style: italic; font-size: 13px; }

  /* lined paper effect */
  .writing-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent calc(2.2em - 1px),
      #e8e2d8 calc(2.2em - 1px),
      #e8e2d8 2.2em
    );
    background-position: 0 0.5rem;
    pointer-events: none;
    opacity: 0.55;
  }

  /* ── Counter bar ── */
  .counter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 0 0.3rem;
    gap: 12px;
    flex-wrap: wrap;
  }
  .word-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 5px 16px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }
  .wc-neutral { background: var(--cream); color: #777; border: 1px solid var(--rule); }
  .wc-warn    { background: var(--amber-light); color: var(--amber); border: 1px solid #e8c07a; }
  .wc-ok      { background: var(--green-light); color: var(--green); border: 1px solid #8ecfa5; }
  .wc-over    { background: var(--red-light); color: var(--red); border: 1px solid #e8a0a0; }

  .bar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .copy-confirm {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.06em;
  }
  .copy-confirm.show { opacity: 1; }
  .copy-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1.5px solid var(--rule);
    background: #fff;
    color: #555;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1.5px solid var(--rule);
    background: #fff;
    color: #888;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 4px;
    background: var(--cream);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    background: var(--rule);
  }

  /* ── Footer note ── */
  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: #bbb;
    text-align: center;
    padding: 1rem 2.2rem 1.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="sheet">

  <div class="sheet-header">
    <div>
      <h1>Writing Practice</h1>
      <div class="subtitle">Paste your question · Write your answer · Check your word count</div>
    </div>
    <div class="logo-mark">Cambridge<br>ESL · Core</div>
  </div>

  <!-- STEP 1: Question -->
  <div class="section">
    <div class="section-label">Step 1 — Paste the question here</div>
    <textarea id="question-box" spellcheck="false" placeholder="Paste the full question text here — the scenario, instructions, speech bubbles, and word count requirement..."></textarea>
  </div>

  <!-- STEP 2: Name -->
  <div class="section">
    <div class="section-label">Step 2 — Your name</div>
    <input type="text" id="name-box" spellcheck="false" autocomplete="off" placeholder="Type your name here...">
  </div>

  <!-- STEP 3: Write -->
  <div class="section">
    <div class="section-label">Step 3 — Write your answer</div>
    <div class="writing-wrap">
      <textarea id="answer" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"
        data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false"
        placeholder="Write your answer here..."></textarea>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="counter-bar">
      <div class="word-pill wc-neutral" id="word-pill">0 words</div>
      <div class="bar-right">
        <span class="copy-confirm" id="copy-confirm">✓ Copied</span>
        <button class="copy-btn" onclick="copyText()">Copy answer</button>
      </div>
    </div>
  </div>

  <div class="footer-note">Presidential School · IGCSE Writing Practice</div>

</div>

<script>
  function countWords(text) {
    return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  }

  function updateCount() {
    const words = countWords(document.getElementById('answer').value);
    const pill = document.getElementById('word-pill');
    const bar = document.getElementById('progress-bar');

    pill.textContent = words + (words === 1 ? ' word' : ' words');
    pill.className = 'word-pill ' + (words === 0 ? 'wc-neutral' : 'wc-ok');

    const pct = Math.min((words / 300) * 100, 100);
    bar.style.width = pct + '%';
    bar.style.background = words === 0 ? '#c8bfaf' : '#4caf7d';
  }

  document.getElementById('answer').addEventListener('input', updateCount);

  function copyText() {
    const ta = document.getElementById('answer');
    const nameBox = document.getElementById('name-box');
    if (!ta.value.trim()) return;

    const name = nameBox.value.trim();
    if (!name) {
      alert('Please type your name before copying.');
      nameBox.focus();
      return;
    }

    const message = `✍️ ${name}\n\n${ta.value.trim()}`;

    navigator.clipboard.writeText(message).then(() => {
      const c = document.getElementById('copy-confirm');
      c.classList.add('show');
      setTimeout(() => c.classList.remove('show'), 2000);
    });
  }

</script>

</body>
</html>
