<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Jizzax Presidential Name Picker 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            background: linear-gradient(180deg, 
                #0d2b6b 0%, 
                #1a3f8a 15%, 
                #1565c0 30%, 
                #1976d2 45%, 
                #0288d1 58%, 
                #00695c 72%, 
                #00796b 85%, 
                #004d40 100%
            );
            background-attachment: fixed;
        }

        .bg-float {
            position: fixed;
            opacity: 0.18;
            animation: floatDrift 14s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
            font-size: 36px;
        }
        @keyframes floatDrift {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            25% { transform: translateY(-18px) translateX(8px) rotate(5deg); }
            50% { transform: translateY(-30px) translateX(-5px) rotate(-3deg); }
            75% { transform: translateY(-12px) translateX(12px) rotate(8deg); }
        }

        .rainbow-arc {
            position: fixed;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            border-radius: 300px 300px 0 0;
            background: conic-gradient(from 180deg at 50% 100%, 
                #f9a825, #fdd835, #fff176, #1565c0, #00897b, #f9a825
            );
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
            animation: rainbowPulse 8s ease-in-out infinite;
        }
        @keyframes rainbowPulse {
            0%, 100% { opacity: 0.15; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.25; transform: translateX(-50%) scale(1.05); }
        }

        .shooting-star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.6), 0 0 12px 4px rgba(253,216,53,0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60px; height: 2px;
            background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
            transform-origin: left center;
            transform: rotate(45deg) translateX(-60px);
        }
        .shooting-star:nth-child(1) { top: 8%; left: 15%; animation: shoot 6s 1s infinite; }
        .shooting-star:nth-child(2) { top: 20%; left: 70%; animation: shoot 8s 3.5s infinite; }
        .shooting-star:nth-child(3) { top: 12%; left: 45%; animation: shoot 7s 5.5s infinite; }
        @keyframes shoot {
            0% { opacity: 0; transform: translate(0, 0); }
            2% { opacity: 1; }
            8% { opacity: 1; transform: translate(120px, 80px); }
            10% { opacity: 0; transform: translate(150px, 100px); }
            100% { opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 28px;
            max-width: 640px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 
                0 8px 40px rgba(13, 43, 107, 0.3),
                0 2px 10px rgba(255, 255, 255, 0.3) inset;
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #f9a825;
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.9em;
            text-shadow: 0 2px 12px rgba(249, 168, 37, 0.4), 0 0 30px rgba(253, 216, 53, 0.2);
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .hero-images {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .hero-img-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid;
            transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            cursor: default;
        }
        .hero-img-wrap:nth-child(1) { border-color: #1565c0; background: linear-gradient(135deg, #e3f2fd, #bbdefb); box-shadow: 0 0 18px rgba(21,101,192,0.4); }
        .hero-img-wrap:nth-child(2) { border-color: #f9a825; background: linear-gradient(135deg, #fff8e1, #fff176); box-shadow: 0 0 18px rgba(249,168,37,0.4); }
        .hero-img-wrap:nth-child(3) { border-color: #00897b; background: linear-gradient(135deg, #e0f2f1, #b2dfdb); box-shadow: 0 0 18px rgba(0,137,123,0.4); }
        .hero-img-wrap:nth-child(4) { border-color: #1976d2; background: linear-gradient(135deg, #e8eaf6, #c5cae9); box-shadow: 0 0 18px rgba(25,118,210,0.4); }
        .hero-img-wrap:nth-child(5) { border-color: #fdd835; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 0 18px rgba(253,216,53,0.4); }
        .hero-img-wrap:hover {
            transform: scale(1.2) rotate(-8deg);
            box-shadow: 0 0 30px rgba(244, 143, 177, 0.5);
        }

        button {
            padding: 13px 20px;
            border-radius: 50px;
            border: 2px solid rgba(233, 30, 99, 0.15);
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #1565c0, #00897b);
            color: white;
            box-shadow: 0 4px 15px rgba(21, 101, 192, 0.35);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(21, 101, 192, 0.5);
        }
        button:active { transform: translateY(0); }

        .pick-button {
            width: auto; 
            display: block;
            padding: 16px 48px;
            font-size: 1.4em;
            font-family: 'Pacifico', cursive;
            margin: 12px auto;
            background: linear-gradient(135deg, #f9a825 0%, #fdd835 25%, #1565c0 50%, #00897b 75%, #f9a825 100%);
            background-size: 300% 300%;
            animation: rainbowBtn 4s ease-in-out infinite;
            color: white;
            box-shadow: 0 6px 30px rgba(249, 168, 37, 0.5);
            border: none;
            letter-spacing: 1px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.25);
        }
        @keyframes rainbowBtn {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .pick-button:hover {
            box-shadow: 0 8px 40px rgba(249, 168, 37, 0.7);
            transform: translateY(-3px) scale(1.02);
        }

        .selected-student-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 16px 0;
            min-height: 200px;
        }

        .selected-student {
            background: linear-gradient(135deg, #0d2b6b 0%, #1565c0 50%, #00897b 100%);
            color: white;
            padding: 28px 40px;
            border-radius: 999px;
            text-align: center;
            font-size: 2em;
            font-family: 'Pacifico', cursive;
            min-width: 220px;
            max-width: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(13, 43, 107, 0.4);
            border: 3px solid rgba(253,216,53,0.6);
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .selected-student::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.15), transparent, rgba(255,255,255,0.08), transparent);
            animation: shimmer 5s linear infinite;
        }
        @keyframes shimmer { to { transform: rotate(360deg); } }
        .selected-student > * { position: relative; z-index: 1; }

        .placeholder { font-family: 'Quicksand', sans-serif; font-size: 0.5em; opacity: 0.85; }

        /* Spinning during pick */
        .selected-student.is-spinning {
            animation: spinWheel 0.18s linear infinite;
        }
        @keyframes spinWheel {
            0%   { transform: rotateY(0deg) scale(1.0); }
            25%  { transform: rotateY(90deg) scale(0.85); }
            50%  { transform: rotateY(180deg) scale(1.0); }
            75%  { transform: rotateY(270deg) scale(0.85); }
            100% { transform: rotateY(360deg) scale(1.0); }
        }

        /* Final reveal pop */
        .selected-student.reveal {
            animation: revealPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
        }
        @keyframes revealPop {
            0%   { transform: scale(0.5) rotate(-10deg); opacity: 0.3; }
            60%  { transform: scale(1.12) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .student-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 18px 0;
        }

        .student-item {
            width: 90px; height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            font-weight: 700;
            font-size: 0.72em;
            line-height: 1.15;
            padding: 8px;
            word-break: break-word;
            transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
            cursor: default;
            color: #fff;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }

        .student-item:nth-child(8n+1) { background: linear-gradient(135deg, #1565c0, #0d47a1); }
        .student-item:nth-child(8n+2) { background: linear-gradient(135deg, #00897b, #00695c); }
        .student-item:nth-child(8n+3) { background: linear-gradient(135deg, #f9a825, #f57f17); }
        .student-item:nth-child(8n+4) { background: linear-gradient(135deg, #0288d1, #01579b); }
        .student-item:nth-child(8n+5) { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
        .student-item:nth-child(8n+6) { background: linear-gradient(135deg, #1976d2, #1565c0); }
        .student-item:nth-child(8n+7) { background: linear-gradient(135deg, #fdd835, #f9a825); color: #0d2b6b; text-shadow: none; }
        .student-item:nth-child(8n+8) { background: linear-gradient(135deg, #00acc1, #006064); }

        .student-item:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 25px rgba(249, 168, 37, 0.5);
            z-index: 2;
        }

        .student-item.last-picked {
            background: linear-gradient(135deg, #fdd835, #f9a825) !important;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(253, 216, 53, 0.8), 0 0 40px rgba(249, 168, 37, 0.4);
            animation: winPulse 1s ease-in-out;
            transform: scale(1.1);
            color: #0d2b6b;
            text-shadow: none;
        }
        @keyframes winPulse {
            0%, 100% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,241,118,0.7); }
            50% { transform: scale(1.2); box-shadow: 0 0 35px rgba(255,213,79,0.9); }
        }

        .student-item.excluded {
            background: rgba(255,255,255,0.15) !important;
            border-color: rgba(255,255,255,0.2);
            color: rgba(120,100,120,0.35);
            text-decoration: line-through;
            box-shadow: none;
            text-shadow: none;
        }

        .small-button {
            padding: 9px 18px;
            font-size: 0.88em;
            border-radius: 50px;
            background: linear-gradient(135deg, #1565c0, #00695c);
            color: white;
            border: none;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 12px rgba(21,101,192,0.25);
        }
        .small-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(21,101,192,0.4);
        }

        .reset-btn {
            background: linear-gradient(135deg, #1976d2, #00897b);
        }

        canvas#confettiCanvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 999;
        }


    </style>
</head>
<body>
    <div class="rainbow-arc"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <canvas id="confettiCanvas"></canvas>

    <div class="container">
        <h1>🌟 Jizzax Presidential<br>Name Picker 🌟</h1>

        <div class="hero-images" id="heroImages"></div>

        <button class="pick-button" onclick="pickStudent()">⭐ PICK! 🏆</button>

        <div style="text-align: center; margin: 10px 0;">
            <button onclick="resetExcluded()" class="small-button reset-btn">↻ Reset Excluded</button>
        </div>

        <div class="selected-student-wrap">
            <div id="selectedStudent" class="selected-student">
                <span class="placeholder">Tap the button to pick a student! ⭐</span>
            </div>
        </div>

        <div id="studentList" class="student-list"></div>
    </div>

    <script>
        const students = [
            'Sardor', 'Samandar', 'Durdona', 'Ifora', 'Setora',
            'Davlat', 'Xushnud', 'Akramjon', 'Shamshod', 'Otabek',
            'Azizbek', 'Durbek'
        ];

        let lastPicked = null;
        let temporarilyExcluded = [];

        const heroImageSets = [
            { emoji: '⚽', label: 'Footballer', bg: 'linear-gradient(135deg, #e3f2fd, #bbdefb)' },
            { emoji: '🏥', label: 'Doctor', bg: 'linear-gradient(135deg, #fffde7, #fff9c4)' },
            { emoji: '🚀', label: 'Astronaut', bg: 'linear-gradient(135deg, #e0f2f1, #b2dfdb)' },
            { emoji: '⚖️', label: 'Lawyer', bg: 'linear-gradient(135deg, #e8eaf6, #c5cae9)' },
            { emoji: '🎨', label: 'Artist', bg: 'linear-gradient(135deg, #fff8e1, #fff176)' },
        ];

        function renderHeroImages() {
            const container = document.getElementById('heroImages');
            container.innerHTML = '';
            heroImageSets.forEach(item => {
                const wrap = document.createElement('div');
                wrap.className = 'hero-img-wrap';
                wrap.style.background = item.bg;
                wrap.title = item.label;
                wrap.textContent = item.emoji;
                container.appendChild(wrap);
            });
        }

        function displayStudentList() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';

            students.forEach(student => {
                const div = document.createElement('div');
                div.className = 'student-item';
                const isExcluded = temporarilyExcluded.includes(student);

                if (student === lastPicked && !isExcluded) div.classList.add('last-picked');
                if (isExcluded) div.classList.add('excluded');

                const nameSpan = document.createElement('span');
                nameSpan.textContent = student;
                div.appendChild(nameSpan);
                listDiv.appendChild(div);
            });
        }

        function resetExcluded() {
            temporarilyExcluded = [];
            displayStudentList();
        }

        function pickStudent() {
            const availableStudents = students.filter(s => !temporarilyExcluded.includes(s));

            if (availableStudents.length === 0) {
                alert('All students have been excluded! Click ↻ Reset to include them back.');
                return;
            }

            const displayElement = document.getElementById('selectedStudent');
            const funEmojis = ['⚽','🏥','🚀','⚖️','🎨','💼','🔬','✈️','🏗️','🎓','👨‍💻','🏆'];

            // Start spinning
            displayElement.classList.remove('reveal');
            displayElement.classList.add('is-spinning');

            let spinCount = 0;
            const totalSpins = 22;

            const spinInterval = setInterval(() => {
                const randomStudent = availableStudents[Math.floor(Math.random() * availableStudents.length)];
                const randomEmoji = funEmojis[Math.floor(Math.random() * funEmojis.length)];
                displayElement.innerHTML = `<span>${randomEmoji} ${randomStudent} ${randomEmoji}</span>`;
                spinCount++;

                if (spinCount >= totalSpins) {
                    clearInterval(spinInterval);

                    let finalPool = availableStudents.filter(s => s !== lastPicked);
                    if (finalPool.length === 0) finalPool = availableStudents;
                    const picked = finalPool[Math.floor(Math.random() * finalPool.length)];
                    lastPicked = picked;

                    if (!temporarilyExcluded.includes(picked)) {
                        temporarilyExcluded.push(picked);
                    }

                    // Stop spinning, show reveal
                    displayElement.classList.remove('is-spinning');
                    displayElement.innerHTML = `<span>🌟 ${picked} 🏆</span>`;
                    // Force reflow so animation restarts
                    void displayElement.offsetWidth;
                    displayElement.classList.add('reveal');

                    displayStudentList();
                    createConfetti();
                }
            }, 100);
        }

        function createConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const popperX = canvas.width / 2;
            const popperY = canvas.height / 2;
            const confettiPieces = [];
            const emojis = ['⚽', '🏥', '🚀', '⚖️', '🎨', '💼', '🔬', '✈️', '🏗️', '🎓', '👨‍💻', '🏆'];
            const colors = ['#1565c0', '#0d47a1', '#f9a825', '#fdd835', '#00897b', '#00695c', '#0288d1', '#2e7d32', '#1976d2', '#f57f17'];

            for (let i = 0; i < 100; i++) {
                const angle = (Math.PI * 2 * i) / 100;
                const velocity = Math.random() * 8 + 6;
                confettiPieces.push({
                    x: popperX, y: popperY,
                    size: Math.random() * 8 + 4,
                    speedX: Math.cos(angle) * velocity,
                    speedY: Math.sin(angle) * velocity - Math.random() * 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5,
                    gravity: 0.3,
                    isCircle: Math.random() > 0.4,
                    opacity: 1
                });
            }

            for (let i = 0; i < 18; i++) {
                const angle = (Math.PI * 2 * i) / 18;
                const velocity = Math.random() * 6 + 4;
                confettiPieces.push({
                    x: popperX, y: popperY,
                    emoji: emojis[Math.floor(Math.random() * emojis.length)],
                    size: 28,
                    speedX: Math.cos(angle) * velocity,
                    speedY: Math.sin(angle) * velocity - Math.random() * 2,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 8 - 4,
                    gravity: 0.25,
                    opacity: 1
                });
            }

            let frameCount = 0;
            function animateConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frameCount++;

                if (frameCount < 10) {
                    ctx.font = '60px Arial';
                    ctx.fillText('🏆', popperX - 30, popperY + 20);
                }

                confettiPieces.forEach((piece, index) => {
                    piece.speedY += piece.gravity;
                    piece.x += piece.speedX;
                    piece.y += piece.speedY;
                    piece.rotation += piece.rotationSpeed;

                    ctx.save();
                    ctx.translate(piece.x, piece.y);
                    ctx.rotate((piece.rotation * Math.PI) / 180);

                    if (piece.emoji) {
                        ctx.font = piece.size + 'px Arial';
                        ctx.fillText(piece.emoji, -piece.size / 2, piece.size / 2);
                    } else {
                        ctx.fillStyle = piece.color;
                        if (piece.isCircle) {
                            ctx.beginPath();
                            ctx.arc(0, 0, piece.size / 2, 0, Math.PI * 2);
                            ctx.fill();
                        } else {
                            ctx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.6);
                        }
                    }
                    ctx.restore();

                    if (piece.y > canvas.height + 50) {
                        confettiPieces.splice(index, 1);
                    }
                });

                if (confettiPieces.length > 0) {
                    requestAnimationFrame(animateConfetti);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animateConfetti();
        }

        window.onload = function() {
            renderHeroImages();
            displayStudentList();
        };
    </script>
</body>
</html>
