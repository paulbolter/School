<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card-border: #2a2a4a;
    --accent: #ff6b9d;
    --accent2: #c084fc;
    --accent3: #67e8f9;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --skip: #f59e0b;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-effects {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: orbFloat 12s ease-in-out infinite;
  }
  .bg-orb:nth-child(1) { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .bg-orb:nth-child(2) { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
  .bg-orb:nth-child(3) { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 50%; animation-delay: -8s; }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  /* Layout */
  .container {
    position: relative; z-index: 1;
    max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* Header */
  .header {
    text-align: center; margin-bottom: 1.5rem;
  }
  .header h1 {
    font-family: 'Space Mono', monospace; font-size: clamp(28px, 6vw, 42px);
    font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--muted); font-size: 14px; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* ── SCREEN: Anime Picker ── */
  .anime-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px; margin-top: 1rem;
  }
  .anime-btn {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 12px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--text); position: relative; overflow: hidden;
  }
  .anime-btn:hover {
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(255, 107, 157, 0.15);
  }
  .anime-btn:active { transform: translateY(0); }
  .anime-btn .emoji { font-size: 28px; display: block; margin-bottom: 6px; }

  /* ── SCREEN: Loading ── */
  .loading-screen { text-align: center; padding-top: 4rem; }
  .loader-ring {
    width: 64px; height: 64px; margin: 0 auto 1.5rem;
    border: 3px solid var(--card-border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { color: var(--muted); font-size: 15px; }
  .loading-show { font-weight: 700; color: var(--accent); font-size: 18px; margin-top: 8px; }

  /* ── SCREEN: Quiz ── */
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
  }
  .quiz-show-name {
    font-weight: 700; font-size: 15px; color: var(--accent2);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .quiz-progress {
    font-size: 13px; color: var(--muted); font-weight: 600;
  }

  /* Progress bar */
  .progress-track {
    height: 6px; background: var(--card); border-radius: 8px;
    overflow: hidden; margin-bottom: 1.5rem;
  }
  .progress-fill {
    height: 100%; border-radius: 8px; transition: width 0.4s ease;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  /* Question card */
  .q-card {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px;
  }
  .q-text {
    font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 1.25rem;
  }

  /* Answer options */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--card-border);
    border-radius: 10px; padding: 12px 14px; text-align: left;
    cursor: pointer; transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500;
    color: var(--text); display: flex; align-items: center; gap: 10px;
  }
  .opt-btn:hover:not(.locked) {
    border-color: var(--accent2); background: rgba(192, 132, 252, 0.08);
  }
  .opt-btn .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-weight: 700;
    font-size: 13px; background: rgba(255,255,255,0.06); flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .opt-btn.correct { border-color: var(--green); background: rgba(52, 211, 153, 0.1); }
  .opt-btn.correct .opt-letter { background: var(--green); color: var(--bg); }
  .opt-btn.wrong { border-color: var(--red); background: rgba(248, 113, 113, 0.1); }
  .opt-btn.wrong .opt-letter { background: var(--red); color: var(--bg); }
  .opt-btn.locked { cursor: default; opacity: 0.5; }
  .opt-btn.locked.correct { opacity: 1; }
  .opt-btn.locked.wrong { opacity: 0.7; }

  /* Feedback */
  .feedback {
    margin-top: 12px; padding: 10px 14px; border-radius: 10px;
    font-size: 14px; font-weight: 500; line-height: 1.5;
    animation: fadeUp 0.25s ease;
  }
  .feedback.correct { background: rgba(52, 211, 153, 0.1); color: var(--green); }
  .feedback.wrong { background: rgba(248, 113, 113, 0.1); color: var(--red); }
  .feedback.skipped { background: rgba(245, 158, 11, 0.1); color: var(--skip); }

  /* Action buttons row */
  .action-row {
    display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end;
  }
  .btn {
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
    border: none; border-radius: 10px; padding: 10px 20px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-skip {
    background: rgba(245, 158, 11, 0.12); color: var(--skip); border: 1.5px solid rgba(245, 158, 11, 0.3);
  }
  .btn-skip:hover { background: rgba(245, 158, 11, 0.2); }
  .btn-next {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3); }

  /* ── SCREEN: Results ── */
  .results-screen { text-align: center; padding-top: 2rem; animation: fadeUp 0.4s ease; }
  .results-emoji { font-size: 64px; margin-bottom: 1rem; }
  .results-score {
    font-family: 'Space Mono', monospace; font-size: clamp(36px, 8vw, 56px);
    font-weight: 700; margin-bottom: 0.5rem;
  }
  .results-score .got { color: var(--green); }
  .results-score .total { color: var(--muted); }
  .results-msg { font-size: 16px; color: var(--muted); margin-bottom: 0.5rem; }
  .results-show { font-size: 14px; color: var(--accent2); font-weight: 600; margin-bottom: 2rem; }
  .results-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-retry {
    background: var(--card); border: 1.5px solid var(--card-border);
    color: var(--text);
  }
  .btn-retry:hover { border-color: var(--accent); }
  .btn-home {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  /* Error */
  .error-box {
    background: rgba(248, 113, 113, 0.1); border: 1.5px solid rgba(248, 113, 113, 0.3);
    border-radius: 12px; padding: 1.25rem; text-align: center; color: var(--red);
    font-size: 14px; line-height: 1.6;
  }
  .error-box .btn { margin-top: 1rem; }

  /* Utility */
  .hidden { display: none !important; }

  @media (max-width: 400px) {
    .anime-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="bg-effects">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div class="container">
  <div class="header">
    <h1>ANIME QUIZ</h1>
    <p>Pick a show · 5 Questions · Go!</p>
  </div>

  <!-- SCREEN: Anime Picker -->
  <div id="screen-picker">
    <div class="anime-grid" id="anime-grid"></div>
  </div>

  <!-- SCREEN: Loading -->
  <div id="screen-loading" class="hidden">
    <div class="loading-screen">
      <div class="loader-ring"></div>
      <p>Generating questions for...</p>
      <div class="loading-show" id="loading-show"></div>
    </div>
  </div>

  <!-- SCREEN: Quiz -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <span class="quiz-show-name" id="quiz-show-name"></span>
      <span class="quiz-progress" id="quiz-progress"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div id="q-area"></div>
  </div>

  <!-- SCREEN: Results -->
  <div id="screen-results" class="hidden">
    <div class="results-screen" id="results-area"></div>
  </div>
</div>

<script>
// ── Anime List ──
const ANIME_LIST = [
  { name: "Naruto", emoji: "🍥" },
  { name: "One Piece", emoji: "🏴‍☠️" },
  { name: "Attack on Titan", emoji: "⚔️" },
  { name: "Demon Slayer", emoji: "🗡️" },
  { name: "Jujutsu Kaisen", emoji: "👁️" },
  { name: "My Hero Academia", emoji: "🦸" },
  { name: "Dragon Ball Z", emoji: "🐉" },
  { name: "Death Note", emoji: "📓" },
  { name: "Spy x Family", emoji: "🕵️" },
  { name: "One Punch Man", emoji: "👊" },
  { name: "Fullmetal Alchemist", emoji: "⚙️" },
  { name: "Hunter x Hunter", emoji: "🎯" },
  { name: "Tokyo Ghoul", emoji: "🎭" },
  { name: "Sword Art Online", emoji: "🎮" },
  { name: "Haikyuu!!", emoji: "🏐" },
  { name: "Bleach", emoji: "💀" },
  { name: "Chainsaw Man", emoji: "🪚" },
  { name: "Mob Psycho 100", emoji: "💫" },
  { name: "Neon Genesis Evangelion", emoji: "🤖" },
  { name: "Cowboy Bebop", emoji: "🚀" },
  { name: "Sailor Moon", emoji: "🌙" },
  { name: "Fruits Basket", emoji: "🍎" },
  { name: "Black Clover", emoji: "🍀" },
  { name: "Tokyo Revengers", emoji: "🏍️" },
  { name: "Vinland Saga", emoji: "🛡️" }
];

// ── State ──
let currentShow = "";
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;

// ── Screens ──
const screens = {
  picker: document.getElementById("screen-picker"),
  loading: document.getElementById("screen-loading"),
  quiz: document.getElementById("screen-quiz"),
  results: document.getElementById("screen-results")
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  screens[name].classList.remove("hidden");
}

// ── Build Anime Grid ──
function buildGrid() {
  const grid = document.getElementById("anime-grid");
  grid.innerHTML = "";
  ANIME_LIST.forEach(a => {
    const btn = document.createElement("button");
    btn.className = "anime-btn";
    btn.innerHTML = `<span class="emoji">${a.emoji}</span>${a.name}`;
    btn.onclick = () => startQuiz(a.name);
    grid.appendChild(btn);
  });
}

// ── API Call ──
async function generateQuestions(animeName) {
  const systemPrompt = `You are a quiz question writer for anime fans. Generate exactly 5 multiple-choice questions about the anime "${animeName}".

Rules:
- EASY to MEDIUM difficulty only. Focus on main characters, major plot points, and iconic moments that any viewer would know.
- Never ask about specific episode numbers, air dates, or production details.
- Never ask about manga-only content. Anime-only.
- Each question must have exactly 4 options with only ONE correct answer.
- Wrong options should be plausible but clearly wrong to someone who watched the show.
- Keep questions fun and engaging.

Respond with ONLY a JSON array, no markdown, no backticks, no preamble. Format:
[{"q":"Question text?","options":["A","B","C","D"],"answer":0,"fact":"A short fun fact or explanation about the correct answer."}]

The "answer" field is the zero-based index of the correct option (0-3).`;

  const response = await fetch("https://claude-proxy-zeta-six.vercel.app/api/proxy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: `Generate 5 quiz questions about ${animeName}.` }],
      system: systemPrompt
    })
  });

  if (!response.ok) throw new Error(`API returned ${response.status}`);

  const data = await response.json();

  // Extract text from response
  let text = "";
  if (data.content && Array.isArray(data.content)) {
    text = data.content.map(b => b.text || "").join("");
  } else if (typeof data.content === "string") {
    text = data.content;
  }

  // Clean and parse JSON
  text = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();

  // Try to find JSON array in the response
  const arrMatch = text.match(/\[[\s\S]*\]/);
  if (arrMatch) {
    text = arrMatch[0];
  }

  const parsed = JSON.parse(text);
  if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("No questions returned");

  // Validate structure
  return parsed.filter(q =>
    q.q && Array.isArray(q.options) && q.options.length === 4 &&
    typeof q.answer === "number" && q.answer >= 0 && q.answer <= 3
  ).slice(0, 5);
}

// ── Start Quiz ──
async function startQuiz(animeName) {
  currentShow = animeName;
  currentQ = 0;
  score = 0;
  answered = false;

  document.getElementById("loading-show").textContent = animeName;
  showScreen("loading");

  try {
    questions = await generateQuestions(animeName);
    if (questions.length === 0) throw new Error("No valid questions");
    document.getElementById("quiz-show-name").textContent = animeName;
    showScreen("quiz");
    renderQuestion();
  } catch (err) {
    console.error(err);
    document.getElementById("q-area").innerHTML = "";
    screens.quiz.classList.add("hidden");
    screens.loading.classList.add("hidden");
    screens.picker.classList.remove("hidden");

    // Show error on picker screen
    const grid = document.getElementById("anime-grid");
    const errDiv = document.createElement("div");
    errDiv.className = "error-box";
    errDiv.innerHTML = `
      <strong>Oops!</strong> Couldn't generate questions for ${animeName}.<br>
      Check your internet connection and try again.
      <br><button class="btn btn-next" onclick="this.parentElement.remove()">OK</button>
    `;
    grid.parentElement.insertBefore(errDiv, grid);
  }
}

// ── Render Question ──
function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById("quiz-progress").textContent = `${currentQ + 1} / ${total}`;
  document.getElementById("progress-fill").style.width = `${((currentQ) / total) * 100}%`;

  const letters = ["A", "B", "C", "D"];

  let html = `<div class="q-card">
    <div class="q-number">Question ${currentQ + 1} of ${total}</div>
    <div class="q-text">${escapeHtml(q.q)}</div>
    <div class="options" id="options">`;

  q.options.forEach((opt, i) => {
    html += `<button class="opt-btn" data-idx="${i}" onclick="selectAnswer(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  });

  html += `</div>
    <div id="feedback-area"></div>
    <div class="action-row">
      <button class="btn btn-skip" id="btn-skip" onclick="skipQuestion()">Skip →</button>
      <button class="btn btn-next hidden" id="btn-next" onclick="nextQuestion()">Next →</button>
    </div>
  </div>`;

  document.getElementById("q-area").innerHTML = html;
}

// ── Select Answer ──
function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const correct = q.answer;
  const btns = document.querySelectorAll(".opt-btn");

  btns.forEach(btn => {
    const bIdx = parseInt(btn.dataset.idx);
    btn.classList.add("locked");
    if (bIdx === correct) btn.classList.add("correct");
    if (bIdx === idx && idx !== correct) btn.classList.add("wrong");
  });

  const fbArea = document.getElementById("feedback-area");
  if (idx === correct) {
    score++;
    fbArea.innerHTML = `<div class="feedback correct">✓ Correct! ${q.fact ? escapeHtml(q.fact) : ""}</div>`;
  } else {
    fbArea.innerHTML = `<div class="feedback wrong">✗ The answer was ${escapeHtml(q.options[correct])}. ${q.fact ? escapeHtml(q.fact) : ""}</div>`;
  }

  document.getElementById("btn-skip").classList.add("hidden");
  document.getElementById("btn-next").classList.remove("hidden");
}

// ── Skip ──
function skipQuestion() {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const correct = q.answer;
  const btns = document.querySelectorAll(".opt-btn");

  btns.forEach(btn => {
    const bIdx = parseInt(btn.dataset.idx);
    btn.classList.add("locked");
    if (bIdx === correct) btn.classList.add("correct");
  });

  const fbArea = document.getElementById("feedback-area");
  fbArea.innerHTML = `<div class="feedback skipped">⟳ Skipped — the answer was ${escapeHtml(q.options[correct])}.</div>`;

  document.getElementById("btn-skip").classList.add("hidden");
  document.getElementById("btn-next").classList.remove("hidden");
}

// ── Next / Results ──
function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById("progress-fill").style.width = "100%";

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  let emoji, msg;

  if (pct === 100) { emoji = "🏆"; msg = "Perfect score! True otaku!"; }
  else if (pct >= 80) { emoji = "🔥"; msg = "Impressive! You know your stuff!"; }
  else if (pct >= 60) { emoji = "😄"; msg = "Not bad! Solid knowledge!"; }
  else if (pct >= 40) { emoji = "🤔"; msg = "Room to improve — rewatch time?"; }
  else { emoji = "😅"; msg = "Maybe try another show?"; }

  document.getElementById("results-area").innerHTML = `
    <div class="results-emoji">${emoji}</div>
    <div class="results-score"><span class="got">${score}</span><span class="total"> / ${total}</span></div>
    <div class="results-msg">${msg}</div>
    <div class="results-show">${escapeHtml(currentShow)}</div>
    <div class="results-btns">
      <button class="btn btn-retry" onclick="startQuiz('${escapeAttr(currentShow)}')">Try Again</button>
      <button class="btn btn-home" onclick="goHome()">Pick Another</button>
    </div>
  `;

  showScreen("results");
}

function goHome() {
  showScreen("picker");
}

// ── Helpers ──
function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

// ── Init ──
buildGrid();
</script>
</body>
</html>
