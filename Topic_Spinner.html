<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Spinner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f0;
    --card: #ffffff;
    --border: #e7e5e4;
    --accent: #f97316;
    --accent2: #8b5cf6;
    --text: #1c1917;
    --muted: #78716c;
    --shadow: 0 4px 20px rgba(249,115,22,0.10);
    --shadow-lg: 0 10px 40px rgba(249,115,22,0.18);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent2); }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    margin-top: 6px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 32px;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  /* ——— Slot machine window ——— */
  .slot-window {
    position: relative;
    width: 100%;
    height: 110px;
    background: linear-gradient(180deg, #fff7ed 0%, #fff 50%, #fff7ed 100%);
    border: 3px solid var(--accent);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 26px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
  }

  /* The scrolling reel */
  .reel {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 3.2s cubic-bezier(0.15, 0.7, 0.2, 1);
  }

  .reel-item {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 0 20px;
    width: 100%;
  }

  .reel-icon {
    font-size: 2.4rem;
    line-height: 1;
  }

  .reel-name {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  /* Top/bottom fade overlay */
  .slot-window::before,
  .slot-window::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    height: 28px;
    z-index: 2;
    pointer-events: none;
  }
  .slot-window::before {
    top: 0;
    background: linear-gradient(180deg, rgba(255,247,237,1), rgba(255,247,237,0));
  }
  .slot-window::after {
    bottom: 0;
    background: linear-gradient(0deg, rgba(255,247,237,1), rgba(255,247,237,0));
  }

  /* Center indicator lines */
  .slot-window .line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.25;
    z-index: 1;
  }
  .slot-window .line.top { top: calc(50% - 55px); }
  .slot-window .line.bot { top: calc(50% + 53px); }

  /* ——— Buttons ——— */
  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, opacity 0.2s;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    font-size: 1.15rem;
    padding: 16px 40px;
    box-shadow: var(--shadow-lg);
  }
  .btn-primary:hover { background: #ea6c0a; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--accent2);
    color: white;
  }
  .btn-secondary:hover { background: #7c3aed; }
  .btn-secondary:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--muted);
    padding: 12px 22px;
    font-size: 0.9rem;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Action buttons row (shown after spin) */
  .actions {
    display: none;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
    animation: fadeUp 0.4s ease;
  }
  .actions.visible { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .topic-count {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>🎰 Topic <span>Spinner</span></h1>
  <p>Spin the wheel to get a discussion topic — then send it to your Question Maker</p>
</header>

<div class="card">

  <div class="slot-window">
    <div class="line top"></div>
    <div class="line bot"></div>
    <div class="reel" id="reel"></div>
  </div>

  <button class="btn btn-primary" id="spinBtn" onclick="spin()">🎲 SPIN!</button>

  <div class="actions" id="actions">
    <div class="actions-row">
      <button class="btn btn-secondary" onclick="sendToQuestionMaker()">✦ Send to Question Maker →</button>
      <button class="btn btn-ghost" onclick="copyTopic()" id="copyBtn">📋 Copy topic</button>
    </div>
    <button class="btn btn-ghost" onclick="spin()">↺ Spin again</button>
  </div>

  <div class="topic-count" id="topicCount"></div>

</div>

<script>
  // ─── Master topic list ────────────────────────────────────────────────
  // Original topics from Think-About-It + ~30 new additions.
  var TOPICS = [
    // Animals & Nature
    { name: "Pets", icon: "🐾" },
    { name: "Wild animals", icon: "🦁" },
    { name: "Zoos & wildlife parks", icon: "🦒" },
    { name: "Nature & the outdoors", icon: "🌿" },
    { name: "Space & the universe", icon: "🚀" },
    { name: "The ocean", icon: "🌊" },
    { name: "Weather", icon: "⛅" },
    { name: "Seasons", icon: "🍂" },

    // Fun & Entertainment
    { name: "Football", icon: "⚽" },
    { name: "Video games & gaming", icon: "🎮" },
    { name: "Movies & TV shows", icon: "🎬" },
    { name: "K-pop & music", icon: "🎵" },
    { name: "Racing & motorsport", icon: "🏎️" },
    { name: "Books & reading", icon: "📖" },
    { name: "Board games", icon: "🎲" },
    { name: "Birthdays", icon: "🎂" },
    { name: "Holidays & festivals", icon: "🎉" },

    // Tech & The Future
    { name: "Robots & AI", icon: "🤖" },
    { name: "Social media", icon: "📱" },
    { name: "Screen time", icon: "💻" },
    { name: "Dream jobs & careers", icon: "🌟" },
    { name: "Travel & exploring the world", icon: "✈️" },
    { name: "Inventions", icon: "💡" },
    { name: "The future", icon: "🔮" },
    { name: "Cars & transport", icon: "🚗" },

    // Everyday Life
    { name: "School life", icon: "📚" },
    { name: "Dormitory life", icon: "🏠" },
    { name: "Sleep", icon: "😴" },
    { name: "Fast food & snacks", icon: "🍕" },
    { name: "Languages & culture", icon: "🗣️" },
    { name: "Mornings", icon: "🌅" },
    { name: "Weekends", icon: "🛋️" },
    { name: "Rules", icon: "📏" },
    { name: "Homework", icon: "✏️" },
    { name: "Exams & tests", icon: "📝" },

    // Uzbek Life & Culture
    { name: "Uzbek traditions", icon: "🇺🇿" },
    { name: "Uzbek food", icon: "🍲" },
    { name: "City vs village life", icon: "🏙️" },
    { name: "Neighbours", icon: "🏘️" },

    // Art & Creativity
    { name: "Drawing & art", icon: "🎨" },
    { name: "Superheroes", icon: "🦸" },
    { name: "Pets vs wild animals", icon: "🐕" },
    { name: "Storytelling", icon: "📜" },
    { name: "Photography", icon: "📸" },

    // Big Feelings & Ideas
    { name: "Happiness", icon: "😊" },
    { name: "Dreams & ambition", icon: "💫" },
    { name: "Money & things", icon: "💰" },
    { name: "Fame & being famous", icon: "⭐" },
    { name: "Family", icon: "👨‍👩‍👧" },
    { name: "Friendship", icon: "🤝" },
    { name: "Food from around the world", icon: "🌍" },
    { name: "Bravery", icon: "🦁" },
    { name: "Kindness", icon: "💝" },
    { name: "Honesty & lies", icon: "🤥" },
    { name: "Secrets", icon: "🤫" },
    { name: "Embarrassing moments", icon: "😳" },
    { name: "Fears", icon: "😰" },
    { name: "Growing up", icon: "🌱" },
    { name: "Heroes & role models", icon: "🦸‍♀️" },
    { name: "Success & failure", icon: "🏆" },
    { name: "Luck", icon: "🍀" },
    { name: "Change", icon: "🔄" },
    { name: "Memories", icon: "💭" }
  ];

  // ─── State ────────────────────────────────────────────────────────────
  var currentTopic = null;
  var isSpinning = false;
  var recentlyUsed = []; // avoid immediate repeats

  var reel = document.getElementById("reel");
  var spinBtn = document.getElementById("spinBtn");
  var actions = document.getElementById("actions");
  var topicCount = document.getElementById("topicCount");

  topicCount.textContent = TOPICS.length + " topics in the spinner";

  // ─── Build the reel ───────────────────────────────────────────────────
  // We create a long strip of random topics so the spin looks like a real
  // slot machine scrolling through lots of options before landing.
  function buildReel(finalTopic) {
    reel.innerHTML = "";
    reel.style.transition = "none";
    reel.style.transform = "translateY(0)";

    // Make a long shuffled strip — about 40 items — with the final topic at the end
    var strip = [];
    for (var i = 0; i < 40; i++) {
      strip.push(TOPICS[Math.floor(Math.random() * TOPICS.length)]);
    }
    strip.push(finalTopic); // the landing item

    strip.forEach(function(t) {
      var item = document.createElement("div");
      item.className = "reel-item";
      item.innerHTML = '<span class="reel-icon">' + t.icon + '</span><span class="reel-name">' + t.name + '</span>';
      reel.appendChild(item);
    });
  }

  // ─── Pick a topic (avoid immediate repeats) ───────────────────────────
  function pickTopic() {
    var avail = TOPICS.filter(function(t) {
      return recentlyUsed.indexOf(t.name) === -1;
    });
    if (avail.length === 0) {
      recentlyUsed = [];
      avail = TOPICS.slice();
    }
    var chosen = avail[Math.floor(Math.random() * avail.length)];
    recentlyUsed.push(chosen.name);
    // Keep the "recently used" buffer at about 1/3 of total topics
    if (recentlyUsed.length > Math.floor(TOPICS.length / 3)) {
      recentlyUsed.shift();
    }
    return chosen;
  }

  // ─── Spin! ────────────────────────────────────────────────────────────
  function spin() {
    if (isSpinning) return;
    isSpinning = true;
    spinBtn.disabled = true;
    actions.classList.remove("visible");

    var finalTopic = pickTopic();
    currentTopic = finalTopic;

    buildReel(finalTopic);

    // Force the browser to register the reset before animating
    void reel.offsetWidth;

    // The reel has 41 items × 110px = 4510px of height. We want the LAST
    // item centered in the 110px window, so shift up by 40 * 110px.
    reel.style.transition = "transform 3.2s cubic-bezier(0.15, 0.7, 0.2, 1)";
    reel.style.transform = "translateY(-" + (40 * 110) + "px)";

    // After spin completes, reveal action buttons
    setTimeout(function() {
      actions.classList.add("visible");
      spinBtn.textContent = "🎲 SPIN AGAIN!";
      spinBtn.disabled = false;
      isSpinning = false;
    }, 3300);
  }

  // ─── Send to Question Maker ───────────────────────────────────────────
  function sendToQuestionMaker() {
    if (!currentTopic) return;
    // Open the Bloom's tool with the topic in the URL
    var url = "Think-Blooms-Question_maker.html?topic=" + encodeURIComponent(currentTopic.name);
    window.open(url, "_blank");
  }

  // ─── Copy topic to clipboard ──────────────────────────────────────────
  function copyTopic() {
    if (!currentTopic) return;
    var btn = document.getElementById("copyBtn");
    navigator.clipboard.writeText(currentTopic.name).then(function() {
      var original = btn.textContent;
      btn.textContent = "✓ Copied!";
      setTimeout(function() { btn.textContent = original; }, 1500);
    }).catch(function() {
      btn.textContent = "Copy failed";
    });
  }

  // ─── Show a random placeholder topic on first load ────────────────────
  (function initPlaceholder() {
    var t = TOPICS[Math.floor(Math.random() * TOPICS.length)];
    var item = document.createElement("div");
    item.className = "reel-item";
    item.innerHTML = '<span class="reel-icon" style="opacity:0.4">' + t.icon + '</span><span class="reel-name" style="color:var(--muted)">Press SPIN to begin…</span>';
    reel.appendChild(item);
  })();
</script>

</body>
</html>
